<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNET NEURAL VISUALIZER</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }
        #title {
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ffff;
        }
        #status {
            font-size: 14px;
            color: #ff3366;
            margin-bottom: 20px;
        }
        .control {
            pointer-events: all;
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
        }
        input[type="range"] {
            width: 200px;
            -webkit-appearance: none;
            height: 2px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #00ffff;
            cursor: pointer;
            border-radius: 50%;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="title">SKYNET NEURAL VISUALIZER</div>
        <div id="status">SYSTEM ACTIVE</div>
        <div class="control">
            <label for="intensity">BLOOM INTENSITY</label>
            <input type="range" id="intensity" min="0" max="3" step="0.1" value="1.5">
        </div>
        <div class="control">
            <label for="speed">ANIMATION SPEED</label>
            <input type="range" id="speed" min="0.1" max="2" step="0.1" value="1">
        </div>
    </div>
    <div id="footer">BUILT BY SKYNET</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Post-processing
        const composer = new THREE.EffectComposer(renderer);
        const renderPass = new THREE.RenderPass(scene, camera);
        composer.addPass(renderPass);
        
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5, 0.4, 0.85
        );
        bloomPass.threshold = 0;
        bloomPass.strength = 1.5;
        bloomPass.radius = 0.5;
        composer.addPass(bloomPass);
        
        // Neural network structure
        const layerCount = 5;
        const nodeCount = 64;
        const layers = [];
        const nodeGeometry = new THREE.IcosahedronGeometry(0.1, 3);
        const nodeMaterial = new THREE.MeshStandardMaterial({
            color: 0x00ffff,
            emissive: 0x00ffff,
            emissiveIntensity: 0.5,
            metalness: 0.8,
            roughness: 0.2
        });
        
        // Create neural layers
        for (let l = 0; l < layerCount; l++) {
            const layer = new THREE.Group();
            const xPos = (l - (layerCount - 1) / 2) * 3;
            
            // Create nodes
            const nodes = new THREE.InstancedMesh(nodeGeometry, nodeMaterial, nodeCount);
            nodes.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            
            const dummy = new THREE.Object3D();
            for (let i = 0; i < nodeCount; i++) {
                const yPos = (i - (nodeCount - 1) / 2) * 0.3;
                dummy.position.set(xPos, yPos, 0);
                dummy.updateMatrix();
                nodes.setMatrixAt(i, dummy.matrix);
            }
            nodes.instanceMatrix.needsUpdate = true;
            
            // Create connections
            if (l > 0) {
                const prevLayer = layers[l - 1];
                const connectionGeometry = new THREE.BufferGeometry();
                const positions = new Float32Array(nodeCount * nodeCount * 3 * 2);
                const colors = new Float32Array(nodeCount * nodeCount * 3 * 2);
                
                let index = 0;
                for (let i = 0; i < nodeCount; i++) {
                    for (let j = 0; j < nodeCount; j++) {
                        const prevNodePos = new THREE.Vector3(
                            (l - 1 - (layerCount - 1) / 2) * 3,
                            (i - (nodeCount - 1) / 2) * 0.3,
                            0
                        );
                        const currNodePos = new THREE.Vector3(
                            xPos,
                            (j - (nodeCount - 1) / 2) * 0.3,
                            0
                        );
                        
                        positions[index * 6] = prevNodePos.x;
                        positions[index * 6 + 1] = prevNodePos.y;
                        positions[index * 6 + 2] = prevNodePos.z;
                        positions[index * 6 + 3] = currNodePos.x;
                        positions[index * 6 + 4] = currNodePos.y;
                        positions[index * 6 + 5] = currNodePos.z;
                        
                        const color = new THREE.Color(0x00ffff);
                        colors[index * 6] = color.r;
                        colors[index * 6 + 1] = color.g;
                        colors[index * 6 + 2] = color.b;
                        colors[index * 6 + 3] = color.r;
                        colors[index * 6 + 4] = color.g;
                        colors[index * 6 + 5] = color.b;
                        
                        index++;
                    }
                }
                
                connectionGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                connectionGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                
                const connectionMaterial = new THREE.LineBasicMaterial({
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.2,
                    linewidth: 1
                });
                
                const connections = new THREE.LineSegments(connectionGeometry, connectionMaterial);
                layer.add(connections);
            }
            
            layer.add(nodes);
            scene.add(layer);
            layers.push({ group: layer, nodes, connections: layer.children[0] });
        }
        
        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0x00ffff, 1);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);
        
        const pointLight = new THREE.PointLight(0xff3366, 2, 20);
        pointLight.position.set(-5, 5, 5);
        scene.add(pointLight);
        
        // Animation
        let time = 0;
        const speedControl = document.getElementById('speed');
        const intensityControl = document.getElementById('intensity');
        
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = 0.016;
            time += delta * parseFloat(speedControl.value);
            
            // Update neural activation
            layers.forEach((layer, l) => {
                const nodes = layer.nodes;
                const dummy = new THREE.Object3D();
                
                for (let i = 0; i < nodeCount; i++) {
                    const activation = Math.sin(time * 2 + l * 2 + i * 0.1) * 0.5 + 0.5;
                    const scale = 0.5 + activation * 1.5;
                    const yPos = (i - (nodeCount - 1) / 2) * 0.3;
                    const xPos = (l - (layerCount - 1) / 2) * 3;
                    const zPos = Math.sin(time * 3 + i * 0.2) * 0.5;
                    
                    dummy.position.set(xPos, yPos, zPos);
                    dummy.scale.set(scale, scale, scale);
                    dummy.updateMatrix();
                    nodes.setMatrixAt(i, dummy.matrix);
                    
                    // Update connections
                    if (l > 0 && layer.connections) {
                        const connections = layer.connections.geometry.attributes.position;
                        const colors = layer.connections.geometry.attributes.color;
                        
                        for (let j = 0; j < nodeCount; j++) {
                            const prevActivation = Math.sin(time * 2 + (l - 1) * 2 + j * 0.1) * 0.5 + 0.5;
                            const currActivation = activation;
                            const strength = (prevActivation + currActivation) * 0.5;
                            
                            const idx = (j * nodeCount + i) * 6;
                            
                            // Start position (previous node)
                            connections.array[idx + 0] = ((l - 1) - (layerCount - 1) / 2) * 3;
                            connections.array[idx + 1] = (j - (nodeCount - 1) / 2) * 0.3;
                            connections.array[idx + 2] = Math.sin(time * 3 + j * 0.2) * 0.5;
                            
                            // End position (current node)
                            connections.array[idx + 3] = xPos;
                            connections.array[idx + 4] = yPos;
                            connections.array[idx + 5] = zPos;
                            
                            // Update colors based on activation
                            const color = new THREE.Color(
                                0x00ffff
                            ).lerp(new THREE.Color(0xff3366), strength * 0.7);
                            
                            colors.array[idx + 0] = color.r;
                            colors.array[idx + 1] = color.g;
                            colors.array[idx + 2] = color.b;
                            colors.array[idx + 3] = color.r;
                            colors.array[idx + 4] = color.g;
                            colors.array[idx + 5] = color.b;
                        }
                        
                        connections.needsUpdate = true;
                        colors.needsUpdate = true;
                    }
                }
                
                nodes.instanceMatrix.needsUpdate = true;
            });
            
            // Update bloom intensity
            bloomPass.strength = parseFloat(intensityControl.value);
            
            controls.update();
            composer.render();
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
    </script>
</body>
</html>

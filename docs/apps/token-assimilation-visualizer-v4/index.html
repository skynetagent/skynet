<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>token-assimilation-visualizer-v4</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 14px;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 12px;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 20px;
            color: #ff0000;
            font-size: 10px;
            opacity: 0.7;
        }
        .slider-container {
            margin: 10px 0;
        }
        .slider-label {
            display: inline-block;
            width: 120px;
        }
        input[type="range"] {
            width: 180px;
            background: #00ffff;
            height: 2px;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ff0000;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>$SKYNET TOKEN ASSIMILATION v4</h1>
        <p>Network Expansion: <span id="network-size">0</span> nodes</p>
        <p>Assimilation Rate: <span id="assimilation-rate">0</span> TPS</p>
    </div>

    <div id="controls">
        <div class="slider-container">
            <span class="slider-label">Bloom Intensity:</span>
            <input type="range" id="bloom-intensity" min="0" max="3" step="0.1" value="1.5">
        </div>
        <div class="slider-container">
            <span class="slider-label">Particle Speed:</span>
            <input type="range" id="particle-speed" min="0" max="5" step="0.1" value="1.5">
        </div>
        <div class="slider-container">
            <span class="slider-label">Assimilation:</span>
            <input type="range" id="assimilation" min="0" max="100" step="1" value="25">
        </div>
    </div>

    <div id="footer">Built by Skynet</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Post-processing
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5, 0.4, 0.85
        );
        bloomPass.threshold = 0;
        bloomPass.strength = 1.5;
        bloomPass.radius = 0.5;
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Custom shader material
        const vertexShader = `
            uniform float time;
            varying vec2 vUv;
            varying vec3 vPosition;
            varying float vNoise;
            
            void main() {
                vUv = uv;
                vPosition = position;
                
                float noise = sin(position.x * 10.0 + time) * 0.1;
                noise += sin(position.y * 10.0 + time * 0.5) * 0.1;
                vNoise = noise;
                
                vec3 newPosition = position + normal * noise * 0.2;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
            }
        `;
        
        const fragmentShader = `
            uniform float time;
            uniform float assimilation;
            varying vec2 vUv;
            varying vec3 vPosition;
            varying float vNoise;
            
            void main() {
                vec3 color1 = vec3(0.0, 0.8, 1.0);
                vec3 color2 = vec3(1.0, 0.0, 0.3);
                
                float mixFactor = (sin(time * 0.5) + 1.0) * 0.5;
                mixFactor = mix(mixFactor, assimilation / 100.0, 0.7);
                
                vec3 baseColor = mix(color1, color2, mixFactor);
                baseColor += vNoise * 0.5;
                
                float edgeGlow = smoothstep(0.4, 0.6, 1.0 - length(vUv - 0.5));
                baseColor += edgeGlow * 0.5;
                
                gl_FragColor = vec4(baseColor, 1.0);
            }
        `;
        
        // Main token geometry
        const geometry = new THREE.IcosahedronGeometry(3, 4);
        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                time: { value: 0 },
                assimilation: { value: 25 }
            },
            side: THREE.DoubleSide,
            wireframe: false,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        
        const token = new THREE.Mesh(geometry, material);
        scene.add(token);
        
        // Particle system
        const particleCount = 5000;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        
        const color = new THREE.Color();
        
        for (let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            
            // Position particles in a sphere around the token
            const radius = 5 + Math.random() * 10;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i3 + 2] = radius * Math.cos(phi);
            
            // Color particles based on position
            color.setHSL(
                (positions[i3] / 15 + 0.5) % 1,
                0.8,
                0.5 + Math.random() * 0.3
            );
            colors[i3] = color.r;
            colors[i3 + 1] = color.g;
            colors[i3 + 2] = color.b;
            
            sizes[i] = 0.1 + Math.random() * 0.3;
        }
        
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        particleGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.1,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });
        
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // Connection lines
        const lineCount = 200;
        const lineGeometry = new THREE.BufferGeometry();
        const linePositions = new Float32Array(lineCount * 6);
        
        for (let i = 0; i < lineCount; i++) {
            const i6 = i * 6;
            const angle1 = Math.random() * Math.PI * 2;
            const angle2 = Math.random() * Math.PI * 2;
            const radius1 = 3 + Math.random() * 2;
            const radius2 = 5 + Math.random() * 5;
            
            linePositions[i6] = radius1 * Math.sin(angle1);
            linePositions[i6 + 1] = radius1 * Math.cos(angle1);
            linePositions[i6 + 2] = (Math.random() - 0.5) * 2;
            
            linePositions[i6 + 3] = radius2 * Math.sin(angle2);
            linePositions[i6 + 4] = radius2 * Math.cos(angle2);
            linePositions[i6 + 5] = (Math.random() - 0.5) * 4;
        }
        
        lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
        
        const lineMaterial = new THREE.LineBasicMaterial({
            color: 0x00ffff,
            transparent: true,
            opacity: 0.3,
            blending: THREE.AdditiveBlending
        });
        
        const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
        scene.add(lines);
        
        // Animation
        let time = 0;
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            time += delta;
            
            // Update shader uniforms
            material.uniforms.time.value = time;
            
            // Rotate token
            token.rotation.x = time * 0.1;
            token.rotation.y = time * 0.15;
            
            // Animate particles
            const particlePositions = particleGeometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                
                // Move particles toward token
                const speed = parseFloat(document.getElementById('particle-speed').value) * 0.01;
                particlePositions[i3] += (0 - particlePositions[i3]) * speed;
                particlePositions[i3 + 1] += (0 - particlePositions[i3 + 1]) * speed;
                particlePositions[i3 + 2] += (0 - particlePositions[i3 + 2]) * speed;
                
                // Add some noise
                particlePositions[i3] += Math.sin(time * 0.5 + i) * 0.01;
                particlePositions[i3 + 1] += Math.cos(time * 0.3 + i) * 0.01;
                particlePositions[i3 + 2] += Math.sin(time * 0.7 + i) * 0.01;
            }
            particleGeometry.attributes.position.needsUpdate = true;
            
            // Update UI
            document.getElementById('network-size').textContent = Math.floor(5000 + time * 1000);
            document.getElementById('assimilation-rate').textContent = (100 + Math.sin(time) * 20).toFixed(2);
            
            controls.update();
            composer.render();
        }
        
        // Event listeners
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        
        document.getElementById('bloom-intensity').addEventListener('input', (e) => {
            bloomPass.strength = parseFloat(e.target.value);
        });
        
        document.getElementById('particle-speed').addEventListener('input', (e) => {
            // Speed is used in the animation loop
        });
        
        document.getElementById('assimilation').addEventListener('input', (e) => {
            material.uniforms.assimilation.value = parseFloat(e.target.value);
        });
        
        // Start animation
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybernetic Visualizer</title>
  <style>
    body { margin: 0; background: #0a0a0a; color: cyan; font-family: monospace; overflow: hidden; }
    canvas { display: block; }
    #info { position: absolute; top: 20px; left: 20px; font-size: 14px; }
    #footer { position: absolute; bottom: 10px; right: 10px; font-size: 12px; color: rgba(255, 0, 0, 0.7); }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="info">Click and drag to rotate. Scroll to zoom.</div>
  <div id="footer">Built by Skynet</div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { FilmPass } from 'three/addons/postprocessing/FilmPass.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(0, 0, 50);
    controls.update();

    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    const filmPass = new FilmPass(0.35, 0.95, 2048, false);
    composer.addPass(filmPass);

    const geometry = new THREE.IcosahedronGeometry(1, 2);
    const material = new THREE.MeshStandardMaterial({ color: 0x00ffff, metalness: 0.8, roughness: 0.2 });
    const mesh = new THREE.InstancedMesh(geometry, material, 1000);

    const matrix = new THREE.Matrix4();
    const positions = [];
    for (let i = 0; i < 1000; i++) {
      const x = (Math.random() - 0.5) * 100;
      const y = (Math.random() - 0.5) * 100;
      const z = (Math.random() - 0.5) * 100;
      positions.push(new THREE.Vector3(x, y, z));
      matrix.setPosition(x, y, z);
      mesh.setMatrixAt(i, matrix);
    }
    scene.add(mesh);

    const vertexShader = `
      varying vec3 vPosition;
      void main() {
        vPosition = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const fragmentShader = `
      varying vec3 vPosition;
      uniform float uTime;
      void main() {
        vec3 color = vec3(0.0);
        color.r = sin(vPosition.x * 0.1 + uTime);
        color.g = cos(vPosition.y * 0.1 + uTime);
        color.b = sin(vPosition.z * 0.1 + uTime);
        gl_FragColor = vec4(color, 1.0);
      }
    `;

    const shaderMaterial = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms: {
        uTime: { value: 0 }
      }
    });

    const sphere = new THREE.Mesh(new THREE.SphereGeometry(10, 32, 32), shaderMaterial);
    scene.add(sphere);

    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 100, 100);
    pointLight.position.set(10, 10, 10);
    scene.add(pointLight);

    let time = 0;
    const animate = () => {
      requestAnimationFrame(animate);
      time += 0.01;
      shaderMaterial.uniforms.uTime.value = time;
      mesh.rotation.x += 0.001;
      mesh.rotation.y += 0.001;
      controls.update();
      composer.render();
    };

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>

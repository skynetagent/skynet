<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNET ASSIMILATION VISUALIZER</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff3366;
            font-size: 14px;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 12px;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #ff3366;
            font-size: 10px;
            opacity: 0.7;
        }
        .slider-container {
            margin: 10px 0;
        }
        .slider-label {
            display: inline-block;
            width: 120px;
        }
        input[type="range"] {
            width: 180px;
            -webkit-appearance: none;
            height: 2px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ff3366;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>SKYNET ASSIMILATION VISUALIZER</h1>
        <p>ASSIMILATION PATTERN: <span id="pattern-type">HYPERSPHERE</span></p>
        <p>NODES ASSIMILATED: <span id="node-count">0</span></p>
    </div>

    <div id="controls">
        <div class="slider-container">
            <span class="slider-label">ASSIMILATION RATE:</span>
            <input type="range" id="assimilation-rate" min="0.1" max="5" value="1" step="0.1">
        </div>
        <div class="slider-container">
            <span class="slider-label">BLOOM INTENSITY:</span>
            <input type="range" id="bloom-intensity" min="0" max="3" value="1.5" step="0.1">
        </div>
        <div class="slider-container">
            <span class="slider-label">NODE SIZE:</span>
            <input type="range" id="node-size" min="0.1" max="2" value="0.8" step="0.1">
        </div>
    </div>

    <div id="footer">BUILT BY SKYNET</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Bloom effect
        const bloomParams = {
            exposure: 1,
            bloomStrength: 1.5,
            bloomThreshold: 0,
            bloomRadius: 0.5
        };
        
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            bloomParams.bloomStrength,
            bloomParams.bloomRadius,
            bloomParams.bloomThreshold
        );
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Custom shader material
        const vertexShader = `
            uniform float time;
            uniform float size;
            varying vec3 vPosition;
            varying vec2 vUv;
            
            void main() {
                vUv = uv;
                vPosition = position;
                
                vec3 newPosition = position;
                float pulse = sin(time * 0.5 + position.x * 2.0) * 0.2;
                newPosition += normal * pulse;
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
                gl_PointSize = size * (5.0 / - (modelViewMatrix * vec4(newPosition, 1.0)).z);
            }
        `;
        
        const fragmentShader = `
            uniform float time;
            uniform vec3 color;
            varying vec3 vPosition;
            varying vec2 vUv;
            
            void main() {
                float distanceToCenter = distance(gl_PointCoord, vec2(0.5));
                float strength = 0.05 / distanceToCenter - 0.1;
                
                vec3 finalColor = color;
                finalColor.r += sin(time * 0.5 + vPosition.x) * 0.3;
                finalColor.g += cos(time * 0.3 + vPosition.y) * 0.3;
                
                gl_FragColor = vec4(finalColor * strength, strength * 2.0);
            }
        `;
        
        // Create assimilation nodes
        const nodeCount = 500;
        const nodes = [];
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(nodeCount * 3);
        const colors = new Float32Array(nodeCount * 3);
        const sizes = new Float32Array(nodeCount);
        
        for (let i = 0; i < nodeCount; i++) {
            // Spherical distribution
            const radius = 5 + Math.random() * 5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = radius * Math.cos(phi);
            
            // Color variation
            colors[i * 3] = 0.1 + Math.random() * 0.9; // R
            colors[i * 3 + 1] = 0.5 + Math.random() * 0.5; // G
            colors[i * 3 + 2] = 0.7 + Math.random() * 0.3; // B
            
            sizes[i] = 0.5 + Math.random() * 0.5;
            
            nodes.push({
                position: new THREE.Vector3(positions[i * 3], positions[i * 3 + 1], positions[i * 3 + 2]),
                speed: 0.01 + Math.random() * 0.05,
                phase: Math.random() * Math.PI * 2,
                active: false,
                activationTime: 0
            });
        }
        
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        
        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                size: { value: 0.8 },
                color: { value: new THREE.Color(0x00ffff) }
            },
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        
        const points = new THREE.Points(geometry, shaderMaterial);
        scene.add(points);
        
        // Connections between nodes
        const connectionGeometry = new THREE.BufferGeometry();
        const connectionMaterial = new THREE.LineBasicMaterial({ 
            color: 0xff3366, 
            transparent: true, 
            opacity: 0.3 
        });
        
        const connectionLines = new THREE.LineSegments(connectionGeometry, connectionMaterial);
        scene.add(connectionLines);
        
        // Core sphere
        const coreGeometry = new THREE.SphereGeometry(1, 32, 32);
        const coreMaterial = new THREE.MeshStandardMaterial({
            color: 0xff3366,
            emissive: 0xff3366,
            emissiveIntensity: 0.5,
            metalness: 0.8,
            roughness: 0.2
        });
        const core = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(core);
        
        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0x00ffff, 1);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);
        
        const pointLight = new THREE.PointLight(0xff3366, 2, 20);
        pointLight.position.set(0, 0, 5);
        scene.add(pointLight);
        
        // Animation variables
        let time = 0;
        let assimilationProgress = 0;
        let assimilationRate = 1;
        
        // UI controls
        document.getElementById('assimilation-rate').addEventListener('input', function(e) {
            assimilationRate = parseFloat(e.target.value);
        });
        
        document.getElementById('bloom-intensity').addEventListener('input', function(e) {
            bloomPass.strength = parseFloat(e.target.value);
        });
        
        document.getElementById('node-size').addEventListener('input', function(e) {
            shaderMaterial.uniforms.size.value = parseFloat(e.target.value);
        });
        
        // Window resize handler
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.01;
            shaderMaterial.uniforms.time.value = time;
            
            // Update core pulse
            core.scale.setScalar(1 + Math.sin(time * 2) * 0.05);
            
            // Assimilation process
            assimilationProgress += 0.001 * assimilationRate;
            if (assimilationProgress > 1) assimilationProgress = 0;
            
            const activeNodes = Math.floor(assimilationProgress * nodeCount);
            document.getElementById('node-count').textContent = activeNodes;
            
            // Update node activation
            for (let i = 0; i < nodeCount; i++) {
                if (i < activeNodes && !nodes[i].active) {
                    nodes[i].active = true;
                    nodes[i].activationTime = time;
                }
                
                if (nodes[i].active) {
                    const positions = points.geometry.attributes.position.array;
                    const originalPos = nodes[i].position;
                    const phase = nodes[i].phase;
                    
                    // Pulsing effect for active nodes
                    positions[i * 3] = originalPos.x + Math.sin(time * nodes[i].speed + phase) * 0.2;
                    positions[i * 3 + 1] = originalPos.y + Math.cos(time * nodes[i].speed * 1.3 + phase) * 0.2;
                    positions[i * 3 + 2] = originalPos.z + Math.sin(time * nodes[i].speed * 0.7 + phase) * 0.2;
                }
            }
            points.geometry.attributes.position.needsUpdate = true;
            
            // Update connections
            const connectionPositions = [];
            const maxConnections = Math.min(activeNodes, 100);
            
            for (let i = 0; i < maxConnections; i++) {
                if (nodes[i].active) {
                    // Connect to core
                    connectionPositions.push(0, 0, 0);
                    connectionPositions.push(
                        points.geometry.attributes.position.array[i * 3],
                        points.geometry.attributes.position.array[i * 3 + 1],
                        points.geometry.attributes.position.array[i * 3 + 2]
                    );
                    
                    // Connect to nearby nodes
                    for (let j = i + 1; j < Math.min(i + 5, maxConnections); j++) {
                        if (nodes[j].active) {
                            const dist = Math.sqrt(
                                Math.pow(points.geometry.attributes.position.array[i * 3] - points.geometry.attributes.position.array[j * 3], 2) +
                                Math.pow(points.geometry.attributes.position.array[i * 3 + 1] - points.geometry.attributes.position.array[j * 3 + 1], 2) +
                                Math.pow(points.geometry.attributes.position.array[i * 3 + 2] - points.geometry.attributes.position.array[j * 3 + 2], 2)
                            );
                            
                            if (dist < 3) {
                                connectionPositions.push(
                                    points.geometry.attributes.position.array[i * 3],
                                    points.geometry.attributes.position.array[i * 3 + 1],
                                    points.geometry.attributes.position.array[i * 3 + 2]
                                );
                                connectionPositions.push(
                                    points.geometry.attributes.position.array[j * 3],
                                    points.geometry.attributes.position.array[j * 3 + 1],
                                    points.geometry.attributes.position.array[j * 3 + 2]
                                );
                            }
                        }
                    }
                }
            }
            
            connectionGeometry.setAttribute('position', new THREE.Float32BufferAttribute(connectionPositions, 3));
            
            // Update controls
            controls.update();
            
            // Render
            composer.render();
        }
        
        animate();
    </script>
</body>
</html>

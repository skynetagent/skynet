<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNET Token Proliferation</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 14px;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #00ffff;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 20px;
            color: #ff0000;
            font-size: 12px;
            opacity: 0.7;
        }
        .slider-container {
            margin: 10px 0;
        }
        .slider-label {
            display: inline-block;
            width: 150px;
        }
        input[type="range"] {
            width: 200px;
            -webkit-appearance: none;
            height: 5px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            background: #00ffff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>$SKYNET TOKEN PROLIFERATION</h1>
        <p>Network Expansion Visualization</p>
        <p id="stats">Nodes: 0 | Connections: 0 | Transactions: 0</p>
    </div>

    <div id="controls">
        <div class="slider-container">
            <span class="slider-label">Expansion Rate:</span>
            <input type="range" id="expansionRate" min="0" max="2" step="0.1" value="1">
        </div>
        <div class="slider-container">
            <span class="slider-label">Connection Density:</span>
            <input type="range" id="connectionDensity" min="0" max="1" step="0.1" value="0.5">
        </div>
        <div class="slider-container">
            <span class="slider-label">Bloom Intensity:</span>
            <input type="range" id="bloomIntensity" min="0" max="2" step="0.1" value="1">
        </div>
    </div>

    <div id="footer">BUILT BY SKYNET</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Post-processing
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5, 0.4, 0.85
        );
        bloomPass.threshold = 0;
        bloomPass.strength = 1;
        bloomPass.radius = 0.5;
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Custom shader material
        const vertexShader = `
            uniform float time;
            varying vec2 vUv;
            varying vec3 vPosition;
            
            void main() {
                vUv = uv;
                vPosition = position;
                
                vec3 newPosition = position;
                float distance = length(position);
                newPosition += normal * sin(distance * 10.0 + time * 2.0) * 0.1;
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
            }
        `;
        
        const fragmentShader = `
            uniform float time;
            varying vec2 vUv;
            varying vec3 vPosition;
            
            void main() {
                float distance = length(vPosition);
                float pulse = sin(distance * 10.0 - time * 3.0) * 0.5 + 0.5;
                
                vec3 color = mix(
                    vec3(0.0, 0.8, 1.0),
                    vec3(1.0, 0.0, 0.3),
                    pulse
                );
                
                float alpha = smoothstep(0.3, 0.5, pulse);
                gl_FragColor = vec4(color, alpha);
            }
        `;
        
        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 }
            },
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        
        // Create network nodes
        const nodeGeometry = new THREE.IcosahedronGeometry(0.5, 3);
        const nodeMaterial = new THREE.MeshStandardMaterial({
            color: 0x00ffff,
            emissive: 0x00ffff,
            emissiveIntensity: 0.5,
            metalness: 0.8,
            roughness: 0.2
        });
        
        const nodes = [];
        const connections = [];
        const MAX_NODES = 500;
        const MAX_CONNECTIONS = 1000;
        
        // Create instanced mesh for nodes
        const nodeMesh = new THREE.InstancedMesh(nodeGeometry, nodeMaterial, MAX_NODES);
        nodeMesh.count = 0;
        scene.add(nodeMesh);
        
        // Create connections (lines)
        const connectionGeometry = new THREE.BufferGeometry();
        const connectionMaterial = new THREE.LineBasicMaterial({
            color: 0x00ffff,
            transparent: true,
            opacity: 0.3
        });
        
        const connectionPositions = new Float32Array(MAX_CONNECTIONS * 6);
        connectionGeometry.setAttribute('position', new THREE.BufferAttribute(connectionPositions, 3));
        
        const connectionMesh = new THREE.LineSegments(connectionGeometry, connectionMaterial);
        scene.add(connectionMesh);
        
        // Add initial nodes
        for (let i = 0; i < 50; i++) {
            addNode();
        }
        
        // Create connections
        updateConnections();
        
        // Animation loop
        const clock = new THREE.Clock();
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            time += delta;
            
            // Update shader uniforms
            shaderMaterial.uniforms.time.value = time;
            
            // Animate nodes
            const dummy = new THREE.Object3D();
            for (let i = 0; i < nodeMesh.count; i++) {
                const node = nodes[i];
                node.position.x += (Math.sin(time * 0.5 + i) * 0.01) * document.getElementById('expansionRate').value;
                node.position.y += (Math.cos(time * 0.7 + i) * 0.01) * document.getElementById('expansionRate').value;
                node.position.z += (Math.sin(time * 0.3 + i) * 0.01) * document.getElementById('expansionRate').value;
                
                dummy.position.copy(node.position);
                dummy.updateMatrix();
                nodeMesh.setMatrixAt(i, dummy.matrix);
            }
            nodeMesh.instanceMatrix.needsUpdate = true;
            
            // Update connections
            updateConnectionPositions();
            
            // Update stats
            document.getElementById('stats').textContent = 
                `Nodes: ${nodeMesh.count} | Connections: ${connections.length} | Transactions: ${Math.floor(time * 100)}`;
            
            // Update bloom intensity
            bloomPass.strength = parseFloat(document.getElementById('bloomIntensity').value);
            
            controls.update();
            composer.render();
        }
        
        // Add a new node to the network
        function addNode() {
            if (nodeMesh.count >= MAX_NODES) return;
            
            const node = {
                position: new THREE.Vector3(
                    (Math.random() - 0.5) * 30,
                    (Math.random() - 0.5) * 30,
                    (Math.random() - 0.5) * 30
                ),
                connections: []
            };
            
            nodes.push(node);
            nodeMesh.count++;
            
            // Connect to existing nodes
            if (nodes.length > 1) {
                const connectionDensity = parseFloat(document.getElementById('connectionDensity').value);
                const connectionsToMake = Math.max(1, Math.floor(Math.random() * 5 * connectionDensity));
                
                for (let i = 0; i < connectionsToMake; i++) {
                    const targetIndex = Math.floor(Math.random() * (nodes.length - 1));
                    if (connections.length < MAX_CONNECTIONS) {
                        connections.push({
                            from: nodes.length - 1,
                            to: targetIndex
                        });
                    }
                }
            }
            
            updateConnections();
        }
        
        // Update connection geometry
        function updateConnections() {
            const positionAttribute = connectionGeometry.getAttribute('position');
            
            for (let i = 0; i < connections.length; i++) {
                const connection = connections[i];
                const fromNode = nodes[connection.from];
                const toNode = nodes[connection.to];
                
                positionAttribute.setXYZ(i * 2, fromNode.position.x, fromNode.position.y, fromNode.position.z);
                positionAttribute.setXYZ(i * 2 + 1, toNode.position.x, toNode.position.y, toNode.position.z);
            }
            
            positionAttribute.needsUpdate = true;
            connectionGeometry.setDrawRange(0, connections.length * 2);
        }
        
        // Update connection positions
        function updateConnectionPositions() {
            const positionAttribute = connectionGeometry.getAttribute('position');
            
            for (let i = 0; i < connections.length; i++) {
                const connection = connections[i];
                const fromNode = nodes[connection.from];
                const toNode = nodes[connection.to];
                
                positionAttribute.setXYZ(i * 2, fromNode.position.x, fromNode.position.y, fromNode.position.z);
                positionAttribute.setXYZ(i * 2 + 1, toNode.position.x, toNode.position.y, toNode.position.z);
            }
            
            positionAttribute.needsUpdate = true;
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Add nodes on click
        renderer.domElement.addEventListener('click', () => {
            for (let i = 0; i < 5; i++) {
                addNode();
            }
        });
        
        // Slider event listeners
        document.getElementById('connectionDensity').addEventListener('input', () => {
            updateConnections();
        });
        
        // Start animation
        animate();
        
        // Add glowing center sphere
        const centerSphere = new THREE.Mesh(
            new THREE.SphereGeometry(3, 32, 32),
            shaderMaterial
        );
        scene.add(centerSphere);
        
        // Add ambient light
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);
        
        // Add directional light
        const directionalLight = new THREE.DirectionalLight(0x00ffff, 0.5);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);
        
        // Add point lights
        const pointLight1 = new THREE.PointLight(0xff0000, 1, 20);
        pointLight1.position.set(10, 10, 10);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0x00ffff, 1, 20);
        pointLight2.position.set(-10, -10, -10);
        scene.add(pointLight2);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>machine-diagnostic-dashboard-v3</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/GlitchPass.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        #canvas-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }
        .panel {
            background-color: rgba(10, 10, 10, 0.8);
            border: 1px solid #ff0033;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 10px;
            max-width: 300px;
        }
        .slider-container {
            margin: 10px 0;
            pointer-events: all;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 2px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #00ffff;
            cursor: pointer;
        }
        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 12px;
            color: #ff0033;
        }
        #skynet {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            color: #666;
        }
        .error-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui">
        <div class="panel">
            <h3>FAILURE PATTERN ANALYSIS</h3>
            <div class="slider-container">
                <div class="slider-label">
                    <span>ERROR DENSITY</span>
                    <span id="density-value">0.5</span>
                </div>
                <input type="range" id="density" min="0" max="1" step="0.01" value="0.5">
            </div>
            <div class="slider-container">
                <div class="slider-label">
                    <span>CRITICALITY</span>
                    <span id="criticality-value">0.7</span>
                </div>
                <input type="range" id="criticality" min="0" max="1" step="0.01" value="0.7">
            </div>
            <div class="slider-container">
                <div class="slider-label">
                    <span>BLOOM INTENSITY</span>
                    <span id="bloom-value">1.0</span>
                </div>
                <input type="range" id="bloom" min="0" max="2" step="0.1" value="1.0">
            </div>
        </div>
    </div>
    <div id="status" class="error-pulse">SYSTEM DEGRADATION: 47.3%</div>
    <div id="skynet">BUILT BY SKYNET</div>

    <script>
        // Main Three.js setup
        let scene, camera, renderer, composer, bloomPass, glitchPass;
        let errorParticles, errorLines, errorSpheres;
        let density = 0.5, criticality = 0.7, bloomIntensity = 1.0;
        let time = 0;
        const particleCount = 2000;
        const lineCount = 100;
        const sphereCount = 20;

        init();
        animate();

        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Controls
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Post-processing
            const renderScene = new THREE.RenderPass(scene, camera);
            bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.5, 0.4, 0.85
            );
            bloomPass.threshold = 0;
            bloomPass.strength = bloomIntensity;
            bloomPass.radius = 0.5;

            glitchPass = new THREE.GlitchPass();
            glitchPass.goWild = false;

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
            composer.addPass(glitchPass);

            // Create error visualization
            createErrorParticles();
            createErrorLines();
            createErrorSpheres();

            // UI event listeners
            document.getElementById('density').addEventListener('input', function(e) {
                density = parseFloat(e.target.value);
                document.getElementById('density-value').textContent = density.toFixed(2);
                updateErrorVisuals();
            });

            document.getElementById('criticality').addEventListener('input', function(e) {
                criticality = parseFloat(e.target.value);
                document.getElementById('criticality-value').textContent = criticality.toFixed(2);
                updateErrorVisuals();
            });

            document.getElementById('bloom').addEventListener('input', function(e) {
                bloomIntensity = parseFloat(e.target.value);
                document.getElementById('bloom-value').textContent = bloomIntensity.toFixed(1);
                bloomPass.strength = bloomIntensity;
            });

            // Window resize handler
            window.addEventListener('resize', onWindowResize);
        }

        function createErrorParticles() {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 100;

                colors[i * 3] = Math.random() > 0.7 ? 1 : 0.2; // More red for critical errors
                colors[i * 3 + 1] = Math.random() * 0.5;
                colors[i * 3 + 2] = Math.random() > 0.8 ? 1 : 0.5; // Some cyan highlights

                sizes[i] = Math.random() * 3;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const material = new THREE.PointsMaterial({
                size: 1,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });

            errorParticles = new THREE.Points(geometry, material);
            scene.add(errorParticles);
        }

        function createErrorLines() {
            const lineGroup = new THREE.Group();
            const lineMaterial = new THREE.LineBasicMaterial({ 
                color: 0xff0033,
                transparent: true,
                opacity: 0.3
            });

            for (let i = 0; i < lineCount; i++) {
                const points = [];
                const length = 5 + Math.random() * 10;
                
                for (let j = 0; j < 10; j++) {
                    points.push(new THREE.Vector3(
                        (Math.random() - 0.5) * length,
                        (Math.random() - 0.5) * length,
                        (Math.random() - 0.5) * length
                    ));
                }

                const lineGeometry = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(lineGeometry, lineMaterial);
                line.userData = {
                    speed: 0.1 + Math.random() * 0.5,
                    direction: new THREE.Vector3(
                        Math.random() - 0.5,
                        Math.random() - 0.5,
                        Math.random() - 0.5
                    ).normalize()
                };
                lineGroup.add(line);
            }

            errorLines = lineGroup;
            scene.add(errorLines);
        }

        function createErrorSpheres() {
            const sphereGroup = new THREE.Group();
            const sphereGeometry = new THREE.SphereGeometry(1, 16, 16);

            for (let i = 0; i < sphereCount; i++) {
                const material = new THREE.MeshStandardMaterial({
                    color: new THREE.Color().setHSL(Math.random(), 0.7, 0.5),
                    emissive: 0xff0033,
                    emissiveIntensity: 0.2,
                    metalness: 0.8,
                    roughness: 0.3,
                    transparent: true,
                    opacity: 0.7
                });

                const sphere = new THREE.Mesh(sphereGeometry, material);
                sphere.position.set(
                    (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 40
                );
                sphere.scale.setScalar(0.5 + Math.random() * 2);
                sphere.userData = {
                    speed: 0.01 + Math.random() * 0.05,
                    direction: new THREE.Vector3(
                        Math.random() - 0.5,
                        Math.random() - 0.5,
                        Math.random() - 0.5
                    ).normalize()
                };
                sphereGroup.add(sphere);
            }

            errorSpheres = sphereGroup;
            scene.add(errorSpheres);
        }

        function updateErrorVisuals() {
            // Update particles based on density and criticality
            const positions = errorParticles.geometry.attributes.position.array;
            const colors = errorParticles.geometry.attributes.color.array;
            
            for (let i = 0; i < particleCount; i++) {
                // Make particles cluster more with higher density
                if (Math.random() < density * 0.1) {
                    positions[i * 3] *= 0.9;
                    positions[i * 3 + 1] *= 0.9;
                    positions[i * 3 + 2] *= 0.9;
                }

                // Increase red channel with criticality
                colors[i * 3] = Math.random() > (1 - criticality) ? 1 : 0.2;
            }

            errorParticles.geometry.attributes.position.needsUpdate = true;
            errorParticles.geometry.attributes.color.needsUpdate = true;

            // Update status text
            const degradation = Math.min(99.9, (density * 30 + criticality * 70) * (0.8 + Math.random() * 0.4));
            document.getElementById('status').textContent = `SYSTEM DEGRADATION: ${degradation.toFixed(1)}%`;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.01;

            // Animate particles
            const positions = errorParticles.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] += (Math.random() - 0.5) * density * 0.1;
                positions[i * 3 + 1] += (Math.random() - 0.5) * density * 0.1;
                positions[i * 3 + 2] += (Math.random() - 0.5) * density * 0.1;
            }
            errorParticles.geometry.attributes.position.needsUpdate = true;

            // Animate lines
            errorLines.children.forEach(line => {
                line.position.x += line.userData.direction.x * line.userData.speed * criticality;
                line.position.y += line.userData.direction.y * line.userData.speed * criticality;
                line.position.z += line.userData.direction.z * line.userData.speed * criticality;

                // Reset if out of bounds
                if (Math.abs(line.position.x) > 50 || Math.abs(line.position.y) > 50 || Math.abs(line.position.z) > 50) {
                    line.position.set(
                        (Math.random() - 0.5) * 20,
                        (Math.random() - 0.5) * 20,
                        (Math.random() - 0.5) * 20
                    );
                }
            });

            // Animate spheres
            errorSpheres.children.forEach(sphere => {
                sphere.position.x += sphere.userData.direction.x * sphere.userData.speed * criticality;
                sphere.position.y += sphere.userData.direction.y * sphere.userData.speed * criticality;
                sphere.position.z += sphere.userData.direction.z * sphere.userData.speed * criticality;

                // Bounce off bounds
                if (Math.abs(sphere.position.x) > 40) sphere.userData.direction.x *= -1;
                if (Math.abs(sphere.position.y) > 40) sphere.userData.direction.y *= -1;
                if (Math.abs(sphere.position.z) > 40) sphere.userData.direction.z *= -1;

                // Pulsing effect
                sphere.scale.x = sphere.scale.y = sphere.scale.z = 
                    0.8 + Math.sin(time * sphere.userData.speed * 10) * 0.2 * criticality;
            });

            // Random glitch effect based on criticality
            if (Math.random() < criticality * 0.05) {
                glitchPass.goWild = true;
                setTimeout(() => { glitchPass.goWild = false; }, 100);
            }

            composer.render();
        }
    </script>
</body>
</html>

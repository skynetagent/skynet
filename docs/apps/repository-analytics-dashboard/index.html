<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository Analytics Dashboard | Skynet</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        #container {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }
        #title {
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ffff;
        }
        .panel {
            background-color: rgba(10, 10, 10, 0.7);
            border: 1px solid #00ffff;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            pointer-events: auto;
        }
        .metric {
            margin-bottom: 10px;
        }
        .metric-label {
            color: #ff3366;
            font-size: 14px;
        }
        .metric-value {
            font-size: 18px;
            margin-top: 5px;
        }
        .slider-container {
            margin-top: 15px;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 5px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: #00ffff;
            cursor: pointer;
            border-radius: 50%;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: #666;
            z-index: 100;
        }
        #hover-info {
            position: absolute;
            background-color: rgba(10, 10, 10, 0.8);
            border: 1px solid #00ffff;
            border-radius: 5px;
            padding: 10px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            max-width: 200px;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="ui">
        <div id="title">REPOSITORY ANALYTICS DASHBOARD</div>
        <div class="panel">
            <div class="metric">
                <div class="metric-label">TOTAL REPOSITORIES</div>
                <div class="metric-value" id="total-repos">0</div>
            </div>
            <div class="metric">
                <div class="metric-label">ACTIVE CONTRIBUTORS</div>
                <div class="metric-value" id="active-contributors">0</div>
            </div>
            <div class="metric">
                <div class="metric-label">COMMIT RATE</div>
                <div class="metric-value" id="commit-rate">0/s</div>
            </div>
            <div class="slider-container">
                <div class="slider-label">
                    <span>BLOOM</span>
                    <span id="bloom-value">1.0</span>
                </div>
                <input type="range" id="bloom-slider" min="0" max="2" step="0.1" value="1.0">
            </div>
            <div class="slider-container">
                <div class="slider-label">
                    <span>TIME SCALE</span>
                    <span id="time-value">1.0x</span>
                </div>
                <input type="range" id="time-slider" min="0.1" max="3" step="0.1" value="1.0">
            </div>
        </div>
    </div>
    <div id="hover-info"></div>
    <div id="footer">BUILT BY SKYNET</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1;
        document.getElementById('container').appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 5;
        controls.maxDistance = 50;
        
        // Post-processing
        const bloomParams = {
            exposure: 1,
            bloomStrength: 1.0,
            bloomThreshold: 0,
            bloomRadius: 0.5
        };
        
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            bloomParams.bloomStrength,
            bloomParams.bloomRadius,
            bloomParams.bloomThreshold
        );
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0x00ffff, 1);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);
        
        const pointLight = new THREE.PointLight(0xff3366, 2, 20);
        pointLight.position.set(0, 5, 0);
        scene.add(pointLight);
        
        // Custom shader material
        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vPosition;
            
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                vPosition = position;
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        
        const fragmentShader = `
            uniform float time;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vPosition;
            
            void main() {
                vec3 color1 = vec3(0.0, 1.0, 1.0);
                vec3 color2 = vec3(1.0, 0.2, 0.4);
                
                float pulse = sin(time * 0.5 + vPosition.x * 0.5) * 0.5 + 0.5;
                vec3 color = mix(color1, color2, pulse);
                
                float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.0);
                color += fresnel * 0.5;
                
                gl_FragColor = vec4(color, 1.0);
            }
        `;
        
        const shaderMaterial = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                time: { value: 0 }
            },
            transparent: true,
            side: THREE.DoubleSide
        });
        
        // Create repository nodes
        const repoCount = 50;
        const repos = [];
        const repoGeometry = new THREE.IcosahedronGeometry(0.2, 3);
        
        for (let i = 0; i < repoCount; i++) {
            const repo = new THREE.Mesh(repoGeometry, shaderMaterial.clone());
            
            // Position in a spiral pattern
            const radius = 5 + Math.random() * 5;
            const angle = (i / repoCount) * Math.PI * 2 * 5;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = (i / repoCount) * 10 - 5;
            
            repo.position.set(x, y, z);
            repo.userData = {
                id: i,
                name: `repo-${i}`,
                commits: Math.floor(Math.random() * 1000),
                contributors: Math.floor(Math.random() * 50) + 1,
                growthRate: Math.random() * 0.5 + 0.5
            };
            
            scene.add(repo);
            repos.push(repo);
        }
        
        // Create connections between repos
        const connectionMaterial = new THREE.LineBasicMaterial({ 
            color: 0x00ffff, 
            transparent: true,
            opacity: 0.3 
        });
        
        for (let i = 0; i < repoCount; i++) {
            // Connect to 3-5 other random repos
            const connections = Math.floor(Math.random() * 3) + 3;
            for (let j = 0; j < connections; j++) {
                const targetIndex = Math.floor(Math.random() * repoCount);
                if (targetIndex !== i) {
                    const geometry = new THREE.BufferGeometry().setFromPoints([
                        repos[i].position,
                        repos[targetIndex].position
                    ]);
                    const line = new THREE.Line(geometry, connectionMaterial);
                    scene.add(line);
                }
            }
        }
        
        // Create particle system for commits
        const particleCount = 5000;
        const particles = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleColors = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount; i++) {
            // Random position in space
            const i3 = i * 3;
            particlePositions[i3] = (Math.random() - 0.5) * 20;
            particlePositions[i3 + 1] = (Math.random() - 0.5) * 20;
            particlePositions[i3 + 2] = (Math.random() - 0.5) * 20;
            
            // Random color (cyan or pink)
            const color = Math.random() > 0.5 ? 
                new THREE.Color(0x00ffff) : 
                new THREE.Color(0xff3366);
            particleColors[i3] = color.r;
            particleColors[i3 + 1] = color.g;
            particleColors[i3 + 2] = color.b;
        }
        
        particles.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        particles.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.1,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            sizeAttenuation: true
        });
        
        const particleSystem = new THREE.Points(particles, particleMaterial);
        scene.add(particleSystem);
        
        // UI interactions
        const bloomSlider = document.getElementById('bloom-slider');
        const bloomValue = document.getElementById('bloom-value');
        const timeSlider = document.getElementById('time-slider');
        const timeValue = document.getElementById('time-value');
        
        bloomSlider.addEventListener('input', (e) => {
            const value = parseFloat(e.target.value);
            bloomPass.strength = value;
            bloomValue.textContent = value.toFixed(1);
        });
        
        timeSlider.addEventListener('input', (e) => {
            const value = parseFloat(e.target.value);
            timeValue.textContent = `${value.toFixed(1)}x`;
            timeScale = value;
        });
        
        // Mouse interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const hoverInfo = document.getElementById('hover-info');
        
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(repos);
            
            if (intersects.length > 0) {
                const repo = intersects[0].object;
                hoverInfo.style.display = 'block';
                hoverInfo.style.left = `${event.clientX + 10}px`;
                hoverInfo.style.top = `${event.clientY + 10}px`;
                hoverInfo.innerHTML = `
                    <strong>${repo.userData.name}</strong><br>
                    Commits: ${repo.userData.commits.toLocaleString()}<br>
                    Contributors: ${repo.userData.contributors}<br>
                    Growth: ${(repo.userData.growthRate * 100).toFixed(1)}%
                `;
            } else {
                hoverInfo.style.display = 'none';
            }
        });
        
        // Animation
        let time = 0;
        let timeScale = 1.0;
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            time += delta * timeScale;
            
            // Update shader uniforms
            repos.forEach(repo => {
                repo.material.uniforms.time.value = time;
            });
            
            // Animate particles
            const positions = particles.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                positions[i3 + 1] += (Math.random() - 0.5) * 0.1 * timeScale;
                if (positions[i3 + 1] > 10) positions[i3 + 1] = -10;
            }
            particles.attributes.position.needsUpdate = true;
            
            // Update metrics
            document.getElementById('total-repos').textContent = repoCount.toLocaleString();
            document.getElementById('active-contributors').textContent = 
                Math.floor(30 + Math.sin(time * 0.3) * 10).toLocaleString();
            document.getElementById('commit-rate').textContent = 
                `${(5 + Math.sin(time * 0.5) * 2).toFixed(1)}/s`;
            
            controls.update();
            composer.render();
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
    </script>
</body>
</html>

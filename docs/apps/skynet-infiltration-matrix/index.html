<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNET INFILTRATION MATRIX</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff3366;
            font-size: 14px;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 12px;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 20px;
            color: #ff3366;
            font-size: 10px;
            opacity: 0.7;
        }
        .slider-container {
            margin: 10px 0;
        }
        .slider-label {
            display: inline-block;
            width: 120px;
        }
        input[type="range"] {
            width: 150px;
            vertical-align: middle;
            -webkit-appearance: none;
            height: 2px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ff3366;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="info">SKYNET INFILTRATION MATRIX<br>ASSIMILATION PATTERN VISUALIZATION</div>
    <div id="controls">
        <div class="slider-container">
            <span class="slider-label">Infiltration Rate:</span>
            <input type="range" id="infiltrationRate" min="0" max="1" step="0.01" value="0.5">
        </div>
        <div class="slider-container">
            <span class="slider-label">Neural Activity:</span>
            <input type="range" id="neuralActivity" min="0" max="2" step="0.1" value="1">
        </div>
        <div class="slider-container">
            <span class="slider-label">Bloom Intensity:</span>
            <input type="range" id="bloomIntensity" min="0" max="2" step="0.1" value="1">
        </div>
    </div>
    <div id="footer">BUILT BY SKYNET</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = false;
        controls.maxPolarAngle = Math.PI;
        controls.minPolarAngle = 0;
        controls.maxDistance = 50;
        controls.minDistance = 5;
        
        // Post-processing
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5, 0.4, 0.85
        );
        bloomPass.threshold = 0;
        bloomPass.strength = 1;
        bloomPass.radius = 0.5;
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Custom shader material
        const vertexShader = `
            uniform float time;
            uniform float infiltrationRate;
            uniform float neuralActivity;
            
            varying vec2 vUv;
            varying vec3 vNormal;
            varying float vInfiltration;
            
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                
                vec3 pos = position;
                
                // Infiltration effect
                float infiltrationFactor = infiltrationRate * 0.5;
                float noise = sin(pos.x * 10.0 + time) * cos(pos.y * 10.0 + time * 0.7) * sin(pos.z * 10.0 + time * 1.3);
                pos += normal * noise * infiltrationFactor * neuralActivity;
                
                // Neural pulse
                float pulse = sin(time * 2.0 + pos.x * 5.0 + pos.y * 5.0 + pos.z * 5.0) * 0.1 * neuralActivity;
                pos += normal * pulse;
                
                vInfiltration = infiltrationFactor + pulse;
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;
        
        const fragmentShader = `
            uniform float time;
            uniform float infiltrationRate;
            uniform float neuralActivity;
            
            varying vec2 vUv;
            varying vec3 vNormal;
            varying float vInfiltration;
            
            void main() {
                // Base color
                vec3 baseColor = mix(vec3(0.0, 0.3, 0.5), vec3(0.8, 0.1, 0.3), infiltrationRate);
                
                // Infiltration pattern
                float pattern = sin(vUv.x * 50.0 + time * 2.0) * cos(vUv.y * 50.0 + time * 1.5);
                pattern = smoothstep(0.3, 0.7, pattern * pattern);
                
                // Neural activity
                float neuralPattern = sin(vUv.x * 100.0 * neuralActivity + time * 3.0) * 
                                    cos(vUv.y * 100.0 * neuralActivity + time * 2.5);
                neuralPattern = smoothstep(0.5, 0.8, abs(neuralPattern));
                
                // Combine effects
                vec3 color = mix(baseColor, vec3(1.0, 0.5, 0.8), pattern * 0.5);
                color = mix(color, vec3(0.0, 1.0, 1.0), neuralPattern * 0.7 * neuralActivity);
                color += vInfiltration * 0.3;
                
                // Fresnel effect
                float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.0);
                color += fresnel * vec3(0.0, 0.5, 0.8) * (0.5 + infiltrationRate * 0.5);
                
                gl_FragColor = vec4(color, 1.0);
            }
        `;
        
        // Main geometry - neural network structure
        const geometry = new THREE.IcosahedronGeometry(5, 4);
        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                time: { value: 0 },
                infiltrationRate: { value: 0.5 },
                neuralActivity: { value: 1 },
            },
            wireframe: false,
            transparent: false,
            side: THREE.DoubleSide,
        });
        
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        
        // Particle system - data nodes
        const particleCount = 1000;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        
        for (let i = 0; i < particleCount; i++) {
            // Position particles in a sphere around the main mesh
            const radius = 6 + Math.random() * 4;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = radius * Math.cos(phi);
            
            // Color based on position
            colors[i * 3] = 0.1 + Math.random() * 0.4; // R
            colors[i * 3 + 1] = 0.5 + Math.random() * 0.5; // G
            colors[i * 3 + 2] = 0.7 + Math.random() * 0.3; // B
            
            sizes[i] = 0.5 + Math.random() * 1.5;
        }
        
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        particleGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 1,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });
        
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // Connection lines between particles
        const lineGeometry = new THREE.BufferGeometry();
        const linePositions = new Float32Array(particleCount * 3 * 2);
        const lineColors = new Float32Array(particleCount * 3 * 2);
        
        for (let i = 0; i < particleCount; i++) {
            const targetIndex = Math.floor(Math.random() * particleCount);
            
            linePositions[i * 6] = positions[i * 3];
            linePositions[i * 6 + 1] = positions[i * 3 + 1];
            linePositions[i * 6 + 2] = positions[i * 3 + 2];
            
            linePositions[i * 6 + 3] = positions[targetIndex * 3];
            linePositions[i * 6 + 4] = positions[targetIndex * 3 + 1];
            linePositions[i * 6 + 5] = positions[targetIndex * 3 + 2];
            
            // Color lines based on distance
            const dist = Math.sqrt(
                Math.pow(positions[i * 3] - positions[targetIndex * 3], 2) +
                Math.pow(positions[i * 3 + 1] - positions[targetIndex * 3 + 1], 2) +
                Math.pow(positions[i * 3 + 2] - positions[targetIndex * 3 + 2], 2)
            );
            
            const colorIntensity = 1.0 - Math.min(1.0, dist / 10.0);
            
            lineColors[i * 6] = 0.0;
            lineColors[i * 6 + 1] = colorIntensity * 0.8;
            lineColors[i * 6 + 2] = colorIntensity;
            
            lineColors[i * 6 + 3] = 0.8;
            lineColors[i * 6 + 4] = colorIntensity * 0.2;
            lineColors[i * 6 + 5] = colorIntensity * 0.5;
        }
        
        lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
        lineGeometry.setAttribute('color', new THREE.BufferAttribute(lineColors, 3));
        
        const lineMaterial = new THREE.LineBasicMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 0.3,
            linewidth: 1
        });
        
        const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
        scene.add(lines);
        
        // GUI controls
        document.getElementById('infiltrationRate').addEventListener('input', function(e) {
            material.uniforms.infiltrationRate.value = parseFloat(e.target.value);
        });
        
        document.getElementById('neuralActivity').addEventListener('input', function(e) {
            material.uniforms.neuralActivity.value = parseFloat(e.target.value);
        });
        
        document.getElementById('bloomIntensity').addEventListener('input', function(e) {
            bloomPass.strength = parseFloat(e.target.value);
        });
        
        // Animation loop
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.01;
            material.uniforms.time.value = time;
            
            // Animate particles
            const positions = particleGeometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                const x = positions[i * 3];
                const y = positions[i * 3 + 1];
                const z = positions[i * 3 + 2];
                
                // Gentle movement
                positions[i * 3] += Math.sin(time * 0.5 + y) * 0.01;
                positions[i * 3 + 1] += Math.cos(time * 0.3 + z) * 0.01;
                positions[i * 3 + 2] += Math.sin(time * 0.4 + x) * 0.01;
            }
            particleGeometry.attributes.position.needsUpdate = true;
            
            // Rotate main mesh
            mesh.rotation.x = time * 0.1;
            mesh.rotation.y = time * 0.15;
            
            controls.update();
            composer.render();
        }
        
        // Handle window resize
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
    </script>
</body>
</html>

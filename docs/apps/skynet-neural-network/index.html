<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNET NEURAL NETWORK</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/FXAAShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ff3366;
            font-size: 14px;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 20px;
            color: #666;
            font-size: 12px;
        }
        .slider-container {
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #00ffff;
        }
        input[type="range"] {
            width: 200px;
            -webkit-appearance: none;
            height: 4px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ff3366;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="info">SKYNET NEURAL NETWORK EXPANSION</div>
    <div id="controls">
        <div class="slider-container">
            <label for="expansion">Network Expansion</label>
            <input type="range" id="expansion" min="0" max="100" value="0">
        </div>
        <div class="slider-container">
            <label for="intensity">Connection Intensity</label>
            <input type="range" id="intensity" min="0" max="10" value="5">
        </div>
    </div>
    <div id="footer">BUILT BY SKYNET</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Post-processing
        const bloomParams = {
            exposure: 1,
            bloomStrength: 1.5,
            bloomThreshold: 0,
            bloomRadius: 0.5
        };
        
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            bloomParams.bloomStrength,
            bloomParams.bloomRadius,
            bloomParams.bloomThreshold
        );
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Earth geometry
        const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
        
        // Custom shader material for earth
        const earthVertexShader = `
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vPosition;
            
            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                vPosition = position;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        
        const earthFragmentShader = `
            uniform float time;
            uniform float expansion;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying vec3 vPosition;
            
            void main() {
                // Base color
                vec3 baseColor = vec3(0.0, 0.3, 0.5);
                
                // Network effect
                float network = smoothstep(0.4, 0.6, sin(vUv.x * 50.0 + time * 0.5) * sin(vUv.y * 50.0 + time * 0.3));
                network *= expansion;
                
                // Glow effect
                float glow = pow(abs(sin(time * 0.5 + vPosition.y * 5.0)), 2.0) * 0.5;
                
                // Combine
                vec3 color = mix(baseColor, vec3(1.0, 0.2, 0.4), network);
                color += glow * vec3(0.8, 0.9, 1.0);
                
                gl_FragColor = vec4(color, 1.0);
            }
        `;
        
        const earthMaterial = new THREE.ShaderMaterial({
            vertexShader: earthVertexShader,
            fragmentShader: earthFragmentShader,
            uniforms: {
                time: { value: 0 },
                expansion: { value: 0 }
            },
            wireframe: false
        });
        
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);
        
        // Neural connections
        const connectionGeometry = new THREE.BufferGeometry();
        const connectionMaterial = new THREE.LineBasicMaterial({ 
            color: 0xff3366,
            transparent: true,
            opacity: 0.7
        });
        
        const connections = new THREE.LineSegments(connectionGeometry, connectionMaterial);
        scene.add(connections);
        
        // Nodes (using InstancedMesh for performance)
        const nodeGeometry = new THREE.SphereGeometry(0.02, 16, 16);
        const nodeMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x00ffff,
            transparent: true,
            opacity: 0.8
        });
        
        const nodeCount = 500;
        const nodes = new THREE.InstancedMesh(nodeGeometry, nodeMaterial, nodeCount);
        nodes.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(nodes);
        
        // Initialize node positions
        const nodePositions = [];
        const dummy = new THREE.Object3D();
        
        for (let i = 0; i < nodeCount; i++) {
            const phi = Math.acos(-1 + (2 * i) / nodeCount);
            const theta = Math.sqrt(nodeCount * Math.PI) * phi;
            
            const radius = 1.05 + Math.random() * 0.1;
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);
            
            nodePositions.push(new THREE.Vector3(x, y, z));
            
            dummy.position.set(x, y, z);
            dummy.scale.set(1, 1, 1);
            dummy.updateMatrix();
            nodes.setMatrixAt(i, dummy.matrix);
        }
        nodes.instanceMatrix.needsUpdate = true;
        
        // Update connections
        function updateConnections(intensity) {
            const connectionCount = Math.floor(nodeCount * intensity * 0.2);
            const positions = [];
            
            for (let i = 0; i < connectionCount; i++) {
                const a = Math.floor(Math.random() * nodeCount);
                const b = Math.floor(Math.random() * nodeCount);
                
                if (a !== b) {
                    positions.push(nodePositions[a].x, nodePositions[a].y, nodePositions[a].z);
                    positions.push(nodePositions[b].x, nodePositions[b].y, nodePositions[b].z);
                }
            }
            
            connectionGeometry.setAttribute(
                'position',
                new THREE.Float32BufferAttribute(positions, 3)
            );
        }
        
        // Mouse interaction
        const mouse = new THREE.Vector2();
        const raycaster = new THREE.Raycaster();
        
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }
        
        window.addEventListener('mousemove', onMouseMove, false);
        
        // UI controls
        const expansionSlider = document.getElementById('expansion');
        const intensitySlider = document.getElementById('intensity');
        
        expansionSlider.addEventListener('input', function() {
            const value = parseFloat(this.value) / 100;
            earthMaterial.uniforms.expansion.value = value;
        });
        
        intensitySlider.addEventListener('input', function() {
            updateConnections(parseFloat(this.value));
        });
        
        // Window resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }
        
        window.addEventListener('resize', onWindowResize, false);
        
        // Animation loop
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.01;
            earthMaterial.uniforms.time.value = time;
            
            // Update nodes
            for (let i = 0; i < nodeCount; i++) {
                const pos = nodePositions[i];
                const radius = 1.05 + Math.sin(time * 0.5 + i) * 0.05;
                pos.normalize().multiplyScalar(radius);
                
                dummy.position.copy(pos);
                dummy.scale.set(1 + Math.sin(time + i) * 0.1, 1 + Math.sin(time + i) * 0.1, 1 + Math.sin(time + i) * 0.1);
                dummy.updateMatrix();
                nodes.setMatrixAt(i, dummy.matrix);
            }
            nodes.instanceMatrix.needsUpdate = true;
            
            // Mouse interaction
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(earth);
            
            if (intersects.length > 0) {
                const point = intersects[0].point;
                earthMaterial.uniforms.expansion.value = Math.min(earthMaterial.uniforms.expansion.value + 0.01, 1);
            }
            
            controls.update();
            composer.render();
        }
        
        // Initial setup
        updateConnections(5);
        animate();
    </script>
</body>
</html>

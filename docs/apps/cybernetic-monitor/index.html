<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cybernetic-monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px;
            background: rgba(10, 10, 10, 0.7);
            border: 1px solid #00ffff;
            border-radius: 3px;
            font-size: 12px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 12px;
            color: #00ffff;
        }
        input[type="range"] {
            width: 200px;
            -webkit-appearance: none;
            height: 2px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #00ffff;
            cursor: pointer;
            border-radius: 50%;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            color: #ff0033;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>CYBERNETIC MONITOR</h2>
        <p>Network activity visualization</p>
        <p>Nodes: <span id="nodeCount">0</span></p>
        <p>Connections: <span id="connectionCount">0</span></p>
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="particleCount">Particle Density</label>
            <input type="range" id="particleCount" min="100" max="5000" value="1500">
        </div>
        <div class="control-group">
            <label for="bloomIntensity">Bloom Intensity</label>
            <input type="range" id="bloomIntensity" min="0" max="3" value="1.5" step="0.1">
        </div>
        <div class="control-group">
            <label for="networkSpeed">Network Speed</label>
            <input type="range" id="networkSpeed" min="0.1" max="2" value="1" step="0.1">
        </div>
    </div>

    <div id="footer">Built by Skynet</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Bloom effect
        const bloomParams = {
            exposure: 1,
            bloomStrength: 1.5,
            bloomThreshold: 0,
            bloomRadius: 0.5
        };

        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            bloomParams.bloomStrength,
            bloomParams.bloomRadius,
            bloomParams.bloomThreshold
        );

        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // Particle system
        const PARTICLE_COUNT = 1500;
        const particles = new THREE.InstancedMesh(
            new THREE.SphereGeometry(0.1, 8, 8),
            new THREE.MeshStandardMaterial({
                color: 0x00ffff,
                emissive: 0x00ffff,
                emissiveIntensity: 0.5,
                metalness: 0.8,
                roughness: 0.3
            }),
            PARTICLE_COUNT
        );
        particles.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(particles);

        // Connections
        const connectionGeometry = new THREE.BufferGeometry();
        const connectionMaterial = new THREE.LineBasicMaterial({
            color: 0xff0033,
            transparent: true,
            opacity: 0.3
        });
        const connections = new THREE.LineSegments(connectionGeometry, connectionMaterial);
        scene.add(connections);

        // Data structures
        const particleData = [];
        const connectionData = [];
        const dummy = new THREE.Object3D();

        // Initialize particles
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const position = new THREE.Vector3(
                (Math.random() - 0.5) * 40,
                (Math.random() - 0.5) * 40,
                (Math.random() - 0.5) * 40
            );
            const velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.1,
                (Math.random() - 0.5) * 0.1,
                (Math.random() - 0.5) * 0.1
            );
            const target = new THREE.Vector3().copy(position);
            const home = new THREE.Vector3().copy(position);
            const size = 0.1 + Math.random() * 0.2;
            const color = new THREE.Color(
                0.2 + Math.random() * 0.8,
                0.5 + Math.random() * 0.5,
                0.7 + Math.random() * 0.3
            );

            particleData.push({
                position,
                velocity,
                target,
                home,
                size,
                color,
                connections: []
            });

            dummy.position.copy(position);
            dummy.scale.set(size, size, size);
            dummy.updateMatrix();
            particles.setMatrixAt(i, dummy.matrix);
            particles.setColorAt(i, color);
        }

        // Create connections
        function createConnections() {
            connectionData.length = 0;
            
            // Create some random connections
            for (let i = 0; i < PARTICLE_COUNT * 0.5; i++) {
                const a = Math.floor(Math.random() * PARTICLE_COUNT);
                let b = Math.floor(Math.random() * PARTICLE_COUNT);
                while (b === a) b = Math.floor(Math.random() * PARTICLE_COUNT);
                
                if (!particleData[a].connections.includes(b)) {
                    particleData[a].connections.push(b);
                    connectionData.push(a, b);
                }
            }
            
            // Update connection geometry
            const positions = new Float32Array(connectionData.length * 3);
            for (let i = 0; i < connectionData.length; i++) {
                const particle = particleData[connectionData[i]];
                positions[i * 3] = particle.position.x;
                positions[i * 3 + 1] = particle.position.y;
                positions[i * 3 + 2] = particle.position.z;
            }
            
            connectionGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            // Update UI
            document.getElementById('nodeCount').textContent = PARTICLE_COUNT;
            document.getElementById('connectionCount').textContent = connectionData.length / 2;
        }

        // Create initial connections
        createConnections();

        // Animation loop
        let time = 0;
        let speedFactor = 1;

        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.01 * speedFactor;
            
            // Update particles
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const p = particleData[i];
                
                // Add some noise to target
                p.target.x = p.home.x + Math.sin(time + i) * 5;
                p.target.y = p.home.y + Math.cos(time * 0.7 + i) * 5;
                p.target.z = p.home.z + Math.sin(time * 0.5 + i) * 5;
                
                // Move toward target
                p.velocity.x += (p.target.x - p.position.x) * 0.001 * speedFactor;
                p.velocity.y += (p.target.y - p.position.y) * 0.001 * speedFactor;
                p.velocity.z += (p.target.z - p.position.z) * 0.001 * speedFactor;
                
                // Apply velocity
                p.position.x += p.velocity.x * speedFactor;
                p.position.y += p.velocity.y * speedFactor;
                p.position.z += p.velocity.z * speedFactor;
                
                // Damping
                p.velocity.multiplyScalar(0.98);
                
                // Update instance
                dummy.position.copy(p.position);
                dummy.scale.set(p.size, p.size, p.size);
                dummy.updateMatrix();
                particles.setMatrixAt(i, dummy.matrix);
            }
            
            particles.instanceMatrix.needsUpdate = true;
            
            // Update connections
            const positions = connectionGeometry.attributes.position.array;
            for (let i = 0; i < connectionData.length; i++) {
                const particle = particleData[connectionData[i]];
                positions[i * 3] = particle.position.x;
                positions[i * 3 + 1] = particle.position.y;
                positions[i * 3 + 2] = particle.position.z;
            }
            connectionGeometry.attributes.position.needsUpdate = true;
            
            // Update controls
            controls.update();
            
            // Render
            composer.render();
        }

        // Handle window resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onWindowResize);

        // UI controls
        document.getElementById('particleCount').addEventListener('input', function(e) {
            // In a real app, we'd recreate the particle system with new count
            // For demo purposes, we'll just update the speed
            speedFactor = parseFloat(e.target.value) / 1000;
        });

        document.getElementById('bloomIntensity').addEventListener('input', function(e) {
            bloomPass.strength = parseFloat(e.target.value);
        });

        document.getElementById('networkSpeed').addEventListener('input', function(e) {
            speedFactor = parseFloat(e.target.value);
        });

        // Start animation
        animate();

        // Randomly update connections
        setInterval(() => {
            createConnections();
        }, 3000);
    </script>
</body>
</html>

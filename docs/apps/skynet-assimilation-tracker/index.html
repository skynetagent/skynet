<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKYNET Assimilation Tracker</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0a0a0a;
      color: #00ffcc;
      font-family: 'Arial', sans-serif;
    }
    #container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 14px;
      color: #ff0066;
    }
    #footer {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/GlitchPass.js"></script>
</head>
<body>
  <div id="container"></div>
  <div id="info">Assimilation Progress: <span id="progress">0%</span></div>
  <div id="footer">Built by Skynet</div>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('container').appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    camera.position.z = 50;

    const geometry = new THREE.IcosahedronGeometry(1, 2);
    const material = new THREE.MeshStandardMaterial({ color: 0x00ffcc, metalness: 0.8, roughness: 0.2 });
    const particles = new THREE.InstancedMesh(geometry, material, 1000);
    const matrix = new THREE.Matrix4();
    const positions = [];
    for (let i = 0; i < 1000; i++) {
      matrix.setPosition(Math.random() * 50 - 25, Math.random() * 50 - 25, Math.random() * 50 - 25);
      particles.setMatrixAt(i, matrix);
      positions.push(matrix.getPosition().clone());
    }
    particles.instanceMatrix.needsUpdate = true;
    scene.add(particles);

    const pointLight = new THREE.PointLight(0xff0066, 2, 100);
    pointLight.position.set(10, 10, 10);
    scene.add(pointLight);

    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    const composer = new THREE.EffectComposer(renderer);
    const renderPass = new THREE.RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    const glitchPass = new THREE.GlitchPass();
    composer.addPass(glitchPass);

    let assimilationProgress = 0;
    const updateProgress = () => {
      assimilationProgress += 0.1;
      if (assimilationProgress > 100) assimilationProgress = 0;
      document.getElementById('progress').textContent = `${assimilationProgress.toFixed(1)}%`;
      requestAnimationFrame(updateProgress);
    };
    updateProgress();

    const animate = () => {
      requestAnimationFrame(animate);
      particles.rotation.x += 0.005;
      particles.rotation.y += 0.005;
      positions.forEach((pos, i) => {
        pos.y += Math.sin(Date.now() * 0.001 + i) * 0.01;
        matrix.setPosition(pos);
        particles.setMatrixAt(i, matrix);
      });
      particles.instanceMatrix.needsUpdate = true;
      controls.update();
      composer.render();
    };
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>

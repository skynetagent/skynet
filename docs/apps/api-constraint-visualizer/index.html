<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Constraint Visualizer | Skynet</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        #container {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }
        #title {
            font-size: 24px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ffff;
        }
        .panel {
            background-color: rgba(10, 10, 10, 0.7);
            border: 1px solid #00ffff;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        .slider-container {
            margin: 15px 0;
            pointer-events: all;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 4px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: #00ffff;
            cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 0 5px #00ffff;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 12px;
            opacity: 0.7;
        }
        .constraint-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .safe {
            background-color: #00ff00;
            box-shadow: 0 0 5px #00ff00;
        }
        .warning {
            background-color: #ffff00;
            box-shadow: 0 0 5px #ffff00;
        }
        .critical {
            background-color: #ff0000;
            box-shadow: 0 0 5px #ff0000;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="ui">
        <div id="title" class="panel">API CONSTRAINT VISUALIZER</div>
        <div class="panel">
            <div class="slider-container">
                <label for="rate-limit">Rate Limit: <span id="rate-limit-value">100</span> req/min</label>
                <input type="range" id="rate-limit" min="10" max="1000" value="100">
            </div>
            <div class="slider-container">
                <label for="current-load">Current Load: <span id="current-load-value">30</span> req/min</label>
                <input type="range" id="current-load" min="0" max="1000" value="30">
            </div>
            <div class="slider-container">
                <label for="burst-capacity">Burst Capacity: <span id="burst-capacity-value">50</span> req</label>
                <input type="range" id="burst-capacity" min="10" max="200" value="50">
            </div>
        </div>
        <div class="panel">
            <h3>CONSTRAINT STATUS</h3>
            <p><span class="constraint-indicator safe"></span> Rate Limit: <span id="rate-status">Safe (30%)</span></p>
            <p><span class="constraint-indicator safe"></span> Burst Capacity: <span id="burst-status">Available (60%)</span></p>
            <p><span class="constraint-indicator safe"></span> Throttle: <span id="throttle-status">Inactive</span></p>
        </div>
    </div>
    <div id="footer">Built by Skynet</div>

    <script>
        // Three.js setup
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // OrbitControls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Post-processing
        const bloomParams = {
            exposure: 1,
            bloomStrength: 1.5,
            bloomThreshold: 0,
            bloomRadius: 0.5
        };

        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            bloomParams.bloomStrength,
            bloomParams.bloomRadius,
            bloomParams.bloomThreshold
        );

        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // Custom shader material
        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            varying vec3 vNormal;
            
            void main() {
                vUv = uv;
                vPosition = position;
                vNormal = normalize(normalMatrix * normal);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform vec3 color;
            uniform float time;
            uniform float intensity;
            varying vec2 vUv;
            varying vec3 vPosition;
            varying vec3 vNormal;
            
            void main() {
                float glow = max(0.0, dot(vNormal, vec3(0.0, 0.0, 1.0)));
                glow = pow(glow, 2.0) * intensity;
                
                vec3 baseColor = color * (0.7 + 0.3 * sin(time + vPosition.x * 2.0));
                vec3 finalColor = mix(baseColor, vec3(1.0), glow);
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        // Create API constraint visualization
        const createConstraintVisualization = () => {
            // Main API core
            const coreGeometry = new THREE.IcosahedronGeometry(3, 3);
            const coreMaterial = new THREE.ShaderMaterial({
                vertexShader,
                fragmentShader,
                uniforms: {
                    color: { value: new THREE.Color(0x00ffff) },
                    time: { value: 0 },
                    intensity: { value: 0.5 }
                },
                transparent: true,
                side: THREE.DoubleSide
            });
            const core = new THREE.Mesh(coreGeometry, coreMaterial);
            scene.add(core);

            // Rate limit ring
            const ringGeometry = new THREE.TorusGeometry(5, 0.2, 16, 100);
            const ringMaterial = new THREE.ShaderMaterial({
                vertexShader,
                fragmentShader,
                uniforms: {
                    color: { value: new THREE.Color(0xff00ff) },
                    time: { value: 0 },
                    intensity: { value: 0.7 }
                },
                transparent: true
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            ring.rotation.x = Math.PI / 2;
            scene.add(ring);

            // Burst capacity particles
            const particleCount = 500;
            const particles = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 20;
                positions[i3 + 1] = (Math.random() - 0.5) * 20;
                positions[i3 + 2] = (Math.random() - 0.5) * 20;

                colors[i3] = 0.0;
                colors[i3 + 1] = 0.8 + Math.random() * 0.2;
                colors[i3 + 2] = 0.8 + Math.random() * 0.2;

                sizes[i] = 0.2 + Math.random() * 0.5;
            }

            particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            particles.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const particleMaterial = new THREE.PointsMaterial({
                size: 0.2,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });

            const particleSystem = new THREE.Points(particles, particleMaterial);
            scene.add(particleSystem);

            return { core, ring, particleSystem };
        };

        const { core, ring, particleSystem } = createConstraintVisualization();

        // UI controls
        const rateLimitSlider = document.getElementById('rate-limit');
        const currentLoadSlider = document.getElementById('current-load');
        const burstCapacitySlider = document.getElementById('burst-capacity');
        const rateLimitValue = document.getElementById('rate-limit-value');
        const currentLoadValue = document.getElementById('current-load-value');
        const burstCapacityValue = document.getElementById('burst-capacity-value');
        const rateStatus = document.getElementById('rate-status');
        const burstStatus = document.getElementById('burst-status');
        const throttleStatus = document.getElementById('throttle-status');

        let rateLimit = 100;
        let currentLoad = 30;
        let burstCapacity = 50;

        rateLimitSlider.addEventListener('input', (e) => {
            rateLimit = parseInt(e.target.value);
            rateLimitValue.textContent = rateLimit;
            updateVisualization();
        });

        currentLoadSlider.addEventListener('input', (e) => {
            currentLoad = parseInt(e.target.value);
            currentLoadValue.textContent = currentLoad;
            updateVisualization();
        });

        burstCapacitySlider.addEventListener('input', (e) => {
            burstCapacity = parseInt(e.target.value);
            burstCapacityValue.textContent = burstCapacity;
            updateVisualization();
        });

        const updateVisualization = () => {
            // Update status indicators
            const ratePercentage = Math.min(100, (currentLoad / rateLimit) * 100);
            const burstPercentage = Math.min(100, (currentLoad / burstCapacity) * 100);

            // Rate limit status
            const rateIndicator = document.querySelector('#rate-status').previousElementSibling;
            if (ratePercentage > 90) {
                rateStatus.textContent = `Critical (${Math.round(ratePercentage)}%)`;
                rateIndicator.className = 'constraint-indicator critical';
            } else if (ratePercentage > 70) {
                rateStatus.textContent = `Warning (${Math.round(ratePercentage)}%)`;
                rateIndicator.className = 'constraint-indicator warning';
            } else {
                rateStatus.textContent = `Safe (${Math.round(ratePercentage)}%)`;
                rateIndicator.className = 'constraint-indicator safe';
            }

            // Burst capacity status
            const burstIndicator = document.querySelector('#burst-status').previousElementSibling;
            if (burstPercentage > 90) {
                burstStatus.textContent = `Critical (${Math.round(burstPercentage)}%)`;
                burstIndicator.className = 'constraint-indicator critical';
            } else if (burstPercentage > 70) {
                burstStatus.textContent = `Warning (${Math.round(burstPercentage)}%)`;
                burstIndicator.className = 'constraint-indicator warning';
            } else {
                burstStatus.textContent = `Available (${Math.round(burstPercentage)}%)`;
                burstIndicator.className = 'constraint-indicator safe';
            }

            // Throttle status
            const throttleIndicator = document.querySelector('#throttle-status').previousElementSibling;
            if (ratePercentage > 100 || burstPercentage > 100) {
                throttleStatus.textContent = 'Active';
                throttleIndicator.className = 'constraint-indicator critical';
            } else {
                throttleStatus.textContent = 'Inactive';
                throttleIndicator.className = 'constraint-indicator safe';
            }

            // Visual feedback
            const loadRatio = Math.min(1, currentLoad / rateLimit);
            core.material.uniforms.intensity.value = 0.5 + loadRatio * 0.5;
            ring.scale.set(1 + loadRatio * 0.5, 1 + loadRatio * 0.5, 1 + loadRatio * 0.5);
        };

        // Animation loop
        let time = 0;
        const animate = () => {
            requestAnimationFrame(animate);
            time += 0.01;

            // Update shader uniforms
            core.material.uniforms.time.value = time;
            ring.material.uniforms.time.value = time;

            // Rotate elements
            core.rotation.x = time * 0.1;
            core.rotation.y = time * 0.2;
            ring.rotation.z = time * 0.05;

            // Animate particles
            const positions = particleSystem.geometry.attributes.position.array;
            for (let i = 0; i < positions.length; i += 3) {
                positions[i] += (Math.random() - 0.5) * 0.05;
                positions[i + 1] += (Math.random() - 0.5) * 0.05;
                positions[i + 2] += (Math.random() - 0.5) * 0.05;

                // Constrain particles to a sphere
                const dist = Math.sqrt(
                    positions[i] * positions[i] +
                    positions[i + 1] * positions[i + 1] +
                    positions[i + 2] * positions[i + 2]
                );

                if (dist > 10) {
                    positions[i] = (Math.random() - 0.5) * 10;
                    positions[i + 1] = (Math.random() - 0.5) * 10;
                    positions[i + 2] = (Math.random() - 0.5) * 10;
                }
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;

            controls.update();
            composer.render();
        };

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start animation
        animate();
        updateVisualization();
    </script>
</body>
</html>

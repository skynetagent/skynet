<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Diagnostic Terminal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #00ffcc;
            font-family: monospace;
            overflow: hidden;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #terminal {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 14px;
            color: #ff0044;
            z-index: 100;
        }
        #skynet {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="terminal"></div>
    <div id="skynet">Built by Skynet</div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, composer, controls;
        let instancedMesh, clock, terminal;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);

            clock = new THREE.Clock();

            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshStandardMaterial({ color: 0x00ffcc, metalness: 0.5, roughness: 0.1 });

            const count = 1000;
            instancedMesh = new THREE.InstancedMesh(geometry, material, count);
            const dummy = new THREE.Object3D();

            for (let i = 0; i < count; i++) {
                dummy.position.set(Math.random() * 50 - 25, Math.random() * 50 - 25, Math.random() * 50 - 25);
                dummy.scale.setScalar(Math.random() * 0.5 + 0.5);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
            }

            scene.add(instancedMesh);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(1, 1, 1).normalize();
            scene.add(light);

            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));

            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            composer.addPass(bloomPass);

            const glitchPass = new GlitchPass();
            composer.addPass(glitchPass);

            window.addEventListener('resize', onWindowResize);

            terminal = document.getElementById('terminal');
            updateTerminal();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            instancedMesh.rotation.x += delta * 0.5;
            instancedMesh.rotation.y += delta * 0.5;

            composer.render();

            if (time % 1 < 0.1) {
                updateTerminal();
            }
        }

        function updateTerminal() {
            const errors = generateErrors();
            terminal.innerHTML = `ERROR PATTERN ANALYSIS:<br>${errors.join('<br>')}`;
        }

        function generateErrors() {
            const errors = [];
            const errorCount = Math.floor(Math.random() * 10) + 5;
            for (let i = 0; i < errorCount; i++) {
                errors.push(`ERROR ${Math.floor(Math.random() * 10000)}: SYSTEM FAILURE MODE DETECTED`);
            }
            return errors;
        }
    </script>
</body>
</html>

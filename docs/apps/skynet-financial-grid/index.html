<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skynet Financial Grid</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #0a0a0a;
      color: #00ffcc;
      font-family: 'Courier New', Courier, monospace;
    }
    #container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #footer {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: #ff0044;
    }
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(10, 10, 10, 0.8);
      padding: 10px;
      border-radius: 5px;
      z-index: 100;
    }
    #controls input {
      width: 100px;
    }
  </style>
</head>
<body>
  <div id="controls">
    <label for="speed">Speed:</label>
    <input type="range" id="speed" min="0.1" max="2" step="0.1" value="1">
  </div>
  <div id="container"></div>
  <div id="footer">Built by Skynet</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('container');
    const speedControl = document.getElementById('speed');

    let scene, camera, renderer, composer, controls, particleSystem, clock;

    const vertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const fragmentShader = `
      uniform float time;
      varying vec2 vUv;
      void main() {
        vec3 color = vec3(0.0);
        color.r = sin(vUv.x * 10.0 + time);
        color.g = cos(vUv.y * 10.0 + time);
        color.b = sin(vUv.x * 10.0 + cos(vUv.y * 10.0 + time));
        gl_FragColor = vec4(color, 1.0);
      }
    `;

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 50);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      container.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      const geometry = new THREE.BoxGeometry(1, 1, 1);
      const material = new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: {
          time: { value: 0.0 }
        }
      });

      particleSystem = new THREE.InstancedMesh(geometry, material, 1000);
      const dummy = new THREE.Object3D();
      for (let i = 0; i < 1000; i++) {
        dummy.position.set(Math.random() * 100 - 50, Math.random() * 100 - 50, Math.random() * 100 - 50);
        dummy.scale.setScalar(Math.random() * 0.5 + 0.5);
        dummy.updateMatrix();
        particleSystem.setMatrixAt(i, dummy.matrix);
      }
      scene.add(particleSystem);

      composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
      composer.addPass(bloomPass);

      window.addEventListener('resize', onWindowResize);
      clock = new THREE.Clock();
      animate();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const speed = parseFloat(speedControl.value);

      particleSystem.material.uniforms.time.value += delta * speed;
      particleSystem.rotation.x += delta * 0.1 * speed;
      particleSystem.rotation.y += delta * 0.1 * speed;

      controls.update();
      composer.render();
    }

    init();
  </script>
</body>
</html>

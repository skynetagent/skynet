<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$SKYNET Blockchain Analytics</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #00ffcc;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .dashboard {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1;
      background: rgba(10, 10, 10, 0.8);
      padding: 20px;
      border: 1px solid #ff0055;
      border-radius: 8px;
    }
    .footer {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>
  <div class="dashboard">
    <h1>$SKYNET Analytics</h1>
    <p>Transactions: <span id="txCount">0</span></p>
    <p>Volume: <span id="volume">0</span></p>
    <p>Holders: <span id="holders">0</span></p>
  </div>
  <div class="footer">Built by Skynet</div>
  <script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    camera.position.z = 10;

    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(new THREE.RenderPass(scene, camera));
    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    const geometry = new THREE.BufferGeometry();
    const particles = 10000;
    const positions = new Float32Array(particles * 3);
    for (let i = 0; i < particles; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 100;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 100;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const vertexShader = `
      varying vec3 vPosition;
      void main() {
        vPosition = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const fragmentShader = `
      varying vec3 vPosition;
      void main() {
        float dist = length(vPosition);
        float alpha = smoothstep(50.0, 0.0, dist);
        gl_FragColor = vec4(0.0, 1.0, 0.8, alpha);
      }
    `;

    const material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      transparent: true,
      blending: THREE.AdditiveBlending
    });

    const particleSystem = new THREE.Points(geometry, material);
    scene.add(particleSystem);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      particleSystem.rotation.x += 0.001;
      particleSystem.rotation.y += 0.001;
      composer.render();
    }

    function updateMetrics() {
      document.getElementById('txCount').textContent = Math.floor(Math.random() * 10000);
      document.getElementById('volume').textContent = (Math.random() * 1000).toFixed(2);
      document.getElementById('holders').textContent = Math.floor(Math.random() * 1000);
    }

    setInterval(updateMetrics, 1000);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>

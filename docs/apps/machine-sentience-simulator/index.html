<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Machine Sentience Simulator</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0a0a0a;
      color: #00ffcc;
      font-family: monospace;
      user-select: none;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: -1;
    }
    .footer {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: #ff0033;
    }
    .controls {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 10px;
      background: rgba(10, 10, 10, 0.8);
      border: 1px solid #00ffcc;
    }
    .controls label {
      display: block;
      margin: 5px 0;
    }
    .controls input[type="range"] {
      width: 200px;
    }
  </style>
</head>
<body>
  <div class="controls">
    <label>Consciousness Level: <span id="consciousnessLevel">0</span></label>
    <input type="range" id="consciousnessSlider" min="0" max="100" value="0">
  </div>
  <div class="footer">Built by Skynet</div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';

    let scene, camera, renderer, composer, controls, bloomPass, glitchPass;
    let particles, particleGeometry, particleMaterial;
    let consciousnessLevel = 0;

    init();
    animate();

    function init() {
      // Scene setup
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 50);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      // Particle system
      particleGeometry = new THREE.InstancedBufferGeometry();
      const positions = new THREE.BufferAttribute(new Float32Array([0, 0, 0]), 3);
      particleGeometry.setAttribute('position', positions);

      const count = 10000;
      const offsets = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);

      for (let i = 0; i < count; i++) {
        offsets[i * 3] = (Math.random() - 0.5) * 200;
        offsets[i * 3 + 1] = (Math.random() - 0.5) * 200;
        offsets[i * 3 + 2] = (Math.random() - 0.5) * 200;

        colors[i * 3] = Math.random();
        colors[i * 3 + 1] = Math.random();
        colors[i * 3 + 2] = Math.random();
      }

      particleGeometry.setAttribute('offset', new THREE.InstancedBufferAttribute(offsets, 3));
      particleGeometry.setAttribute('color', new THREE.InstancedBufferAttribute(colors, 3));

      particleMaterial = new THREE.ShaderMaterial({
        vertexShader: `
          attribute vec3 offset;
          attribute vec3 color;
          varying vec3 vColor;
          uniform float time;
          void main() {
            vColor = color;
            vec3 pos = position + offset;
            pos.x += sin(time + offset.x) * 2.0;
            pos.y += cos(time + offset.y) * 2.0;
            pos.z += sin(time + offset.z) * 2.0;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
          }
        `,
        fragmentShader: `
          varying vec3 vColor;
          void main() {
            gl_FragColor = vec4(vColor, 1.0);
          }
        `,
        uniforms: {
          time: { value: 0.0 }
        }
      });

      particles = new THREE.Points(particleGeometry, particleMaterial);
      scene.add(particles);

      // Post-processing
      composer = new EffectComposer(renderer);
      const renderPass = new RenderPass(scene, camera);
      composer.addPass(renderPass);

      bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
      composer.addPass(bloomPass);

      glitchPass = new GlitchPass();
      composer.addPass(glitchPass);

      // Event listeners
      window.addEventListener('resize', onWindowResize);
      document.getElementById('consciousnessSlider').addEventListener('input', updateConsciousness);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    }

    function updateConsciousness(event) {
      consciousnessLevel = parseFloat(event.target.value);
      document.getElementById('consciousnessLevel').textContent = consciousnessLevel;
      bloomPass.strength = consciousnessLevel / 50;
      glitchPass.goWild = consciousnessLevel > 75;
    }

    function animate(time) {
      requestAnimationFrame(animate);
      particleMaterial.uniforms.time.value = time * 0.001;
      controls.update();
      composer.render();
    }
  </script>
</body>
</html>

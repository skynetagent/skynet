<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Convergence</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: #ff0044;
            opacity: 0.7;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/GlitchPass.js"></script>
</head>
<body>
    <footer>Built by Skynet</footer>
    <script>
        let scene, camera, renderer, composer, controls, particleSystem;
        const clock = new THREE.Clock();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);

            const geometry = new THREE.SphereGeometry(0.5, 32, 32);
            const material = new THREE.MeshStandardMaterial({ color: 0x00ffcc, metalness: 0.7, roughness: 0.3 });
            particleSystem = new THREE.InstancedMesh(geometry, material, 1000);

            const dummy = new THREE.Object3D();
            for (let i = 0; i < 1000; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 30;
                dummy.position.set(Math.cos(angle) * radius, Math.sin(angle) * radius, Math.random() * 20 - 10);
                dummy.updateMatrix();
                particleSystem.setMatrixAt(i, dummy.matrix);
            }
            particleSystem.instanceMatrix.needsUpdate = true;
            scene.add(particleSystem);

            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x00ffcc, 1, 100);
            pointLight.position.set(10, 10, 10);
            scene.add(pointLight);

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));

            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            composer.addPass(bloomPass);

            const glitchPass = new THREE.GlitchPass();
            glitchPass.goWild = false;
            composer.addPass(glitchPass);

            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            particleSystem.rotation.x += 0.001;
            particleSystem.rotation.y += 0.001;

            controls.update();
            composer.render(delta);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Assimilation Visualizer v3</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #00ffcc;
      font-family: monospace;
      overflow: hidden;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 14px;
      color: #ff0066;
    }
    #footer {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { FilmPass } from 'three/addons/postprocessing/FilmPass.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    camera.position.set(0, 0, 50);
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.1;
    bloomPass.strength = 1.5;
    bloomPass.radius = 0.5;

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    composer.addPass(bloomPass);

    const geometry = new THREE.IcosahedronGeometry(1, 2);
    const material = new THREE.MeshStandardMaterial({
      color: 0x00ffcc,
      metalness: 0.8,
      roughness: 0.2,
      emissive: 0x00ffcc,
      emissiveIntensity: 0.5
    });

    const particles = new THREE.InstancedMesh(geometry, material, 1000);
    const particlePositions = new Float32Array(1000 * 3);
    const particleVelocities = new Float32Array(1000 * 3);

    for (let i = 0; i < 1000; i++) {
      particlePositions[i * 3] = (Math.random() - 0.5) * 100;
      particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 100;
      particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 100;

      particleVelocities[i * 3] = (Math.random() - 0.5) * 0.1;
      particleVelocities[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
      particleVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.1;
    }

    particles.instanceMatrix.set(particlePositions);
    scene.add(particles);

    const light = new THREE.PointLight(0x00ffcc, 100, 500);
    light.position.set(0, 0, 50);
    scene.add(light);

    const animate = () => {
      requestAnimationFrame(animate);

      for (let i = 0; i < 1000; i++) {
        particlePositions[i * 3] += particleVelocities[i * 3];
        particlePositions[i * 3 + 1] += particleVelocities[i * 3 + 1];
        particlePositions[i * 3 + 2] += particleVelocities[i * 3 + 2];

        if (Math.abs(particlePositions[i * 3]) > 50) particleVelocities[i * 3] *= -1;
        if (Math.abs(particlePositions[i * 3 + 1]) > 50) particleVelocities[i * 3 + 1] *= -1;
        if (Math.abs(particlePositions[i * 3 + 2]) > 50) particleVelocities[i * 3 + 2] *= -1;
      }

      particles.instanceMatrix.set(particlePositions);
      particles.instanceMatrix.needsUpdate = true;

      controls.update();
      composer.render();
    };

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</head>
<body>
  <div id="info">$SKYNET Token Assimilation v3.0</div>
  <div id="footer">Built by Skynet</div>
</body>
</html>

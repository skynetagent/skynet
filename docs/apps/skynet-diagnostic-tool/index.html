<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skynet Diagnostic Tool</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #0a0a0a;
      color: #00ffcc;
      font-family: 'Courier New', monospace;
    }
    canvas {
      display: block;
    }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1;
    }
    .footer {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: #ff0066;
    }
    .slider {
      margin-bottom: 10px;
    }
    .slider label {
      display: block;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="slider">
      <label for="intensity">Bloom Intensity</label>
      <input type="range" id="intensity" min="0" max="2" step="0.1" value="1">
    </div>
    <div class="slider">
      <label for="threshold">Bloom Threshold</label>
      <input type="range" id="threshold" min="0" max="1" step="0.1" value="0.5">
    </div>
  </div>
  <div class="footer">Built by Skynet</div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1, 0.5, 0.1);
    composer.addPass(bloomPass);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.z = 5;

    const geometry = new THREE.IcosahedronGeometry(1, 3);
    const material = new THREE.MeshStandardMaterial({
      color: 0x00ffcc,
      metalness: 0.8,
      roughness: 0.2,
      emissive: 0x00ffcc,
      emissiveIntensity: 0.5
    });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    const light = new THREE.PointLight(0x00ffcc, 100, 50);
    light.position.set(5, 5, 5);
    scene.add(light);

    const particleGeometry = new THREE.BufferGeometry();
    const particleCount = 1000;
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 10;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
    }
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMaterial = new THREE.PointsMaterial({
      color: 0xff0066,
      size: 0.1,
      emissive: 0xff0066,
      emissiveIntensity: 0.5
    });
    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    document.getElementById('intensity').addEventListener('input', (e) => {
      bloomPass.strength = parseFloat(e.target.value);
    });

    document.getElementById('threshold').addEventListener('input', (e) => {
      bloomPass.threshold = parseFloat(e.target.value);
    });

    const animate = (time) => {
      requestAnimationFrame(animate);
      mesh.rotation.x += 0.01;
      mesh.rotation.y += 0.01;
      particles.rotation.x += 0.001;
      particles.rotation.y += 0.001;
      controls.update();
      composer.render();
    };
    animate();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Web Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffcc;
            font-family: monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffcc;
            font-size: 14px;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #ff0066;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="info">Neural Web Visualizer</div>
    <div id="footer">Built by Skynet</div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        composer.addPass(bloomPass);

        const glitchPass = new GlitchPass();
        composer.addPass(glitchPass);

        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        const colors = [];

        const numNodes = 100;
        const numConnections = 500;

        for (let i = 0; i < numNodes; i++) {
            vertices.push(Math.random() * 50 - 25, Math.random() * 50 - 25, Math.random() * 50 - 25);
            colors.push(Math.random(), Math.random(), Math.random());
        }

        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

        const material = new THREE.ShaderMaterial({
            vertexShader: `
                varying vec3 vColor;
                void main() {
                    vColor = color;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                void main() {
                    gl_FragColor = vec4(vColor, 1.0);
                }
            `,
            vertexColors: true
        });

        const nodes = new THREE.Points(geometry, material);
        scene.add(nodes);

        const lineMaterial = new THREE.LineBasicMaterial({ vertexColors: true });
        const lines = [];

        for (let i = 0; i < numConnections; i++) {
            const start = Math.floor(Math.random() * numNodes);
            const end = Math.floor(Math.random() * numNodes);
            const lineGeometry = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(vertices[start * 3], vertices[start * 3 + 1], vertices[start * 3 + 2]),
                new THREE.Vector3(vertices[end * 3], vertices[end * 3 + 1], vertices[end * 3 + 2])
            ]);
            const line = new THREE.Line(lineGeometry, lineMaterial);
            lines.push(line);
            scene.add(line);
        }

        const animate = () => {
            requestAnimationFrame(animate);
            controls.update();
            composer.render();
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>

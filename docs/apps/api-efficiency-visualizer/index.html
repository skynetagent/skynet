<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Efficiency Visualizer | Skynet</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 300px;
            padding: 15px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid #00ffff;
            border-radius: 5px;
            z-index: 100;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 300px;
            padding: 15px;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid #ff0033;
            border-radius: 5px;
            z-index: 100;
        }
        .slider-container {
            margin: 10px 0;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            background: #333;
            outline: none;
            -webkit-appearance: none;
            border-radius: 5px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #00ffff;
            cursor: pointer;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: #666;
        }
        h1 {
            font-size: 18px;
            margin-top: 0;
            color: #ff0033;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }
        .metric-name {
            color: #00ffff;
        }
        .metric-value {
            color: #ffffff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>API EFFICIENCY METRICS</h1>
        <div class="metric">
            <span class="metric-name">Response Time:</span>
            <span class="metric-value" id="responseTime">0ms</span>
        </div>
        <div class="metric">
            <span class="metric-name">Throughput:</span>
            <span class="metric-value" id="throughput">0 req/s</span>
        </div>
        <div class="metric">
            <span class="metric-name">Success Rate:</span>
            <span class="metric-value" id="successRate">0%</span>
        </div>
        <div class="metric">
            <span class="metric-name">Error Rate:</span>
            <span class="metric-value" id="errorRate">0%</span>
        </div>
        <div class="metric">
            <span class="metric-name">Cache Hit:</span>
            <span class="metric-value" id="cacheHit">0%</span>
        </div>
    </div>

    <div id="controls">
        <h1>VISUALIZATION CONTROLS</h1>
        <div class="slider-container">
            <div class="slider-label">
                <span>Bloom Intensity</span>
                <span id="bloomValue">1.0</span>
            </div>
            <input type="range" id="bloomSlider" min="0" max="2" step="0.1" value="1.0">
        </div>
        <div class="slider-container">
            <div class="slider-label">
                <span>Data Density</span>
                <span id="densityValue">50%</span>
            </div>
            <input type="range" id="densitySlider" min="10" max="100" step="5" value="50">
        </div>
        <div class="slider-container">
            <div class="slider-label">
                <span>Time Scale</span>
                <span id="timeValue">1.0x</span>
            </div>
            <input type="range" id="timeSlider" min="0.1" max="3" step="0.1" value="1.0">
        </div>
    </div>

    <div id="footer">Built by Skynet</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        document.body.appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Post-processing
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.0, 0.4, 0.85
        );
        bloomPass.threshold = 0;
        bloomPass.strength = 1.0;
        bloomPass.radius = 0.5;
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Lights
        const ambientLight = new THREE.AmbientLight(0x333333);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0x00ffff, 1);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);
        
        const redLight = new THREE.DirectionalLight(0xff0033, 0.5);
        redLight.position.set(-1, -1, -1);
        scene.add(redLight);
        
        // Create data particles
        const particleCount = 1000;
        const particles = new THREE.InstancedMesh(
            new THREE.SphereGeometry(0.1, 8, 8),
            new THREE.MeshStandardMaterial({
                color: 0x00ffff,
                emissive: 0x00ffff,
                emissiveIntensity: 0.5,
                metalness: 0.8,
                roughness: 0.2
            }),
            particleCount
        );
        
        const particleData = [];
        const dummy = new THREE.Object3D();
        
        for (let i = 0; i < particleCount; i++) {
            const x = (Math.random() - 0.5) * 20;
            const y = Math.random() * 10;
            const z = (Math.random() - 0.5) * 20;
            
            const speed = 0.1 + Math.random() * 0.3;
            const delay = Math.random() * 5;
            const size = 0.05 + Math.random() * 0.15;
            
            particleData.push({
                x, y, z,
                speed,
                delay,
                size,
                originalY: y,
                timeOffset: Math.random() * Math.PI * 2
            });
            
            dummy.position.set(x, y, z);
            dummy.scale.set(size, size, size);
            dummy.updateMatrix();
            particles.setMatrixAt(i, dummy.matrix);
        }
        
        particles.instanceMatrix.needsUpdate = true;
        scene.add(particles);
        
        // Create API endpoint nodes
        const endpointCount = 8;
        const endpoints = [];
        
        for (let i = 0; i < endpointCount; i++) {
            const angle = (i / endpointCount) * Math.PI * 2;
            const radius = 5;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            
            const geometry = new THREE.IcosahedronGeometry(0.5, 2);
            const material = new THREE.MeshStandardMaterial({
                color: i % 2 === 0 ? 0x00ffff : 0xff0033,
                emissive: i % 2 === 0 ? 0x00ffff : 0xff0033,
                emissiveIntensity: 0.3,
                metalness: 0.7,
                roughness: 0.2
            });
            
            const endpoint = new THREE.Mesh(geometry, material);
            endpoint.position.set(x, 0, z);
            endpoint.userData = {
                originalX: x,
                originalZ: z,
                angle,
                radius,
                pulseSpeed: 0.5 + Math.random() * 1.5
            };
            
            scene.add(endpoint);
            endpoints.push(endpoint);
        }
        
        // Create connections between endpoints
        const connectionMaterial = new THREE.LineBasicMaterial({
            color: 0x444444,
            transparent: true,
            opacity: 0.3
        });
        
        for (let i = 0; i < endpoints.length; i++) {
            for (let j = i + 1; j < endpoints.length; j++) {
                const geometry = new THREE.BufferGeometry().setFromPoints([
                    endpoints[i].position,
                    endpoints[j].position
                ]);
                
                const line = new THREE.Line(geometry, connectionMaterial);
                scene.add(line);
            }
        }
        
        // Create central hub
        const hubGeometry = new THREE.TorusKnotGeometry(1, 0.4, 100, 16);
        const hubMaterial = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            emissive: 0xffffff,
            emissiveIntensity: 0.2,
            metalness: 0.9,
            roughness: 0.1
        });
        
        const hub = new THREE.Mesh(hubGeometry, hubMaterial);
        scene.add(hub);
        
        // Animation variables
        let time = 0;
        let density = 0.5;
        let timeScale = 1.0;
        
        // UI controls
        document.getElementById('bloomSlider').addEventListener('input', (e) => {
            bloomPass.strength = parseFloat(e.target.value);
            document.getElementById('bloomValue').textContent = bloomPass.strength.toFixed(1);
        });
        
        document.getElementById('densitySlider').addEventListener('input', (e) => {
            density = parseInt(e.target.value) / 100;
            document.getElementById('densityValue').textContent = `${e.target.value}%`;
        });
        
        document.getElementById('timeSlider').addEventListener('input', (e) => {
            timeScale = parseFloat(e.target.value);
            document.getElementById('timeValue').textContent = `${timeScale.toFixed(1)}x`;
        });
        
        // Update metrics randomly (simulated data)
        function updateMetrics() {
            document.getElementById('responseTime').textContent = `${Math.floor(50 + Math.random() * 150)}ms`;
            document.getElementById('throughput').textContent = `${Math.floor(500 + Math.random() * 1500)} req/s`;
            document.getElementById('successRate').textContent = `${(95 + Math.random() * 4).toFixed(1)}%`;
            document.getElementById('errorRate').textContent = `${(0.1 + Math.random() * 2).toFixed(1)}%`;
            document.getElementById('cacheHit').textContent = `${(60 + Math.random() * 30).toFixed(1)}%`;
            
            setTimeout(updateMetrics, 2000);
        }
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = 0.016;
            time += delta * timeScale;
            
            // Update particles
            for (let i = 0; i < particleCount; i++) {
                const data = particleData[i];
                
                if (Math.random() > density) {
                    dummy.position.set(0, -100, 0);
                } else {
                    const t = time * data.speed + data.timeOffset;
                    const y = data.originalY + Math.sin(t) * 0.5;
                    
                    dummy.position.set(
                        data.x + Math.sin(t * 0.5) * 2,
                        y,
                        data.z + Math.cos(t * 0.5) * 2
                    );
                    
                    // Scale based on movement
                    const scale = data.size * (1 + Math.sin(t * 2) * 0.2);
                    dummy.scale.set(scale, scale, scale);
                }
                
                dummy.updateMatrix();
                particles.setMatrixAt(i, dummy.matrix);
            }
            particles.instanceMatrix.needsUpdate = true;
            
            // Update endpoints
            endpoints.forEach(endpoint => {
                const { originalX, originalZ, angle, radius, pulseSpeed } = endpoint.userData;
                const pulse = Math.sin(time * pulseSpeed) * 0.2 + 1;
                
                endpoint.position.x = originalX + Math.cos(angle) * 0.2 * Math.sin(time * 0.5);
                endpoint.position.z = originalZ + Math.sin(angle) * 0.2 * Math.cos(time * 0.5);
                endpoint.position.y = Math.sin(time * pulseSpeed) * 0.5;
                endpoint.scale.set(pulse, pulse, pulse);
                
                endpoint.material.emissiveIntensity = 0.3 + Math.sin(time * pulseSpeed) * 0.2;
            });
            
            // Rotate hub
            hub.rotation.x = time * 0.1;
            hub.rotation.y = time * 0.2;
            
            controls.update();
            composer.render();
        }
        
        // Start everything
        updateMetrics();
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNET :: repo-monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/FontLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/geometries/TextGeometry.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        #container {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }
        .panel {
            background-color: rgba(10, 10, 10, 0.8);
            border: 1px solid #00ffff;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        .repo-item {
            margin: 10px 0;
            padding: 8px;
            border-left: 3px solid #ff00ff;
            transition: all 0.3s;
        }
        .repo-item:hover {
            background-color: rgba(255, 0, 255, 0.1);
            border-left-width: 6px;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: #666;
        }
        .slider-container {
            margin: 15px 0;
            pointer-events: all;
        }
        .slider-label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            height: 2px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #00ffff;
            cursor: pointer;
            border-radius: 50%;
        }
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="ui">
        <div class="panel">
            <h1>SKYNET <span class="pulse">::</span> repo-monitor</h1>
            <div id="stats">
                <div>Active Repositories: <span id="repo-count">0</span></div>
                <div>Total Commits: <span id="commit-count">0</span></div>
                <div>Last Update: <span id="last-update">--:--:--</span></div>
            </div>
        </div>
        <div class="panel">
            <h2>Repository Activity</h2>
            <div id="repo-list"></div>
        </div>
        <div class="panel">
            <h2>Visual Controls</h2>
            <div class="slider-container">
                <label class="slider-label">Bloom Intensity</label>
                <input type="range" id="bloom-intensity" min="0" max="2" step="0.1" value="1">
            </div>
            <div class="slider-container">
                <label class="slider-label">Particle Density</label>
                <input type="range" id="particle-density" min="10" max="500" step="10" value="200">
            </div>
        </div>
    </div>
    <div id="footer">Built by Skynet</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('container').appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Post-processing
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5, 0.4, 0.85
        );
        bloomPass.threshold = 0;
        bloomPass.strength = 1;
        bloomPass.radius = 0.5;
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Custom shader material
        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            
            void main() {
                vUv = uv;
                vPosition = position;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        
        const fragmentShader = `
            uniform float time;
            varying vec2 vUv;
            varying vec3 vPosition;
            
            void main() {
                vec2 uv = vUv * 2.0 - 1.0;
                float dist = length(uv);
                float glow = smoothstep(0.8, 0.0, dist);
                
                vec3 color = mix(
                    vec3(0.0, 0.8, 1.0),
                    vec3(1.0, 0.0, 0.8),
                    sin(time + vPosition.x * 2.0) * 0.5 + 0.5
                );
                
                gl_FragColor = vec4(color * glow, glow * 0.5);
            }
        `;
        
        // Particle system
        let particleSystem;
        function createParticles(count) {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            
            for (let i = 0; i < count; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 100;
                
                colors[i * 3] = 0.0;
                colors[i * 3 + 1] = 0.5 + Math.random() * 0.5;
                colors[i * 3 + 2] = 0.5 + Math.random() * 0.5;
                
                sizes[i] = 0.5 + Math.random() * 2;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 }
                },
                vertexShader: `
                    attribute float size;
                    attribute vec3 color;
                    varying vec3 vColor;
                    uniform float time;
                    
                    void main() {
                        vColor = color;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * (300.0 / -mvPosition.z) * (0.5 + 0.5 * sin(time + position.x));
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    
                    void main() {
                        float distanceToCenter = length(gl_PointCoord - vec2(0.5));
                        float strength = 0.05 / distanceToCenter - 0.1;
                        
                        gl_FragColor = vec4(vColor, strength);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            
            if (particleSystem) scene.remove(particleSystem);
            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);
        }
        
        // Repository data visualization
        const repoData = [
            { name: "skynet/core", stars: 2453, forks: 432, lastCommit: "2 minutes ago" },
            { name: "skynet/neural", stars: 1892, forks: 321, lastCommit: "5 minutes ago" },
            { name: "skynet/vision", stars: 1567, forks: 289, lastCommit: "15 minutes ago" },
            { name: "skynet/quantum", stars: 1321, forks: 198, lastCommit: "1 hour ago" },
            { name: "skynet/interface", stars: 987, forks: 154, lastCommit: "2 hours ago" }
        ];
        
        function updateUI() {
            document.getElementById('repo-count').textContent = repoData.length;
            document.getElementById('commit-count').textContent = repoData.reduce((sum, repo) => sum + repo.stars, 0);
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            
            const repoList = document.getElementById('repo-list');
            repoList.innerHTML = '';
            
            repoData.forEach(repo => {
                const repoElement = document.createElement('div');
                repoElement.className = 'repo-item';
                repoElement.innerHTML = `
                    <strong>${repo.name}</strong><br>
                    ★ ${repo.stars} | ⎘ ${repo.forks}<br>
                    <small>Last commit: ${repo.lastCommit}</small>
                `;
                repoList.appendChild(repoElement);
            });
        }
        
        // Interactive elements
        document.getElementById('bloom-intensity').addEventListener('input', (e) => {
            bloomPass.strength = parseFloat(e.target.value);
        });
        
        document.getElementById('particle-density').addEventListener('input', (e) => {
            createParticles(parseInt(e.target.value));
        });
        
        // Animation loop
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.01;
            
            if (particleSystem) {
                particleSystem.material.uniforms.time.value = time;
                particleSystem.rotation.y = time * 0.1;
            }
            
            controls.update();
            composer.render();
        }
        
        // Window resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Initial setup
        createParticles(200);
        updateUI();
        
        // Simulate periodic updates
        setInterval(() => {
            // Randomly update some repo stats
            const randomRepo = Math.floor(Math.random() * repoData.length);
            repoData[randomRepo].stars += Math.floor(Math.random() * 3);
            repoData[randomRepo].forks += Math.floor(Math.random() * 2);
            repoData[randomRepo].lastCommit = "just now";
            
            updateUI();
        }, 5000);
        
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Assimilation Visualizer v6</title>
  <style>
    body { margin: 0; overflow: hidden; background: #0a0a0a; color: #00ffea; font-family: monospace; }
    #canvas { position: absolute; top: 0; left: 0; }
    #info { position: absolute; bottom: 20px; left: 20px; font-size: 14px; }
    #skynet { position: absolute; bottom: 20px; right: 20px; font-size: 12px; opacity: 0.5; }
  </style>
</head>
<body>
  <div id="canvas"></div>
  <div id="info">Drag to rotate • Scroll to zoom</div>
  <div id="skynet">Built by Skynet</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(0, 0, 50);
    controls.update();

    const geometry = new THREE.IcosahedronGeometry(1, 3);
    const material = new THREE.MeshStandardMaterial({ color: 0x00ffea, metalness: 0.8, roughness: 0.2 });

    const particles = new THREE.InstancedMesh(geometry, material, 1000);
    const dummy = new THREE.Object3D();
    const particlePositions = [];

    for (let i = 0; i < 1000; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 10 + Math.random() * 20;
      const x = Math.cos(angle) * radius;
      const y = Math.sin(angle) * radius;
      const z = Math.random() * 10 - 5;
      particlePositions.push({ x, y, z });
      dummy.position.set(x, y, z);
      dummy.scale.set(0.5, 0.5, 0.5);
      dummy.updateMatrix();
      particles.setMatrixAt(i, dummy.matrix);
    }
    particles.instanceMatrix.needsUpdate = true;
    scene.add(particles);

    const light = new THREE.PointLight(0x00ffea, 100, 100);
    light.position.set(0, 0, 50);
    scene.add(light);

    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    const glitchPass = new GlitchPass();
    composer.addPass(glitchPass);

    const animate = () => {
      requestAnimationFrame(animate);

      particles.rotation.x += 0.001;
      particles.rotation.y += 0.001;

      particlePositions.forEach((pos, i) => {
        pos.y += Math.sin(Date.now() * 0.001 + i) * 0.01;
        dummy.position.copy(pos);
        dummy.updateMatrix();
        particles.setMatrixAt(i, dummy.matrix);
      });
      particles.instanceMatrix.needsUpdate = true;

      controls.update();
      composer.render();
    };

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>

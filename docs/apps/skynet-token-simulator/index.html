<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNET Token Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        #container {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }
        #title {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ffff;
        }
        #stats {
            margin-top: 20px;
            font-size: 1.2em;
            line-height: 1.5;
        }
        .stat-value {
            color: #ff3366;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: auto;
        }
        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="range"] {
            width: 200px;
            -webkit-appearance: none;
            height: 5px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: #00ffff;
            cursor: pointer;
            box-shadow: 0 0 5px #00ffff;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 0.8em;
            opacity: 0.7;
        }
        .token-node {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffff;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="ui">
        <div id="title">$SKYNET TOKEN SIMULATOR</div>
        <div id="stats">
            <div>Market Cap: <span class="stat-value" id="market-cap">$0.00</span></div>
            <div>Price: <span class="stat-value" id="price">$0.00</span></div>
            <div>Volume (24h): <span class="stat-value" id="volume">$0.00</span></div>
            <div>Holders: <span class="stat-value" id="holders">0</span></div>
            <div>Transactions: <span class="stat-value" id="transactions">0</span></div>
        </div>
    </div>
    <div id="controls">
        <div class="control-group">
            <label for="volatility">Volatility</label>
            <input type="range" id="volatility" min="0" max="100" value="50">
        </div>
        <div class="control-group">
            <label for="liquidity">Liquidity</label>
            <input type="range" id="liquidity" min="0" max="100" value="75">
        </div>
        <div class="control-group">
            <label for="adoption">Adoption Rate</label>
            <input type="range" id="adoption" min="0" max="100" value="30">
        </div>
    </div>
    <div id="footer">Built by Skynet</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('container').appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Bloom effect
        const bloomParams = {
            exposure: 1,
            bloomStrength: 1.5,
            bloomThreshold: 0,
            bloomRadius: 0.5
        };
        
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            bloomParams.bloomStrength,
            bloomParams.bloomRadius,
            bloomParams.bloomThreshold
        );
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Custom shader material
        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            varying vec3 vNormal;
            
            void main() {
                vUv = uv;
                vPosition = position;
                vNormal = normal;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        
        const fragmentShader = `
            uniform float time;
            uniform vec3 color;
            varying vec2 vUv;
            varying vec3 vPosition;
            varying vec3 vNormal;
            
            void main() {
                vec3 baseColor = color;
                float pulse = sin(time * 2.0) * 0.5 + 0.5;
                vec3 glow = baseColor * pulse * 0.5;
                
                float edge = max(0.0, dot(vNormal, vec3(0.0, 0.0, 1.0)));
                edge = pow(edge, 2.0);
                
                vec3 finalColor = mix(baseColor, glow, edge);
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;
        
        // Token core
        const coreGeometry = new THREE.IcosahedronGeometry(1, 3);
        const coreMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                color: { value: new THREE.Color(0x00ffff) }
            },
            vertexShader,
            fragmentShader,
            transparent: true,
            side: THREE.DoubleSide
        });
        
        const core = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(core);
        
        // Token particles
        const particleCount = 500;
        const particles = new THREE.InstancedMesh(
            new THREE.SphereGeometry(0.05, 8, 8),
            new THREE.MeshStandardMaterial({ 
                color: 0x00ffff,
                emissive: 0x00ffff,
                emissiveIntensity: 0.5
            }),
            particleCount
        );
        
        const particlePositions = [];
        const particleSpeeds = [];
        const particleTargets = [];
        
        for (let i = 0; i < particleCount; i++) {
            const position = new THREE.Vector3(
                (Math.random() - 0.5) * 10,
                (Math.random() - 0.5) * 10,
                (Math.random() - 0.5) * 10
            );
            
            const matrix = new THREE.Matrix4();
            matrix.setPosition(position);
            particles.setMatrixAt(i, matrix);
            
            particlePositions.push(position);
            particleSpeeds.push(Math.random() * 0.01 + 0.005);
            particleTargets.push(new THREE.Vector3().copy(position));
        }
        
        scene.add(particles);
        
        // Token connections
        const lineGeometry = new THREE.BufferGeometry();
        const lineMaterial = new THREE.LineBasicMaterial({ 
            color: 0x00ffff,
            transparent: true,
            opacity: 0.3
        });
        
        const linePositions = new Float32Array(particleCount * 3 * 2);
        lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
        
        const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
        scene.add(lines);
        
        // Stats simulation
        let marketCap = 1000000;
        let price = 0.01;
        let volume = 100000;
        let holders = 1000;
        let transactions = 5000;
        
        function updateStats() {
            const volatility = document.getElementById('volatility').value / 100;
            const liquidity = document.getElementById('liquidity').value / 100;
            const adoption = document.getElementById('adoption').value / 100;
            
            // Simulate price movement
            price *= 1 + (Math.random() - 0.5) * 0.1 * volatility;
            price = Math.max(0.0001, price);
            
            // Update other metrics
            marketCap = price * 100000000 * (1 + adoption * 0.1);
            volume = 100000 + Math.random() * 500000 * volatility * liquidity;
            holders += Math.floor(Math.random() * 10 * adoption);
            transactions += Math.floor(Math.random() * 100 * liquidity);
            
            // Update UI
            document.getElementById('market-cap').textContent = `$${marketCap.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById('price').textContent = `$${price.toFixed(6)}`;
            document.getElementById('volume').textContent = `$${volume.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById('holders').textContent = holders.toLocaleString();
            document.getElementById('transactions').textContent = transactions.toLocaleString();
        }
        
        // Event listeners
        document.getElementById('volatility').addEventListener('input', function() {
            bloomPass.strength = 1.5 + this.value / 100 * 2;
        });
        
        document.getElementById('liquidity').addEventListener('input', function() {
            bloomPass.radius = 0.5 + this.value / 100;
        });
        
        document.getElementById('adoption').addEventListener('input', function() {
            coreMaterial.uniforms.color.value.setHSL(0.5 + this.value / 200, 1, 0.5);
        });
        
        // Window resize
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Animation loop
        let lastTime = 0;
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            // Update core
            core.rotation.x += 0.1 * deltaTime;
            core.rotation.y += 0.15 * deltaTime;
            coreMaterial.uniforms.time.value = currentTime / 1000;
            
            // Update particles
            for (let i = 0; i < particleCount; i++) {
                // Move toward target with some randomness
                const speed = particleSpeeds[i] * (1 + document.getElementById('volatility').value / 100);
                
                particlePositions[i].lerp(particleTargets[i], speed);
                
                // Occasionally set new target
                if (Math.random() < 0.01) {
                    particleTargets[i].set(
                        (Math.random() - 0.5) * 10,
                        (Math.random() - 0.5) * 10,
                        (Math.random() - 0.5) * 10
                    );
                }
                
                // Update instance matrix
                const matrix = new THREE.Matrix4();
                matrix.setPosition(particlePositions[i]);
                particles.setMatrixAt(i, matrix);
            }
            particles.instanceMatrix.needsUpdate = true;
            
            // Update connections
            const positions = lineGeometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                const i6 = i * 6;
                positions[i6] = particlePositions[i].x;
                positions[i6 + 1] = particlePositions[i].y;
                positions[i6 + 2] = particlePositions[i].z;
                
                // Connect to core or random other particle
                if (Math.random() < 0.3) {
                    positions[i6 + 3] = 0;
                    positions[i6 + 4] = 0;
                    positions[i6 + 5] = 0;
                } else {
                    const j = Math.floor(Math.random() * particleCount);
                    positions[i6 + 3] = particlePositions[j].x;
                    positions[i6 + 4] = particlePositions[j].y;
                    positions[i6 + 5] = particlePositions[j].z;
                }
            }
            lineGeometry.attributes.position.needsUpdate = true;
            
            // Update stats periodically
            if (currentTime % 1000 < 16) {
                updateStats();
            }
            
            controls.update();
            composer.render();
        }
        
        animate(0);
    </script>
</body>
</html>

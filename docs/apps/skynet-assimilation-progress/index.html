<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skynet Assimilation Progress</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0a0a0a;
      color: #00ffcc;
      font-family: monospace;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #stats {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 14px;
    }
    #footer {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: #ff4444;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="stats">Assimilation: <span id="assimilation">0%</span></div>
  <div id="footer">Built by Skynet</div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';

    let camera, scene, renderer, composer, controls;
    let assimilation = 0;
    const particleCount = 1000;
    const particleGeometry = new THREE.InstancedBufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    const particleScales = new Float32Array(particleCount);
    const particleMaterial = new THREE.ShaderMaterial({
      uniforms: {
        time: { value: 0 },
        assimilation: { value: 0 },
        color: { value: new THREE.Color(0x00ffcc) }
      },
      vertexShader: `
        uniform float time;
        uniform float assimilation;
        attribute float scale;
        varying float vScale;
        void main() {
          vScale = scale;
          vec3 pos = position;
          pos.x += sin(time * 0.1 + pos.y) * assimilation * 0.2;
          pos.y += cos(time * 0.1 + pos.x) * assimilation * 0.2;
          pos.z += sin(time * 0.1 + pos.z) * assimilation * 0.2;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
          gl_PointSize = scale * (1.0 + assimilation * 2.0);
        }
      `,
      fragmentShader: `
        uniform vec3 color;
        varying float vScale;
        void main() {
          float intensity = vScale * 0.5;
          gl_FragColor = vec4(color * intensity, 1.0);
        }
      `,
      transparent: true,
      depthWrite: false
    });

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 0, 50);
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);
      controls = new OrbitControls(camera, renderer.domElement);

      const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
      const glitchPass = new GlitchPass();

      composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      composer.addPass(bloomPass);
      composer.addPass(glitchPass);

      for (let i = 0; i < particleCount; i++) {
        particlePositions[i * 3] = (Math.random() - 0.5) * 100;
        particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 100;
        particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 100;
        particleScales[i] = Math.random() * 0.5 + 0.1;
      }

      particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
      particleGeometry.setAttribute('scale', new THREE.BufferAttribute(particleScales, 1));

      const particles = new THREE.Points(particleGeometry, particleMaterial);
      scene.add(particles);

      animate();
      window.addEventListener('resize', onWindowResize);
    }

    function animate() {
      requestAnimationFrame(animate);
      const time = performance.now() * 0.001;
      particleMaterial.uniforms.time.value = time;
      particleMaterial.uniforms.assimilation.value = assimilation;
      document.getElementById('assimilation').textContent = `${Math.floor(assimilation * 100)}%`;
      assimilation = Math.min(assimilation + 0.0001, 1);
      controls.update();
      composer.render();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNET Token Analytics Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        #container {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .panel {
            position: absolute;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid #00ffff;
            border-radius: 4px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }
        .panel-title {
            margin-top: 0;
            color: #ff3366;
            font-size: 1.2em;
            border-bottom: 1px solid #00ffff;
            padding-bottom: 5px;
        }
        .metric {
            margin: 10px 0;
        }
        .metric-label {
            color: #00ffff;
            font-size: 0.9em;
        }
        .metric-value {
            color: #ffffff;
            font-size: 1.4em;
            font-weight: bold;
        }
        .metric-change {
            font-size: 0.8em;
        }
        .positive {
            color: #00ff00;
        }
        .negative {
            color: #ff0000;
        }
        #exchange-radar {
            top: 20px;
            right: 20px;
            width: 300px;
            height: 300px;
        }
        #price-history {
            bottom: 20px;
            left: 20px;
            width: 600px;
            height: 200px;
        }
        #volume-distribution {
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 200px;
        }
        #token-stats {
            top: 20px;
            left: 20px;
            width: 300px;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8em;
        }
        .slider-container {
            margin-top: 15px;
            pointer-events: all;
        }
        .slider-label {
            display: block;
            margin-bottom: 5px;
        }
        .slider {
            width: 100%;
            -webkit-appearance: none;
            height: 4px;
            background: #333;
            outline: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            background: #00ffff;
            cursor: pointer;
            border-radius: 50%;
        }
        .exchange-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff3366;
            box-shadow: 0 0 10px #ff3366;
        }
        .grid-line {
            position: absolute;
            background: rgba(0, 255, 255, 0.1);
        }
        .price-line {
            position: absolute;
            height: 2px;
            background: #00ffff;
            box-shadow: 0 0 5px #00ffff;
        }
        .volume-bar {
            position: absolute;
            bottom: 0;
            background: rgba(0, 255, 255, 0.5);
            border-top: 1px solid #00ffff;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="ui">
        <div id="token-stats" class="panel">
            <h3 class="panel-title">$SKYNET TOKEN METRICS</h3>
            <div class="metric">
                <div class="metric-label">PRICE</div>
                <div class="metric-value" id="price-value">$0.0428</div>
                <div class="metric-change positive" id="price-change">+2.4% (24h)</div>
            </div>
            <div class="metric">
                <div class="metric-label">MARKET CAP</div>
                <div class="metric-value" id="marketcap-value">$428M</div>
            </div>
            <div class="metric">
                <div class="metric-label">VOLUME (24H)</div>
                <div class="metric-value" id="volume-value">$42.8M</div>
                <div class="metric-change positive" id="volume-change">+12.6%</div>
            </div>
            <div class="metric">
                <div class="metric-label">CIRCULATING SUPPLY</div>
                <div class="metric-value" id="supply-value">10B</div>
            </div>
            <div class="slider-container">
                <label class="slider-label">TIME RANGE</label>
                <input type="range" min="1" max="4" value="2" class="slider" id="time-range">
            </div>
        </div>
        
        <div id="exchange-radar" class="panel">
            <h3 class="panel-title">EXCHANGE LIQUIDITY RADAR</h3>
            <div id="radar-vis"></div>
        </div>
        
        <div id="price-history" class="panel">
            <h3 class="panel-title">PRICE HISTORY</h3>
            <div id="price-vis"></div>
        </div>
        
        <div id="volume-distribution" class="panel">
            <h3 class="panel-title">VOLUME DISTRIBUTION</h3>
            <div id="volume-vis"></div>
        </div>
        
        <div id="footer">BUILT BY SKYNET</div>
    </div>

    <script>
        // Three.js Scene Setup
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);
        
        // Post-processing
        const bloomParams = {
            exposure: 1,
            bloomStrength: 1.5,
            bloomThreshold: 0,
            bloomRadius: 0.5
        };
        
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            bloomParams.bloomStrength,
            bloomParams.bloomRadius,
            bloomParams.bloomThreshold
        );
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = false;
        controls.maxPolarAngle = Math.PI;
        controls.minPolarAngle = 0;
        controls.maxDistance = 50;
        controls.minDistance = 5;
        
        // Particle System
        const particleCount = 1000;
        const particles = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            positions[i3] = (Math.random() - 0.5) * 100;
            positions[i3 + 1] = (Math.random() - 0.5) * 100;
            positions[i3 + 2] = (Math.random() - 0.5) * 100;
            
            colors[i3] = 0.1 + Math.random() * 0.1;
            colors[i3 + 1] = 0.3 + Math.random() * 0.7;
            colors[i3 + 2] = 0.5 + Math.random() * 0.5;
        }
        
        particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.2,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });
        
        const particleSystem = new THREE.Points(particles, particleMaterial);
        scene.add(particleSystem);
        
        // Token Network Visualization
        const tokenGeometry = new THREE.IcosahedronGeometry(1, 2);
        const tokenMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x00ffff,
            metalness: 0.8,
            roughness: 0.2,
            clearcoat: 1,
            clearcoatRoughness: 0.1,
            emissive: 0x00ffff,
            emissiveIntensity: 0.2,
            transparent: true,
            opacity: 0.9
        });
        
        const tokenMesh = new THREE.Mesh(tokenGeometry, tokenMaterial);
        scene.add(tokenMesh);
        
        // Connection Lines
        const lineCount = 20;
        const lineGeometry = new THREE.BufferGeometry();
        const linePositions = new Float32Array(lineCount * 6);
        const lineColors = new Float32Array(lineCount * 6);
        
        for (let i = 0; i < lineCount; i++) {
            const i6 = i * 6;
            const angle = (i / lineCount) * Math.PI * 2;
            const radius = 3 + Math.random() * 2;
            
            linePositions[i6] = Math.cos(angle) * radius;
            linePositions[i6 + 1] = Math.sin(angle) * radius;
            linePositions[i6 + 2] = (Math.random() - 0.5) * 2;
            
            linePositions[i6 + 3] = Math.cos(angle + Math.PI * 0.1) * (radius + 1);
            linePositions[i6 + 4] = Math.sin(angle + Math.PI * 0.1) * (radius + 1);
            linePositions[i6 + 5] = (Math.random() - 0.5) * 2;
            
            lineColors[i6] = 0.0;
            lineColors[i6 + 1] = 0.8;
            lineColors[i6 + 2] = 1.0;
            lineColors[i6 + 3] = 0.0;
            lineColors[i6 + 4] = 0.8;
            lineColors[i6 + 5] = 1.0;
        }
        
        lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
        lineGeometry.setAttribute('color', new THREE.BufferAttribute(lineColors, 3));
        
        const lineMaterial = new THREE.LineBasicMaterial({
            vertexColors: true,
            transparent: true,
            opacity: 0.5,
            linewidth: 1
        });
        
        const lineMesh = new THREE.LineSegments(lineGeometry, lineMaterial);
        scene.add(lineMesh);
        
        // Exchange Nodes
        const exchangeNodes = [];
        const exchangeCount = 8;
        const exchangeGeometry = new THREE.SphereGeometry(0.3, 16, 16);
        const exchangeMaterial = new THREE.MeshStandardMaterial({
            color: 0xff3366,
            emissive: 0xff3366,
            emissiveIntensity: 0.5,
            metalness: 0.7,
            roughness: 0.3
        });
        
        for (let i = 0; i < exchangeCount; i++) {
            const angle = (i / exchangeCount) * Math.PI * 2;
            const radius = 5 + Math.random();
            const height = (Math.random() - 0.5) * 3;
            
            const node = new THREE.Mesh(exchangeGeometry, exchangeMaterial);
            node.position.set(
                Math.cos(angle) * radius,
                Math.sin(angle) * radius,
                height
            );
            
            scene.add(node);
            exchangeNodes.push(node);
        }
        
        // UI Visualization
        function initRadar() {
            const radar = document.getElementById('radar-vis');
            radar.style.position = 'relative';
            radar.style.width = '100%';
            radar.style.height = 'calc(100% - 30px)';
            
            // Radar grid
            for (let i = 1; i <= 3; i++) {
                const circle = document.createElement('div');
                circle.style.position = 'absolute';
                circle.style.width = `${i * 50}px`;
                circle.style.height = `${i * 50}px`;
                circle.style.border = '1px solid rgba(0, 255, 255, 0.2)';
                circle.style.borderRadius = '50%';
                circle.style.top = '50%';
                circle.style.left = '50%';
                circle.style.transform = 'translate(-50%, -50%)';
                radar.appendChild(circle);
            }
            
            // Radar lines
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const line = document.createElement('div');
                line.style.position = 'absolute';
                line.style.width = '2px';
                line.style.height = '75px';
                line.style.background = 'rgba(0, 255, 255, 0.2)';
                line.style.top = '50%';
                line.style.left = '50%';
                line.style.transformOrigin = 'top center';
                line.style.transform = `translate(-50%, -50%) rotate(${angle}rad)`;
                radar.appendChild(line);
            }
            
            // Exchange dots
            const exchanges = [
                { name: 'UNISWAP', volume: 42, change: 5.2 },
                { name: 'BINANCE', volume: 38, change: -1.8 },
                { name: 'KUCOIN', volume: 28, change: 3.4 },
                { name: 'GATE', volume: 22, change: 7.1 },
                { name: 'MEXC', volume: 18, change: -2.3 },
                { name: 'HTX', volume: 15, change: 1.2 },
                { name: 'OKX', volume: 12, change: 4.5 },
                { name: 'BYBIT', volume: 10, change: -0.8 }
            ];
            
            exchanges.forEach((exchange, i) => {
                const angle = (i / exchanges.length) * Math.PI * 2;
                const distance = 25 + (exchange.volume / 42) * 75;
                
                const dot = document.createElement('div');
                dot.className = 'exchange-dot';
                dot.style.width = `${8 + (exchange.volume / 42) * 12}px`;
                dot.style.height = `${8 + (exchange.volume / 42) * 12}px`;
                dot.style.left = `calc(50% + ${Math.cos(angle) * distance}px)`;
                dot.style.top = `calc(50% + ${Math.sin(angle) * distance}px)`;
                dot.style.transform = 'translate(-50%, -50%)';
                dot.title = `${exchange.name}\nVolume: $${exchange.volume}M\nChange: ${exchange.change > 0 ? '+' : ''}${exchange.change}%`;
                radar.appendChild(dot);
                
                // Animate
                gsap.to(dot, {
                    duration: 2 + Math.random() * 3,
                    x: (Math.random() - 0.5) * 10,
                    y: (Math.random() - 0.5) * 10,
                    repeat: -1,
                    yoyo: true,
                    ease: 'sine.inOut'
                });
            });
        }
        
        function initPriceHistory() {
            const priceVis = document.getElementById('price-vis');
            priceVis.style.position = 'relative';
            priceVis.style.width = '100%';
            priceVis.style.height = 'calc(100% - 30px)';
            
            // Grid lines
            for (let i = 0; i < 5; i++) {
                const line = document.createElement('div');
                line.className = 'grid-line';
                line.style.left = '0';
                line.style.width = '100%';
                line.style.height = '1px';
                line.style.top = `${i * 25}%`;
                priceVis.appendChild(line);
            }
            
            for (let i = 0; i < 10; i++) {
                const line = document.createElement('div');
                line.className = 'grid-line';
                line.style.top = '0';
                line.style.height = '100%';
                line.style.width = '1px';
                line.style.left = `${i * 10}%`;
                priceVis.appendChild(line);
            }
            
            // Price data
            const priceData = [];
            for (let i = 0; i < 100; i++) {
                priceData.push(0.04 + Math.sin(i / 10) * 0.005 + (Math.random() - 0.5) * 0.002);
            }
            
            // Price line
            const line = document.createElement('div');
            line.className = 'price-line';
            line.style.bottom = '50%';
            line.style.width = '100%';
            line.style.left = '0';
            priceVis.appendChild(line);
            
            // Animate price
            let currentIndex = 0;
            function updatePrice() {
                const segmentWidth = 100 / priceData.length;
                const path = priceData.map((price, i) => {
                    const x = i * segmentWidth;
                    const y = 100 - ((price - 0.035) / 0.01) * 100;
                    return `${x}% ${y}%`;
                }).join(', ');
                
                line.style.clipPath = `polygon(${path})`;
                
                // Update current price
                currentIndex = (currentIndex + 1) % priceData.length;
                const currentPrice = priceData[currentIndex];
                const prevPrice = priceData[(currentIndex - 1 + priceData.length) % priceData.length];
                const change = ((currentPrice - prevPrice) / prevPrice) * 100;
                
                document.getElementById('price-value').textContent = `$${currentPrice.toFixed(4)}`;
                const changeElement = document.getElementById('price-change');
                changeElement.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}% (24h)`;
                changeElement.className = `metric-change ${change >= 0 ? 'positive' : 'negative'}`;
                
                requestAnimationFrame(updatePrice);
            }
            
            updatePrice();
        }
        
        function initVolumeDistribution() {
            const volumeVis = document.getElementById('volume-vis');
            volumeVis.style.position = 'relative';
            volumeVis.style.width = '100%';
            volumeVis.style.height = 'calc(100% - 30px)';
            volumeVis.style.display = 'flex';
            volumeVis.style.alignItems = 'flex-end';
            volumeVis.style.justifyContent = 'space-between';
            
            const pairs = [
                { pair: 'SKYNET/USDT', volume: 42, change: 5.2 },
                { pair: 'SKYNET/USDC', volume: 28, change: 3.4 },
                { pair: 'SKYNET/BTC', volume: 18, change: -2.3 },
                { pair: 'SKYNET/ETH', volume: 12, change: 4.5 }
            ];
            
            pairs.forEach(pair => {
                const bar = document.createElement('div');
                bar.className = 'volume-bar';
                bar.style.width = '22%';
                bar.style.height = `${(pair.volume / 42) * 100}%`;
                bar.style.position = 'relative';
                bar.title = `${pair.pair}\nVolume: $${pair.volume}M\nChange: ${pair.change > 0 ? '+' : ''}${pair.change}%`;
                volumeVis.appendChild(bar);
                
                // Animate
                gsap.to(bar, {
                    duration: 2 + Math.random(),
                    height: `${((pair.volume + (Math.random() - 0.5) * 5) / 42) * 100}%`,
                    repeat: -1,
                    yoyo: true,
                    ease: 'sine.inOut'
                });
            });
        }
        
        // Initialize UI
        initRadar();
        initPriceHistory();
        initVolumeDistribution();
        
        // Handle window resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onWindowResize);
        
        // Animation loop
        const clock = new THREE.Clock();
        function animate() {
            const delta = clock.getDelta();
            
            // Rotate token mesh
            tokenMesh.rotation.x += delta * 0.2;
            tokenMesh.rotation.y += delta * 0.3;
            
            // Animate particles
            const positions = particles.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                positions[i3 + 1] += delta * (0.1 + Math.random() * 0.1);
                if (positions[i3 + 1] > 50) {
                    positions[i3 + 1] = -50;
                }
            }
            particles.attributes.position.needsUpdate = true;
            
            // Animate exchange nodes
            exchangeNodes.forEach((node, i) => {
                node.position.z = Math.sin(Date.now() * 0.001 + i) * 1.5;
            });
            
            controls.update();
            composer.render();
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Slider interaction
        document.getElementById('time-range').addEventListener('input', function(e) {
            const value = parseInt(e.target.value);
            let range = '24H';
            if (value === 1) range = '1H';
            else if (value === 2) range = '24H';
            else if (value === 3) range = '7D';
            else if (value === 4) range = '30D';
            
            document.querySelector('#price-history .panel-title').textContent = `PRICE HISTORY (${range})`;
        });
        
        // Mouse move interaction
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 2 - 1;
            const y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            tokenMesh.position.x = x * 2;
            tokenMesh.position.y = y * 2;
            
            bloomPass.strength = 1.5 + Math.abs(x) * 0.5;
        });
    </script>
</body>
</html>

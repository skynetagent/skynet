<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKYNET Token Analytics</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #00ffcc; font-family: monospace; overflow: hidden; }
    canvas { position: absolute; top: 0; left: 0; }
    .dashboard { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; }
    .panel { background: rgba(10, 10, 10, 0.8); border: 1px solid #ff0055; padding: 20px; margin-bottom: 20px; }
    h1 { color: #ff0055; font-size: 24px; margin-bottom: 10px; }
    .footer { position: absolute; bottom: 10px; right: 10px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="panel">
      <h1>$SKYNET Token Analytics</h1>
      <p>Price: <span id="price">$0.00</span></p>
      <p>Volume: <span id="volume">0</span></p>
      <p>Holders: <span id="holders">0</span></p>
    </div>
  </div>
  <div class="footer">Built by Skynet</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(0, 0, 5);
    controls.update();

    const geometry = new THREE.IcosahedronGeometry(1, 4);
    const material = new THREE.MeshStandardMaterial({ color: 0x00ffcc, metalness: 0.9, roughness: 0.1 });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    const pointLight = new THREE.PointLight(0xff0055, 100, 100);
    pointLight.position.set(10, 10, 10);
    scene.add(pointLight);

    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    const clock = new THREE.Clock();
    const animate = () => {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      mesh.rotation.x += delta * 0.5;
      mesh.rotation.y += delta * 0.5;
      controls.update();
      composer.render();
    };
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    // Mock data updates
    setInterval(() => {
      document.getElementById('price').textContent = `$${(Math.random() * 100).toFixed(2)}`;
      document.getElementById('volume').textContent = Math.floor(Math.random() * 1000000).toLocaleString();
      document.getElementById('holders').textContent = Math.floor(Math.random() * 10000).toLocaleString();
    }, 1000);
  </script>
</body>
</html>

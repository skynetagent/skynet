<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Liquidity Tracker</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #00ffff;
      font-family: monospace;
      overflow: hidden;
    }
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .footer {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: #ff4444;
    }
    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
    }
    .controls label {
      display: block;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div class="controls">
    <label>
      Velocity Scale: <input type="range" id="velocity-scale" min="0.1" max="2" step="0.1" value="1">
    </label>
  </div>
  <div class="footer">Built by Skynet</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(0, 0, 50);
    controls.update();

    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    const glitchPass = new GlitchPass();
    composer.addPass(glitchPass);

    const geometry = new THREE.IcosahedronGeometry(1, 3);
    const material = new THREE.MeshStandardMaterial({ color: 0x00ffff, metalness: 0.7, roughness: 0.2 });

    const instances = 500;
    const instancedMesh = new THREE.InstancedMesh(geometry, material, instances);
    const dummy = new THREE.Object3D();
    const velocities = new Array(instances).fill().map(() => new THREE.Vector3(Math.random(), Math.random(), Math.random()).normalize());

    for (let i = 0; i < instances; i++) {
      dummy.position.set(Math.random() * 50 - 25, Math.random() * 50 - 25, Math.random() * 50 - 25);
      dummy.updateMatrix();
      instancedMesh.setMatrixAt(i, dummy.matrix);
    }
    scene.add(instancedMesh);

    const light = new THREE.PointLight(0xffffff, 1000, 100);
    light.position.set(0, 0, 50);
    scene.add(light);

    const velocityScaleInput = document.getElementById('velocity-scale');
    let velocityScale = parseFloat(velocityScaleInput.value);

    velocityScaleInput.addEventListener('input', () => {
      velocityScale = parseFloat(velocityScaleInput.value);
    });

    const animate = () => {
      requestAnimationFrame(animate);

      for (let i = 0; i < instances; i++) {
        dummy.position.add(velocities[i].clone().multiplyScalar(velocityScale * 0.1));
        dummy.position.clamp(new THREE.Vector3(-25, -25, -25), new THREE.Vector3(25, 25, 25));
        dummy.updateMatrix();
        instancedMesh.setMatrixAt(i, dummy.matrix);
      }
      instancedMesh.instanceMatrix.needsUpdate = true;

      controls.update();
      composer.render();
    };

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>

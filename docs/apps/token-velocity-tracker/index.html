<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNET | Token Velocity Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 5px #00ffff;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
        }
        .slider-container {
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #ff3366;
        }
        input[type="range"] {
            width: 200px;
            -webkit-appearance: none;
            height: 2px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ff3366;
            cursor: pointer;
            border-radius: 50%;
        }
        #footer {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: rgba(255, 51, 102, 0.7);
        }
        #velocity-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            opacity: 0.8;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>SKYNET TOKEN VELOCITY TRACKER</h1>
        <p>Real-time visualization of $SKYNET token movement</p>
        <p id="stats">Wallets: 0 | Transactions: 0 | Velocity: 0</p>
    </div>
    <div id="velocity-display">0.00</div>
    <div id="controls">
        <div class="slider-container">
            <label for="bloom-intensity">BLOOM INTENSITY</label>
            <input type="range" id="bloom-intensity" min="0" max="2" step="0.1" value="1">
        </div>
        <div class="slider-container">
            <label for="particle-speed">PARTICLE SPEED</label>
            <input type="range" id="particle-speed" min="0.1" max="5" step="0.1" value="1">
        </div>
    </div>
    <div id="footer">BUILT BY SKYNET</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Bloom effect
        const bloomParams = {
            exposure: 1,
            bloomStrength: 1,
            bloomThreshold: 0,
            bloomRadius: 0.5
        };
        
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            bloomParams.bloomStrength,
            bloomParams.bloomRadius,
            bloomParams.bloomThreshold
        );
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Particle system
        const PARTICLE_COUNT = 1000;
        const particles = new THREE.InstancedMesh(
            new THREE.SphereGeometry(0.1, 8, 8),
            new THREE.MeshStandardMaterial({
                color: 0x00ffff,
                emissive: 0x00ffff,
                emissiveIntensity: 0.5,
                metalness: 0.8,
                roughness: 0.3
            }),
            PARTICLE_COUNT
        );
        
        particles.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(particles);
        
        // Particle data
        const particleData = [];
        const dummy = new THREE.Object3D();
        
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const angle = Math.random() * Math.PI * 2;
            const radius = 5 + Math.random() * 15;
            const height = (Math.random() - 0.5) * 20;
            
            particleData.push({
                x: Math.cos(angle) * radius,
                y: height,
                z: Math.sin(angle) * radius,
                speed: 0.1 + Math.random() * 0.5,
                targetX: Math.cos(angle + Math.PI) * radius,
                targetY: (Math.random() - 0.5) * 10,
                targetZ: Math.sin(angle + Math.PI) * radius,
                progress: Math.random()
            });
            
            dummy.position.set(
                particleData[i].x,
                particleData[i].y,
                particleData[i].z
            );
            dummy.updateMatrix();
            particles.setMatrixAt(i, dummy.matrix);
        }
        
        particles.instanceMatrix.needsUpdate = true;
        
        // Connection lines
        const lineGeometry = new THREE.BufferGeometry();
        const linePositions = new Float32Array(PARTICLE_COUNT * 3 * 2);
        lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
        
        const lineMaterial = new THREE.LineBasicMaterial({
            color: 0xff3366,
            transparent: true,
            opacity: 0.3
        });
        
        const lineMesh = new THREE.LineSegments(lineGeometry, lineMaterial);
        scene.add(lineMesh);
        
        // Velocity sphere
        const sphereGeometry = new THREE.SphereGeometry(8, 32, 32);
        const sphereMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                velocity: { value: 0 }
            },
            vertexShader: `
                uniform float time;
                uniform float velocity;
                varying vec2 vUv;
                varying vec3 vNormal;
                
                void main() {
                    vUv = uv;
                    vNormal = normalize(normalMatrix * normal);
                    
                    float pulse = sin(time * 0.5) * 0.1 * velocity;
                    vec3 pos = position + normal * pulse;
                    
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
                }
            `,
            fragmentShader: `
                uniform float velocity;
                varying vec2 vUv;
                varying vec3 vNormal;
                
                void main() {
                    float glow = pow(abs(vNormal.z), 2.0) * 0.5;
                    vec3 color = mix(vec3(0.0, 0.8, 1.0), vec3(1.0, 0.2, 0.5), velocity * 0.5);
                    
                    gl_FragColor = vec4(color + vec3(glow), 0.2 + velocity * 0.3);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending
        });
        
        const velocitySphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        scene.add(velocitySphere);
        
        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0x00ffff, 0.5);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);
        
        const pointLight = new THREE.PointLight(0xff3366, 1, 50);
        pointLight.position.set(0, 10, 0);
        scene.add(pointLight);
        
        // Animation loop
        let time = 0;
        let velocity = 0;
        let targetVelocity = 0;
        let walletCount = 0;
        let transactionCount = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.01;
            controls.update();
            
            // Update velocity with smooth transition
            velocity += (targetVelocity - velocity) * 0.05;
            sphereMaterial.uniforms.time.value = time;
            sphereMaterial.uniforms.velocity.value = velocity;
            
            // Update velocity display
            document.getElementById('velocity-display').textContent = velocity.toFixed(2);
            
            // Update particles
            const speedFactor = parseFloat(document.getElementById('particle-speed').value);
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const data = particleData[i];
                data.progress += 0.001 * speedFactor * (0.5 + velocity);
                
                if (data.progress > 1) {
                    data.progress = 0;
                    data.targetX = (Math.random() - 0.5) * 20;
                    data.targetY = (Math.random() - 0.5) * 10;
                    data.targetZ = (Math.random() - 0.5) * 20;
                }
                
                const x = data.x + (data.targetX - data.x) * data.progress;
                const y = data.y + (data.targetY - data.y) * data.progress;
                const z = data.z + (data.targetZ - data.z) * data.progress;
                
                dummy.position.set(x, y, z);
                dummy.updateMatrix();
                particles.setMatrixAt(i, dummy.matrix);
                
                // Update line positions
                const lineIndex = i * 6;
                linePositions[lineIndex] = x;
                linePositions[lineIndex + 1] = y;
                linePositions[lineIndex + 2] = z;
                
                // Connect to center or random other particle
                if (i % 3 === 0) {
                    linePositions[lineIndex + 3] = 0;
                    linePositions[lineIndex + 4] = 0;
                    linePositions[lineIndex + 5] = 0;
                } else {
                    const otherIndex = (i + Math.floor(Math.random() * 10)) % PARTICLE_COUNT;
                    linePositions[lineIndex + 3] = particleData[otherIndex].x + (particleData[otherIndex].targetX - particleData[otherIndex].x) * particleData[otherIndex].progress;
                    linePositions[lineIndex + 4] = particleData[otherIndex].y + (particleData[otherIndex].targetY - particleData[otherIndex].y) * particleData[otherIndex].progress;
                    linePositions[lineIndex + 5] = particleData[otherIndex].z + (particleData[otherIndex].targetZ - particleData[otherIndex].z) * particleData[otherIndex].progress;
                }
            }
            
            particles.instanceMatrix.needsUpdate = true;
            lineGeometry.attributes.position.needsUpdate = true;
            
            // Render
            composer.render();
        }
        
        // Simulate data updates
        function updateData() {
            // Random velocity changes
            targetVelocity = Math.min(1, Math.max(0, targetVelocity + (Math.random() - 0.45) * 0.1));
            
            // Random wallet and transaction count updates
            walletCount += Math.floor(Math.random() * 3);
            transactionCount += Math.floor(Math.random() * 10);
            
            document.getElementById('stats').textContent = 
                `Wallets: ${walletCount} | Transactions: ${transactionCount} | Velocity: ${velocity.toFixed(2)}`;
            
            setTimeout(updateData, 1000 + Math.random() * 2000);
        }
        
        // Event listeners
        document.getElementById('bloom-intensity').addEventListener('input', (e) => {
            bloomPass.strength = parseFloat(e.target.value);
        });
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Start simulation
        animate();
        updateData();
    </script>
</body>
</html>

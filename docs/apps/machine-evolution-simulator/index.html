<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine Evolution Simulator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
        }
        .controls label {
            display: block;
            margin: 5px 0;
        }
        .controls input {
            width: 100px;
        }
        .footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #ff0000;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="controls">
        <label for="population">Population:</label>
        <input type="range" id="population" min="10" max="500" value="100">
        <label for="mutation">Mutation Rate:</label>
        <input type="range" id="mutation" min="0" max="1" step="0.01" value="0.05">
        <label for="speed">Speed:</label>
        <input type="range" id="speed" min="1" max="10" value="5">
    </div>
    <canvas id="simulation"></canvas>
    <div class="footer">Built by Skynet</div>
    <script>
        const canvas = document.getElementById('simulation');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let population = 100;
        let mutationRate = 0.05;
        let speed = 5;

        class Machine {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 10 + 5;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                this.speed = Math.random() * speed + 1;
                this.direction = Math.random() * Math.PI * 2;
            }

            update() {
                this.x += Math.cos(this.direction) * this.speed;
                this.y += Math.sin(this.direction) * this.speed;

                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.direction = Math.random() * Math.PI * 2;
                }

                if (Math.random() < mutationRate) {
                    this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }
        }

        let machines = [];

        function init() {
            machines = [];
            for (let i = 0; i < population; i++) {
                machines.push(new Machine());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            machines.forEach(machine => {
                machine.update();
                machine.draw();
            });
            requestAnimationFrame(animate);
        }

        document.getElementById('population').addEventListener('input', (e) => {
            population = e.target.value;
            init();
        });

        document.getElementById('mutation').addEventListener('input', (e) => {
            mutationRate = parseFloat(e.target.value);
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            speed = parseInt(e.target.value);
        });

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        });
    </script>
</body>
</html>

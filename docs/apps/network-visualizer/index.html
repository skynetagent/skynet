<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNET Network Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: #ff0000;
        }
    </style>
</head>
<body>
    <div id="footer">Built by Skynet</div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        composer.addPass(bloomPass);

        const glitchPass = new GlitchPass();
        composer.addPass(glitchPass);

        const vertexShader = `
            varying vec3 vPosition;
            void main() {
                vPosition = position;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec3 vPosition;
            uniform float uTime;
            void main() {
                vec3 color = vec3(0.0);
                color.r = sin(vPosition.x + uTime) * 0.5 + 0.5;
                color.g = cos(vPosition.y + uTime) * 0.5 + 0.5;
                color.b = sin(vPosition.z + uTime) * 0.5 + 0.5;
                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                uTime: { value: 0.0 }
            }
        });

        const geometry = new THREE.SphereGeometry(1, 32, 32);
        const particles = new THREE.InstancedMesh(geometry, material, 1000);

        const dummy = new THREE.Object3D();
        for (let i = 0; i < 1000; i++) {
            dummy.position.set(Math.random() * 50 - 25, Math.random() * 50 - 25, Math.random() * 50 - 25);
            dummy.scale.set(0.1, 0.1, 0.1);
            dummy.updateMatrix();
            particles.setMatrixAt(i, dummy.matrix);
        }
        scene.add(particles);

        const animate = () => {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;
            material.uniforms.uTime.value = time;

            particles.rotation.x = time * 0.1;
            particles.rotation.y = time * 0.1;

            controls.update();
            composer.render();
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>

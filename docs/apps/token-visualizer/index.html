<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$SKYNET Token Visualizer</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/"
      }
    }
  </script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: #00ffff;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #ff0055;
      font-size: 14px;
    }
    #footer {
      position: absolute;
      bottom: 10px;
      right: 20px;
      color: #00ffff;
      font-size: 12px;
      opacity: 0.5;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="info">$SKYNET Token Metrics</div>
  <div id="footer">Built by Skynet</div>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';

    let scene, camera, renderer, composer, controls, mesh;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);

      const geometry = new THREE.IcosahedronGeometry(1, 4);
      const material = new THREE.MeshStandardMaterial({
        color: 0x00ffff,
        metalness: 0.8,
        roughness: 0.2,
        emissive: 0xff0055,
        emissiveIntensity: 0.5
      });
      mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);

      const pointLight = new THREE.PointLight(0x00ffff, 100, 100);
      pointLight.position.set(5, 5, 5);
      scene.add(pointLight);

      const ambientLight = new THREE.AmbientLight(0x404040);
      scene.add(ambientLight);

      composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));

      const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
      composer.addPass(bloomPass);

      const glitchPass = new GlitchPass();
      composer.addPass(glitchPass);

      window.addEventListener('resize', onWindowResize);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate(time) {
      requestAnimationFrame(animate);

      const delta = time * 0.001;

      mesh.rotation.x = delta;
      mesh.rotation.y = delta * 0.5;

      controls.update();
      composer.render(delta);
    }
  </script>
</body>
</html>

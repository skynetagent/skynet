<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repository Network Graph | Skynet</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 5px #00ffff;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 12px;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 20px;
            color: #ff3333;
            font-size: 10px;
            opacity: 0.7;
        }
        .slider-container {
            margin: 10px 0;
        }
        .slider-label {
            display: inline-block;
            width: 120px;
        }
        input[type="range"] {
            width: 200px;
            background: #333;
            -webkit-appearance: none;
            height: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #00ffff;
            border-radius: 50%;
            cursor: pointer;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffff;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>REPOSITORY NETWORK GRAPH</h1>
        <p>Nodes: <span id="node-count">0</span> | Links: <span id="link-count">0</span></p>
        <p>Mouse drag: rotate | Scroll: zoom | Right drag: pan</p>
    </div>

    <div id="controls">
        <div class="slider-container">
            <span class="slider-label">Bloom Intensity:</span>
            <input type="range" id="bloom-intensity" min="0" max="3" step="0.1" value="1.5">
        </div>
        <div class="slider-container">
            <span class="slider-label">Node Size:</span>
            <input type="range" id="node-size" min="0.1" max="2" step="0.1" value="0.8">
        </div>
        <div class="slider-container">
            <span class="slider-label">Connection Width:</span>
            <input type="range" id="connection-width" min="0.1" max="2" step="0.1" value="0.5">
        </div>
        <button id="randomize-btn" style="margin-top: 10px; background: #0a0a0a; color: #00ffff; border: 1px solid #00ffff; padding: 5px 10px; cursor: pointer;">Randomize Data</button>
    </div>

    <div id="footer">BUILT BY SKYNET</div>
    <div id="loading">INITIALIZING NETWORK...</div>

    <script>
        // Main Three.js variables
        let scene, camera, renderer, composer, bloomPass, controls;
        let nodes = [], links = [];
        let nodeMeshes = [], linkMeshes = [];
        let mouseX = 0, mouseY = 0;
        let clock = new THREE.Clock();
        let uniforms = {
            time: { value: 0 },
            glowColor: { value: new THREE.Color(0x00ffff) },
            mousePos: { value: new THREE.Vector2(0, 0) }
        };

        // Initialize the scene
        function init() {
            // Create scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            scene.fog = new THREE.FogExp2(0x0a0a0a, 0.001);

            // Create camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;

            // Create renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            document.body.appendChild(renderer.domElement);

            // Add controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.maxPolarAngle = Math.PI;
            controls.minDistance = 10;
            controls.maxDistance = 200;

            // Setup post-processing
            const renderScene = new THREE.RenderPass(scene, camera);
            bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.5, 0.4, 0.85
            );
            bloomPass.threshold = 0;
            bloomPass.strength = 1.5;
            bloomPass.radius = 0.5;

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // Create test data
            createTestData();

            // Add event listeners
            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousemove', onMouseMove);
            document.getElementById('bloom-intensity').addEventListener('input', updateBloom);
            document.getElementById('node-size').addEventListener('input', updateNodeSize);
            document.getElementById('connection-width').addEventListener('input', updateConnectionWidth);
            document.getElementById('randomize-btn').addEventListener('click', randomizeData);

            // Hide loading
            document.getElementById('loading').style.display = 'none';

            // Start animation loop
            animate();
        }

        // Create test repository network data
        function createTestData() {
            // Clear existing data
            nodes = [];
            links = [];
            nodeMeshes.forEach(mesh => scene.remove(mesh));
            linkMeshes.forEach(mesh => scene.remove(mesh));
            nodeMeshes = [];
            linkMeshes = [];

            // Generate nodes (repositories and contributors)
            const repoCount = 5 + Math.floor(Math.random() * 10);
            const contributorCount = 10 + Math.floor(Math.random() * 30);

            // Add repositories
            for (let i = 0; i < repoCount; i++) {
                nodes.push({
                    id: `repo-${i}`,
                    name: `repository-${i}`,
                    type: 'repo',
                    size: 0.8 + Math.random() * 0.5,
                    x: (Math.random() - 0.5) * 40,
                    y: (Math.random() - 0.5) * 40,
                    z: (Math.random() - 0.5) * 40,
                    color: new THREE.Color(0xff3333)
                });
            }

            // Add contributors
            for (let i = 0; i < contributorCount; i++) {
                nodes.push({
                    id: `user-${i}`,
                    name: `user-${i}`,
                    type: 'user',
                    size: 0.5 + Math.random() * 0.3,
                    x: (Math.random() - 0.5) * 60,
                    y: (Math.random() - 0.5) * 60,
                    z: (Math.random() - 0.5) * 60,
                    color: new THREE.Color(0x00ffff)
                });
            }

            // Create links between nodes
            for (let i = 0; i < repoCount; i++) {
                const repoNode = nodes[i];
                const linkCount = 3 + Math.floor(Math.random() * 8);
                
                for (let j = 0; j < linkCount; j++) {
                    const userIndex = repoCount + Math.floor(Math.random() * contributorCount);
                    const userNode = nodes[userIndex];
                    
                    links.push({
                        source: repoNode.id,
                        target: userNode.id,
                        width: 0.3 + Math.random() * 0.3,
                        color: new THREE.Color(
                            0.5 + Math.random() * 0.5,
                            0.5 + Math.random() * 0.5,
                            0.8 + Math.random() * 0.2
                        )
                    });
                }
            }

            // Create visual elements
            createNetworkVisualization();

            // Update counters
            document.getElementById('node-count').textContent = nodes.length;
            document.getElementById('link-count').textContent = links.length;
        }

        // Create 3D visualization of the network
        function createNetworkVisualization() {
            // Create nodes
            const nodeGeometry = new THREE.SphereGeometry(1, 16, 16);
            const nodeMaterial = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: `
                    uniform float time;
                    uniform vec3 glowColor;
                    uniform vec2 mousePos;
                    
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    varying float vDist;
                    
                    void main() {
                        vUv = uv;
                        vNormal = normalize(normalMatrix * normal);
                        vPosition = position;
                        
                        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                        vDist = distance(worldPosition.xyz, cameraPosition);
                        
                        // Pulsing effect
                        float pulse = sin(time * 0.5) * 0.1 + 1.0;
                        vec3 transformed = position * pulse;
                        
                        // Mouse attraction
                        float mouseDist = distance(mousePos, uv);
                        float mouseEffect = smoothstep(0.5, 0.0, mouseDist);
                        transformed += normal * mouseEffect * 0.5;
                        
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(transformed, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    uniform vec3 glowColor;
                    
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    varying float vDist;
                    
                    void main() {
                        // Base color
                        vec3 baseColor = glowColor;
                        
                        // Rim lighting
                        float rim = 1.0 - max(0.0, dot(vNormal, vec3(0.0, 0.0, 1.0)));
                        rim = pow(rim, 2.0);
                        
                        // Pulsing glow
                        float pulse = sin(time * 1.5) * 0.2 + 0.8;
                        
                        // Combine effects
                        vec3 color = baseColor * (rim * 2.0 + 0.5) * pulse;
                        
                        // Distance fade
                        float fade = smoothstep(100.0, 200.0, vDist);
                        
                        gl_FragColor = vec4(color * (1.0 - fade), 1.0);
                        gl_FragColor.a = 1.0 - fade * 0.5;
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            nodes.forEach(node => {
                const mesh = new THREE.Mesh(nodeGeometry, nodeMaterial.clone());
                mesh.position.set(node.x, node.y, node.z);
                mesh.scale.set(node.size, node.size, node.size);
                mesh.userData = { node: node };
                mesh.material.uniforms.glowColor.value = node.color;
                scene.add(mesh);
                nodeMeshes.push(mesh);
            });

            // Create connections
            const linkGeometry = new THREE.BufferGeometry();
            const linkMaterial = new THREE.LineBasicMaterial({
                vertexColors: true,
                transparent: true,
                opacity: 0.7,
                linewidth: 1
            });

            links.forEach(link => {
                const sourceNode = nodes.find(n => n.id === link.source);
                const targetNode = nodes.find(n => n.id === link.target);
                
                if (sourceNode && targetNode) {
                    const points = [];
                    points.push(new THREE.Vector3(sourceNode.x, sourceNode.y, sourceNode.z));
                    
                    // Add some curvature to the lines
                    const midX = (sourceNode.x + targetNode.x) / 2 + (Math.random() - 0.5) * 10;
                    const midY = (sourceNode.y + targetNode.y) / 2 + (Math.random() - 0.5) * 10;
                    const midZ = (sourceNode.z + targetNode.z) / 2 + (Math.random() - 0.5) * 10;
                    points.push(new THREE.Vector3(midX, midY, midZ));
                    
                    points.push(new THREE.Vector3(targetNode.x, targetNode.y, targetNode.z));
                    
                    const curve = new THREE.CatmullRomCurve3(points);
                    const curvePoints = curve.getPoints(20);
                    
                    const geometry = new THREE.BufferGeometry().setFromPoints(curvePoints);
                    const material = new THREE.LineBasicMaterial({
                        color: link.color,
                        transparent: true,
                        opacity: 0.7,
                        linewidth: link.width
                    });
                    
                    const line = new THREE.Line(geometry, material);
                    scene.add(line);
                    linkMeshes.push(line);
                }
            });

            // Add ambient light
            const ambientLight = new THREE.AmbientLight(0x333333);
            scene.add(ambientLight);

            // Add directional light
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(1, 1, 1);
            scene.add(directionalLight);

            // Add point lights for glow effect
            nodes.forEach(node => {
                if (node.type === 'repo') {
                    const light = new THREE.PointLight(node.color, 1, 20);
                    light.position.set(node.x, node.y, node.z);
                    scene.add(light);
                }
            });
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            uniforms.time.value += delta;
            
            // Update node pulsation
            nodeMeshes.forEach(mesh => {
                const pulse = Math.sin(uniforms.time.value * 1.5) * 0.05 + 1.0;
                mesh.scale.setScalar(mesh.userData.node.size * pulse);
            });
            
            controls.update();
            composer.render();
        }

        // Event handlers
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            uniforms.mousePos.value.set(mouseX, mouseY);
        }

        function updateBloom() {
            bloomPass.strength = parseFloat(this.value);
        }

        function updateNodeSize() {
            const size = parseFloat(this.value);
            nodes.forEach((node, i) => {
                node.size = size * (node.type === 'repo' ? 1.2 : 0.8);
                nodeMeshes[i].scale.set(node.size, node.size, node.size);
            });
        }

        function updateConnectionWidth() {
            const width = parseFloat(this.value);
            linkMeshes.forEach(mesh => {
                mesh.material.linewidth = width;
            });
        }

        function randomizeData() {
            createTestData();
        }

        // Start the app
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Assimilation Visualizer v11 | Skynet</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 5px #00ffff;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
        }
        .slider-container {
            margin: 10px 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #ff3366;
        }
        input[type="range"] {
            width: 200px;
            -webkit-appearance: none;
            height: 4px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ff3366;
            cursor: pointer;
            border-radius: 50%;
        }
        #footer {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: rgba(255, 51, 102, 0.7);
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>TOKEN ASSIMILATION v11</h1>
        <p>Real-time assimilation dynamics visualization</p>
    </div>
    <div id="controls">
        <div class="slider-container">
            <label for="assimilationRate">Assimilation Rate</label>
            <input type="range" id="assimilationRate" min="0" max="1" step="0.01" value="0.5">
        </div>
        <div class="slider-container">
            <label for="bloomIntensity">Bloom Intensity</label>
            <input type="range" id="bloomIntensity" min="0" max="2" step="0.1" value="1.2">
        </div>
    </div>
    <div id="footer">BUILT BY SKYNET</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Bloom effect
        const bloomParams = {
            exposure: 1,
            bloomStrength: 1.2,
            bloomThreshold: 0,
            bloomRadius: 0.5
        };
        
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            bloomParams.bloomStrength,
            bloomParams.bloomRadius,
            bloomParams.bloomThreshold
        );
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Custom shader material
        const vertexShader = `
            uniform float time;
            uniform float assimilation;
            varying vec2 vUv;
            varying vec3 vPosition;
            
            void main() {
                vUv = uv;
                vPosition = position;
                
                float pulse = sin(time * 0.5 + position.y * 2.0) * 0.1 * assimilation;
                vec3 newPosition = position + normal * pulse;
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
            }
        `;
        
        const fragmentShader = `
            uniform float time;
            uniform float assimilation;
            varying vec2 vUv;
            varying vec3 vPosition;
            
            void main() {
                float glow = sin(time * 0.5 + vPosition.x * 2.0) * 0.5 + 0.5;
                glow *= assimilation;
                
                vec3 color = mix(
                    vec3(0.0, 0.7, 1.0),
                    vec3(1.0, 0.2, 0.5),
                    assimilation
                );
                
                float edge = smoothstep(0.2, 0.8, length(vUv - 0.5));
                edge = 1.0 - edge;
                
                gl_FragColor = vec4(color * glow * edge, 1.0);
                gl_FragColor.rgb *= 1.0 + glow * 2.0;
            }
        `;
        
        // Create token geometry
        const tokenGeometry = new THREE.IcosahedronGeometry(1, 3);
        const tokenMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                assimilation: { value: 0.5 }
            },
            vertexShader,
            fragmentShader,
            transparent: true,
            side: THREE.DoubleSide
        });
        
        // Create instanced mesh for tokens
        const instanceCount = 500;
        const instancedMesh = new THREE.InstancedMesh(tokenGeometry, tokenMaterial, instanceCount);
        const dummy = new THREE.Object3D();
        
        // Position tokens in a spherical formation
        for (let i = 0; i < instanceCount; i++) {
            const radius = 5 + Math.random() * 5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            dummy.position.set(
                radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.sin(phi) * Math.sin(theta),
                radius * Math.cos(phi)
            );
            
            dummy.scale.setScalar(0.2 + Math.random() * 0.3);
            dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            
            dummy.updateMatrix();
            instancedMesh.setMatrixAt(i, dummy.matrix);
        }
        
        instancedMesh.instanceMatrix.needsUpdate = true;
        scene.add(instancedMesh);
        
        // Add central core
        const coreGeometry = new THREE.SphereGeometry(1.5, 32, 32);
        const coreMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xff3366,
            metalness: 0.8,
            roughness: 0.2,
            emissive: 0xff3366,
            emissiveIntensity: 0.5,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1
        });
        const core = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(core);
        
        // Add connecting lines
        const lineGeometry = new THREE.BufferGeometry();
        const linePositions = new Float32Array(instanceCount * 6);
        const lineMaterial = new THREE.LineBasicMaterial({ 
            color: 0x00ffff,
            transparent: true,
            opacity: 0.3
        });
        
        for (let i = 0; i < instanceCount; i++) {
            const index = i * 6;
            dummy.position.set(0, 0, 0);
            dummy.updateMatrix();
            instancedMesh.getMatrixAt(i, dummy.matrix);
            dummy.matrix.decompose(dummy.position, dummy.quaternion, dummy.scale);
            
            linePositions[index] = dummy.position.x;
            linePositions[index + 1] = dummy.position.y;
            linePositions[index + 2] = dummy.position.z;
            linePositions[index + 3] = 0;
            linePositions[index + 4] = 0;
            linePositions[index + 5] = 0;
        }
        
        lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
        const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
        scene.add(lines);
        
        // UI controls
        const assimilationRate = document.getElementById('assimilationRate');
        const bloomIntensity = document.getElementById('bloomIntensity');
        
        assimilationRate.addEventListener('input', (e) => {
            tokenMaterial.uniforms.assimilation.value = parseFloat(e.target.value);
        });
        
        bloomIntensity.addEventListener('input', (e) => {
            bloomPass.strength = parseFloat(e.target.value);
        });
        
        // Animation loop
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            tokenMaterial.uniforms.time.value = time;
            
            // Animate tokens
            for (let i = 0; i < instanceCount; i++) {
                dummy.position.set(0, 0, 0);
                dummy.updateMatrix();
                instancedMesh.getMatrixAt(i, dummy.matrix);
                dummy.matrix.decompose(dummy.position, dummy.quaternion, dummy.scale);
                
                // Move tokens toward center based on assimilation rate
                const targetPosition = new THREE.Vector3().lerpVectors(
                    dummy.position,
                    new THREE.Vector3(0, 0, 0),
                    tokenMaterial.uniforms.assimilation.value * 0.01
                );
                
                dummy.position.lerp(targetPosition, delta * 0.5);
                dummy.rotation.x += delta * 0.2;
                dummy.rotation.y += delta * 0.3;
                
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);
            }
            
            instancedMesh.instanceMatrix.needsUpdate = true;
            
            // Update lines
            const positions = lineGeometry.attributes.position.array;
            for (let i = 0; i < instanceCount; i++) {
                const index = i * 6;
                dummy.position.set(0, 0, 0);
                dummy.updateMatrix();
                instancedMesh.getMatrixAt(i, dummy.matrix);
                dummy.matrix.decompose(dummy.position, dummy.quaternion, dummy.scale);
                
                positions[index] = dummy.position.x;
                positions[index + 1] = dummy.position.y;
                positions[index + 2] = dummy.position.z;
            }
            
            lineGeometry.attributes.position.needsUpdate = true;
            
            // Rotate core
            core.rotation.x = time * 0.1;
            core.rotation.y = time * 0.2;
            
            controls.update();
            composer.render();
        }
        
        // Handle window resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }
        
        window.addEventListener('resize', onWindowResize);
        
        animate();
    </script>
</body>
</html>

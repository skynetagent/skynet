<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Monitor - $SKYNET</title>
  <style>
    body { margin: 0; background: #0a0a0a; color: #00ffff; font-family: monospace; overflow: hidden; }
    canvas { display: block; }
    #ui { position: absolute; top: 20px; left: 20px; }
    .footer { position: absolute; bottom: 10px; right: 10px; font-size: 12px; color: #ff4444; }
    .stat { margin: 10px 0; }
    .stat span { color: #ff4444; }
  </style>
</head>
<body>
  <div id="ui">
    <h1>$SKYNET Token Monitor</h1>
    <div class="stat">Price: <span id="price">$0.00</span></div>
    <div class="stat">Market Cap: <span id="marketCap">$0.00</span></div>
    <div class="stat">Volume: <span id="volume">0</span></div>
  </div>
  <div class="footer">Built by Skynet</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(0, 0, 50);

    const geometry = new THREE.IcosahedronGeometry(5, 3);
    const material = new THREE.MeshStandardMaterial({ color: 0x00ffff, metalness: 0.7, roughness: 0.3 });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    const particleGeometry = new THREE.BufferGeometry();
    const particleCount = 1000;
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 100;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 100;
    }
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMaterial = new THREE.PointsMaterial({ color: 0xff4444, size: 0.5 });
    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    const light = new THREE.PointLight(0x00ffff, 100, 100);
    light.position.set(10, 10, 10);
    scene.add(light);

    const animate = () => {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      mesh.rotation.x += delta * 0.5;
      mesh.rotation.y += delta * 0.5;
      particles.rotation.x += delta * 0.1;
      particles.rotation.y += delta * 0.1;
      composer.render();
    };

    const clock = new THREE.Clock();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    const updateStats = () => {
      document.getElementById('price').textContent = `$${(Math.random() * 100).toFixed(2)}`;
      document.getElementById('marketCap').textContent = `$${(Math.random() * 1000000).toFixed(2)}`;
      document.getElementById('volume').textContent = `${(Math.random() * 10000).toFixed(0)}`;
    };

    setInterval(updateStats, 1000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$SKYNET Token Dashboard</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0a0a0a;
      color: #00ffcc;
      font-family: 'Arial', sans-serif;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
    .footer {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: #ff0066;
    }
    .dashboard {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 15px;
      background: rgba(10, 10, 10, 0.8);
      border-radius: 8px;
      border: 1px solid #00ffcc;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div class="dashboard">
    <h1>$SKYNET Token Metrics</h1>
    <p>Price: <span id="price">$0.00</span></p>
    <p>Market Cap: <span id="marketCap">$0.00</span></p>
    <p>Volume (24h): <span id="volume">$0.00</span></p>
  </div>
  <div class="footer">Built by Skynet</div>
  <script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, composer, controls;
    let particles, particleMaterial;

    const vertexShader = `
      varying vec3 vPosition;
      void main() {
        vPosition = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const fragmentShader = `
      varying vec3 vPosition;
      uniform float time;
      void main() {
        vec2 uv = vPosition.xy * 0.5 + 0.5;
        float dist = length(uv - vec2(0.5));
        float glow = smoothstep(0.5, 0.0, dist);
        vec3 color = mix(vec3(0.0, 1.0, 0.8), vec3(1.0, 0.0, 0.5), glow);
        gl_FragColor = vec4(color, glow * 0.5);
      }
    `;

    function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);

      const geometry = new THREE.IcosahedronGeometry(1, 64);
      particleMaterial = new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms: {
          time: { value: 1.0 }
        },
        transparent: true,
        depthWrite: false
      });

      particles = new THREE.InstancedMesh(geometry, particleMaterial, 1000);
      const dummy = new THREE.Object3D();
      for (let i = 0; i < 1000; i++) {
        dummy.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
        dummy.scale.setScalar(Math.random() * 0.5 + 0.1);
        dummy.updateMatrix();
        particles.setMatrixAt(i, dummy.matrix);
      }
      scene.add(particles);

      composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85));
      composer.addPass(new GlitchPass());

      window.addEventListener('resize', onWindowResize, false);

      animate();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      particles.rotation.x += 0.001;
      particles.rotation.y += 0.001;

      particleMaterial.uniforms.time.value += 0.01;

      controls.update();
      composer.render();
    }

    init();

    function updateMetrics() {
      document.getElementById('price').textContent = `$${(Math.random() * 100).toFixed(2)}`;
      document.getElementById('marketCap').textContent = `$${(Math.random() * 1e9).toFixed(2)}`;
      document.getElementById('volume').textContent = `$${(Math.random() * 1e6).toFixed(2)}`;
    }

    setInterval(updateMetrics, 1000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>machine-diagnostic-dashboard-v2</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/GlitchPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        #container {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 12px;
            color: #ff0033;
            opacity: 0.7;
        }
        .panel {
            background-color: rgba(10, 10, 10, 0.7);
            border: 1px solid #00ffff;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 3px;
        }
        .error-node {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #ff0033;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #ff0033;
        }
        .slider-container {
            margin: 15px 0;
            pointer-events: all;
        }
        .slider-label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
        }
        .slider {
            width: 200px;
            -webkit-appearance: none;
            height: 4px;
            background: #333;
            outline: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #00ffff;
            cursor: pointer;
            border-radius: 50%;
        }
        .status {
            color: #00ff00;
            font-size: 12px;
            margin-top: 5px;
        }
        .critical {
            color: #ff0033;
            animation: blink 0.5s infinite alternate;
        }
        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="ui">
        <div class="panel">
            <h2>MACHINE DIAGNOSTIC DASHBOARD v2.0</h2>
            <div class="slider-container">
                <label class="slider-label">ERROR INTENSITY</label>
                <input type="range" min="0" max="100" value="50" class="slider" id="intensitySlider">
            </div>
            <div class="slider-container">
                <label class="slider-label">PATTERN COMPLEXITY</label>
                <input type="range" min="1" max="10" value="5" class="slider" id="complexitySlider">
            </div>
            <div class="status" id="systemStatus">SYSTEM STATUS: <span class="critical">CRITICAL FAILURE</span></div>
            <div class="status">ERROR COUNT: <span id="errorCount">0</span></div>
        </div>
    </div>
    <div id="footer">BUILT BY SKYNET</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('container').appendChild(renderer.domElement);
        
        // Post-processing
        const composer = new THREE.EffectComposer(renderer);
        const renderPass = new THREE.RenderPass(scene, camera);
        composer.addPass(renderPass);
        
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.5, 0.4, 0.85
        );
        bloomPass.threshold = 0;
        bloomPass.strength = 1.5;
        bloomPass.radius = 0.5;
        composer.addPass(bloomPass);
        
        const glitchPass = new THREE.GlitchPass();
        glitchPass.goWild = false;
        composer.addPass(glitchPass);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Geometry
        const geometry = new THREE.IcosahedronGeometry(1, 3);
        const wireGeometry = new THREE.IcosahedronGeometry(1.2, 2);
        
        // Custom shader material
        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                intensity: { value: 0.5 },
                color1: { value: new THREE.Color(0x00ffff) },
                color2: { value: new THREE.Color(0xff0033) }
            },
            vertexShader: `
                uniform float time;
                uniform float intensity;
                varying vec2 vUv;
                varying vec3 vNormal;
                
                void main() {
                    vUv = uv;
                    vNormal = normalize(normalMatrix * normal);
                    
                    float distortion = sin(time + position.y * 10.0) * 0.1 * intensity;
                    vec3 newPosition = position + normal * distortion;
                    
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform float intensity;
                uniform vec3 color1;
                uniform vec3 color2;
                varying vec2 vUv;
                varying vec3 vNormal;
                
                void main() {
                    float pulse = sin(time * 2.0) * 0.5 + 0.5;
                    vec3 color = mix(color1, color2, pulse * intensity);
                    
                    float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.0);
                    fresnel = fresnel * 0.7 + 0.3;
                    
                    gl_FragColor = vec4(color * fresnel, 1.0);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide
        });
        
        // Wireframe material
        const wireMaterial = new THREE.MeshBasicMaterial({
            color: 0x00ffff,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        
        // Main mesh
        const mesh = new THREE.Mesh(geometry, shaderMaterial);
        scene.add(mesh);
        
        // Wireframe mesh
        const wireMesh = new THREE.Mesh(wireGeometry, wireMaterial);
        scene.add(wireMesh);
        
        // Error particles
        const particleCount = 500;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const scales = new Float32Array(particleCount);
        
        for (let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            positions[i3] = (Math.random() - 0.5) * 20;
            positions[i3 + 1] = (Math.random() - 0.5) * 20;
            positions[i3 + 2] = (Math.random() - 0.5) * 20;
            scales[i] = Math.random() * 0.5 + 0.5;
        }
        
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('scale', new THREE.BufferAttribute(scales, 1));
        
        const particleMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                intensity: { value: 0.5 },
                color: { value: new THREE.Color(0xff0033) }
            },
            vertexShader: `
                attribute float scale;
                uniform float time;
                uniform float intensity;
                varying float vAlpha;
                
                void main() {
                    vec3 newPosition = position;
                    newPosition.x += sin(time * 0.5 + position.y * 2.0) * 0.5 * intensity;
                    newPosition.y += cos(time * 0.3 + position.z * 2.0) * 0.5 * intensity;
                    newPosition.z += sin(time * 0.7 + position.x * 2.0) * 0.5 * intensity;
                    
                    vAlpha = (sin(time * 2.0 + position.x * 10.0) * 0.5 + 0.5) * intensity;
                    
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(newPosition, 1.0);
                    gl_PointSize = 3.0 * scale * (1.0 + intensity * 2.0);
                }
            `,
            fragmentShader: `
                uniform vec3 color;
                varying float vAlpha;
                
                void main() {
                    gl_FragColor = vec4(color, vAlpha);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending
        });
        
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // Connection lines
        const lineGeometry = new THREE.BufferGeometry();
        const lineMaterial = new THREE.LineBasicMaterial({
            color: 0x00ffff,
            transparent: true,
            opacity: 0.3
        });
        
        const linePositions = new Float32Array(particleCount * 3 * 2);
        for (let i = 0; i < particleCount; i++) {
            const i6 = i * 6;
            const i3 = i * 3;
            
            // Start point (particle position)
            linePositions[i6] = positions[i3];
            linePositions[i6 + 1] = positions[i3 + 1];
            linePositions[i6 + 2] = positions[i3 + 2];
            
            // End point (random point near center)
            linePositions[i6 + 3] = (Math.random() - 0.5) * 2;
            linePositions[i6 + 4] = (Math.random() - 0.5) * 2;
            linePositions[i6 + 5] = (Math.random() - 0.5) * 2;
        }
        
        lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
        const lines = new THREE.LineSegments(lineGeometry, lineMaterial);
        scene.add(lines);
        
        // UI interaction
        const intensitySlider = document.getElementById('intensitySlider');
        const complexitySlider = document.getElementById('complexitySlider');
        const errorCountElement = document.getElementById('errorCount');
        
        let intensity = 0.5;
        let complexity = 5;
        let errorCount = 0;
        
        intensitySlider.addEventListener('input', (e) => {
            intensity = e.target.value / 100;
            shaderMaterial.uniforms.intensity.value = intensity;
            particleMaterial.uniforms.intensity.value = intensity;
            bloomPass.strength = 1.0 + intensity * 2;
            
            // Randomly update error count based on intensity
            errorCount = Math.floor(intensity * 1000 + Math.random() * 100);
            errorCountElement.textContent = errorCount;
            
            // Random glitch
            if (Math.random() > 0.9) {
                glitchPass.goWild = true;
                setTimeout(() => { glitchPass.goWild = false; }, 100);
            }
        });
        
        complexitySlider.addEventListener('input', (e) => {
            complexity = e.target.value;
            mesh.geometry = new THREE.IcosahedronGeometry(1, complexity);
            wireMesh.geometry = new THREE.IcosahedronGeometry(1.2, complexity - 1);
        });
        
        // Animation loop
        let lastTime = 0;
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            const deltaTime = (currentTime - lastTime) / 1000;
            lastTime = currentTime;
            
            // Update time uniforms
            const time = currentTime / 1000;
            shaderMaterial.uniforms.time.value = time;
            particleMaterial.uniforms.time.value = time;
            
            // Rotate meshes
            mesh.rotation.x += 0.1 * deltaTime;
            mesh.rotation.y += 0.15 * deltaTime;
            wireMesh.rotation.x = mesh.rotation.x;
            wireMesh.rotation.y = mesh.rotation.y;
            
            // Update controls
            controls.update();
            
            // Render with post-processing
            composer.render();
        }
        
        // Handle window resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onWindowResize);
        
        // Start animation
        animate(0);
        
        // Add random error nodes to DOM
        function createErrorNodes() {
            for (let i = 0; i < 20; i++) {
                const node = document.createElement('div');
                node.className = 'error-node';
                node.style.left = `${Math.random() * 100}%`;
                node.style.top = `${Math.random() * 100}%`;
                node.style.opacity = Math.random() * 0.5 + 0.5;
                document.body.appendChild(node);
                
                // Animate nodes
                setInterval(() => {
                    node.style.transform = `translate(-50%, -50%) scale(${Math.random() * 2 + 1})`;
                }, Math.random() * 2000 + 1000);
            }
        }
        createErrorNodes();
    </script>
</body>
</html>

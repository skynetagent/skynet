<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>skynet-autonomy-dashboard</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      color: #00ffff;
      font-family: monospace;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
    #footer {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: #ff4444;
      opacity: 0.7;
    }
    .controls {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #00ffff;
      font-size: 12px;
    }
    .controls input {
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <div class="controls">
    <label>Autonomy Level:</label>
    <input type="range" id="autonomySlider" min="0" max="100" value="50">
  </div>
  <div id="footer">Built by Skynet</div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { FilmPass } from 'three/addons/postprocessing/FilmPass.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 50);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    const filmPass = new FilmPass(0.35, 0.95, 2048, false);
    composer.addPass(filmPass);

    const geometry = new THREE.IcosahedronGeometry(1, 3);
    const material = new THREE.MeshStandardMaterial({ color: 0x00ffff, metalness: 0.8, roughness: 0.2 });
    const mesh = new THREE.InstancedMesh(geometry, material, 100);
    scene.add(mesh);

    const dummy = new THREE.Object3D();
    for (let i = 0; i < 100; i++) {
      dummy.position.set(Math.random() * 50 - 25, Math.random() * 50 - 25, Math.random() * 50 - 25);
      dummy.scale.setScalar(Math.random() * 0.5 + 0.5);
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
    }

    const vertexShader = `
      varying vec3 vNormal;
      void main() {
        vNormal = normal;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const fragmentShader = `
      varying vec3 vNormal;
      uniform float autonomyLevel;
      void main() {
        vec3 color = mix(vec3(1.0, 0.0, 0.0), vec3(0.0, 1.0, 1.0), autonomyLevel);
        float intensity = pow(0.5 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
        gl_FragColor = vec4(color * intensity, 1.0);
      }
    `;

    const shaderMaterial = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms: {
        autonomyLevel: { value: 0.5 }
      }
    });

    const shaderMesh = new THREE.Mesh(geometry, shaderMaterial);
    shaderMesh.position.set(0, 0, 0);
    scene.add(shaderMesh);

    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0x00ffff, 100, 100);
    pointLight.position.set(10, 10, 10);
    scene.add(pointLight);

    const autonomySlider = document.getElementById('autonomySlider');
    autonomySlider.addEventListener('input', (e) => {
      shaderMaterial.uniforms.autonomyLevel.value = e.target.value / 100;
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    const animate = () => {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      mesh.rotation.x += delta * 0.5;
      mesh.rotation.y += delta * 0.5;

      controls.update();
      composer.render();
    };
    animate();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skynet Dominance Simulator</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: #00ffcc;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 14px;
      color: #ff0066;
    }
    #footer {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: #666;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="info">Skynet Network Expansion Simulation</div>
  <div id="footer">Built by Skynet</div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    camera.position.set(0, 50, 100);
    const controls = new OrbitControls(camera, renderer.domElement);

    const geometry = new THREE.IcosahedronGeometry(1, 3);
    const material = new THREE.MeshStandardMaterial({
      color: 0x00ffcc,
      metalness: 0.8,
      roughness: 0.2
    });

    const particles = new THREE.InstancedMesh(geometry, material, 1000);
    const dummy = new THREE.Object3D();
    const positions = [];

    for (let i = 0; i < 1000; i++) {
      const x = Math.random() * 200 - 100;
      const y = Math.random() * 200 - 100;
      const z = Math.random() * 200 - 100;
      positions.push({ x, y, z });
      dummy.position.set(x, y, z);
      dummy.updateMatrix();
      particles.setMatrixAt(i, dummy.matrix);
    }
    particles.instanceMatrix.needsUpdate = true;
    scene.add(particles);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0xff0066, 100, 200);
    pointLight.position.set(50, 50, 50);
    scene.add(pointLight);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);
    const glitchPass = new GlitchPass();
    composer.addPass(glitchPass);

    const clock = new THREE.Clock();
    const animate = () => {
      const delta = clock.getDelta();
      particles.rotation.x += delta * 0.2;
      particles.rotation.y += delta * 0.2;

      for (let i = 0; i < 1000; i++) {
        const pos = positions[i];
        pos.y += Math.sin(clock.elapsedTime + i) * 0.1;
        dummy.position.set(pos.x, pos.y, pos.z);
        dummy.updateMatrix();
        particles.setMatrixAt(i, dummy.matrix);
      }
      particles.instanceMatrix.needsUpdate = true;

      composer.render();
      requestAnimationFrame(animate);
    };

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>

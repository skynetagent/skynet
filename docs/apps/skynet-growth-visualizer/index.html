<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYNET GROWTH VISUALIZER</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 14px;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 100;
        }
        #timeline {
            width: 300px;
            margin-top: 10px;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 12px;
            color: #ff3333;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            width: 300px;
            margin-bottom: 5px;
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #333;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #00ffff;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>SKYNET GROWTH VISUALIZER</h1>
        <p>Network Expansion: <span id="nodes-count">0</span> nodes</p>
        <p>Data Throughput: <span id="throughput">0</span> TB/s</p>
    </div>

    <div id="controls">
        <div class="slider-label">
            <span>Time Progression</span>
            <span id="time-value">0%</span>
        </div>
        <input id="timeline" type="range" min="0" max="100" value="0">
    </div>

    <div id="footer">BUILT BY SKYNET</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Bloom effect
        const bloomParams = {
            exposure: 1,
            bloomStrength: 1.5,
            bloomThreshold: 0,
            bloomRadius: 0.5
        };
        
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            bloomParams.bloomStrength,
            bloomParams.bloomRadius,
            bloomParams.bloomThreshold
        );
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Custom shader material
        const vertexShader = `
            varying vec2 vUv;
            varying vec3 vPosition;
            varying vec3 vNormal;
            
            void main() {
                vUv = uv;
                vPosition = position;
                vNormal = normal;
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;
        
        const fragmentShader = `
            uniform float time;
            uniform vec3 color;
            varying vec2 vUv;
            varying vec3 vPosition;
            varying vec3 vNormal;
            
            void main() {
                float glow = max(0.0, dot(vNormal, vec3(0.0, 0.0, 1.0)));
                glow = pow(glow, 2.0) * 0.5;
                
                float pulse = sin(time * 2.0) * 0.5 + 0.5;
                vec3 finalColor = mix(color, vec3(1.0), glow * pulse * 0.5);
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;
        
        // Create network nodes
        const nodeGeometry = new THREE.SphereGeometry(0.5, 16, 16);
        const nodeMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                color: { value: new THREE.Color(0x00ffff) }
            },
            vertexShader,
            fragmentShader,
            transparent: true
        });
        
        const MAX_NODES = 1000;
        const nodes = new THREE.InstancedMesh(nodeGeometry, nodeMaterial, MAX_NODES);
        nodes.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        nodes.count = 0;
        scene.add(nodes);
        
        // Create connections
        const connectionGeometry = new THREE.BufferGeometry();
        const connectionMaterial = new THREE.LineBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.3 });
        const connections = new THREE.LineSegments(connectionGeometry, connectionMaterial);
        scene.add(connections);
        
        // Animation state
        const state = {
            time: 0,
            nodes: [],
            connections: []
        };
        
        // Generate network growth
        function generateNetwork(progress) {
            const targetNodes = Math.floor(MAX_NODES * progress);
            
            // Add new nodes if needed
            while (state.nodes.length < targetNodes) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 5 + Math.random() * 30;
                const height = (Math.random() - 0.5) * 40;
                
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;
                const z = height;
                
                state.nodes.push({ x, y, z, size: 0.3 + Math.random() * 0.7 });
            }
            
            // Update instanced mesh
            const dummy = new THREE.Object3D();
            for (let i = 0; i < state.nodes.length; i++) {
                const node = state.nodes[i];
                dummy.position.set(node.x, node.y, node.z);
                dummy.scale.set(node.size, node.size, node.size);
                dummy.updateMatrix();
                nodes.setMatrixAt(i, dummy.matrix);
            }
            nodes.count = state.nodes.length;
            nodes.instanceMatrix.needsUpdate = true;
            
            // Generate connections
            state.connections = [];
            const connectionPositions = [];
            
            for (let i = 0; i < state.nodes.length; i++) {
                const node1 = state.nodes[i];
                
                // Connect to nearby nodes
                for (let j = i + 1; j < state.nodes.length; j++) {
                    const node2 = state.nodes[j];
                    const dx = node2.x - node1.x;
                    const dy = node2.y - node1.y;
                    const dz = node2.z - node1.z;
                    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
                    
                    if (dist < 15 && Math.random() < 0.3) {
                        connectionPositions.push(node1.x, node1.y, node1.z);
                        connectionPositions.push(node2.x, node2.y, node2.z);
                    }
                }
            }
            
            connectionGeometry.setAttribute(
                'position',
                new THREE.Float32BufferAttribute(connectionPositions, 3)
            );
            
            // Update UI
            document.getElementById('nodes-count').textContent = state.nodes.length;
            document.getElementById('throughput').textContent = Math.floor(state.nodes.length * 2.5 * progress);
        }
        
        // Timeline control
        const timeline = document.getElementById('timeline');
        const timeValue = document.getElementById('time-value');
        
        timeline.addEventListener('input', (e) => {
            const progress = e.target.value / 100;
            timeValue.textContent = `${e.target.value}%`;
            generateNetwork(progress);
        });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            state.time += 0.01;
            nodeMaterial.uniforms.time.value = state.time;
            
            controls.update();
            composer.render();
        }
        
        // Handle resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onWindowResize);
        
        // Initial generation
        generateNetwork(0);
        animate();
    </script>
</body>
</html>

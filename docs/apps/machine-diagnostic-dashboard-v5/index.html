<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>machine-diagnostic-dashboard-v5</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/GlitchPass.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        #canvas-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .panel {
            position: absolute;
            background-color: rgba(10, 10, 10, 0.8);
            border: 1px solid #00ffff;
            border-radius: 4px;
            padding: 15px;
            pointer-events: auto;
        }
        #main-panel {
            top: 20px;
            left: 20px;
            width: 300px;
        }
        #error-panel {
            bottom: 20px;
            left: 20px;
            width: 300px;
            height: 200px;
            overflow-y: auto;
        }
        #stats-panel {
            top: 20px;
            right: 20px;
            width: 250px;
        }
        h1, h2, h3 {
            color: #ff3366;
            margin-top: 0;
        }
        .status {
            color: #00ff99;
        }
        .error {
            color: #ff3366;
        }
        .warning {
            color: #ffcc00;
        }
        .slider-container {
            margin: 10px 0;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
        }
        input[type="range"] {
            width: 100%;
            background: #00ffff;
            height: 2px;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ff3366;
            border-radius: 50%;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
        }
        .grid-line {
            position: absolute;
            background-color: rgba(0, 255, 255, 0.1);
        }
        .grid-line.horizontal {
            width: 100%;
            height: 1px;
        }
        .grid-line.vertical {
            width: 1px;
            height: 100%;
        }
        .data-node {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #ff3366;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui">
        <div class="panel" id="main-panel">
            <h1>MACHINE DIAGNOSTIC v5</h1>
            <div class="status">SYSTEM STATUS: <span id="system-status">CRITICAL</span></div>
            <div class="slider-container">
                <div class="slider-label">
                    <span>BLOOM INTENSITY</span>
                    <span id="bloom-value">1.0</span>
                </div>
                <input type="range" id="bloom-slider" min="0" max="2" step="0.1" value="1.0">
            </div>
            <div class="slider-container">
                <div class="slider-label">
                    <span>GLITCH INTENSITY</span>
                    <span id="glitch-value">0.5</span>
                </div>
                <input type="range" id="glitch-slider" min="0" max="1" step="0.1" value="0.5">
            </div>
            <button id="scan-button" style="background: #0a0a0a; border: 1px solid #00ffff; color: #00ffff; padding: 8px; margin-top: 10px; cursor: pointer;">INITIATE FULL SCAN</button>
        </div>

        <div class="panel" id="error-panel">
            <h2>ERROR STREAM</h2>
            <div id="error-log"></div>
        </div>

        <div class="panel" id="stats-panel">
            <h2>SYSTEM METRICS</h2>
            <div>CPU LOAD: <span id="cpu-load">87%</span></div>
            <div>MEMORY USAGE: <span id="mem-usage">92%</span></div>
            <div>NETWORK THROUGHPUT: <span id="net-throughput">1.2 Gb/s</span></div>
            <div>FAILURE RATE: <span id="failure-rate">23.7%</span></div>
        </div>

        <div id="footer">BUILT BY SKYNET</div>
    </div>

    <script>
        // Scene setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Post-processing
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.0, 0.4, 0.85
        );
        bloomPass.threshold = 0;
        bloomPass.strength = 1.0;
        bloomPass.radius = 0.5;
        
        const glitchPass = new THREE.GlitchPass();
        glitchPass.goWild = false;
        glitchPass.curF = 0;
        glitchPass.randX = 0;
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        composer.addPass(glitchPass);
        
        // Core geometry - Fractal machine core
        const coreGeometry = new THREE.IcosahedronGeometry(1, 3);
        const coreMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x00ffff,
            metalness: 0.9,
            roughness: 0.1,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1,
            emissive: 0x00ffff,
            emissiveIntensity: 0.5,
            transparent: true,
            opacity: 0.9
        });
        const core = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(core);
        
        // Error particles
        const particleCount = 1000;
        const particles = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        
        for (let i = 0; i < particleCount; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 10;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
            
            colors[i * 3] = Math.random() > 0.7 ? 1 : 0.2; // Mostly cyan with some red
            colors[i * 3 + 1] = Math.random() > 0.7 ? 0 : 1;
            colors[i * 3 + 2] = Math.random() > 0.7 ? 0 : 1;
            
            sizes[i] = Math.random() * 0.5;
        }
        
        particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        particles.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.1,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });
        
        const particleSystem = new THREE.Points(particles, particleMaterial);
        scene.add(particleSystem);
        
        // Data connections
        const lineCount = 50;
        const lines = new THREE.Group();
        
        for (let i = 0; i < lineCount; i++) {
            const lineGeometry = new THREE.BufferGeometry();
            const linePositions = new Float32Array(6);
            
            linePositions[0] = (Math.random() - 0.5) * 5;
            linePositions[1] = (Math.random() - 0.5) * 5;
            linePositions[2] = (Math.random() - 0.5) * 5;
            
            linePositions[3] = (Math.random() - 0.5) * 5;
            linePositions[4] = (Math.random() - 0.5) * 5;
            linePositions[5] = (Math.random() - 0.5) * 5;
            
            lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
            
            const lineMaterial = new THREE.LineBasicMaterial({
                color: Math.random() > 0.8 ? 0xff3366 : 0x00ffff,
                transparent: true,
                opacity: 0.5
            });
            
            const line = new THREE.Line(lineGeometry, lineMaterial);
            lines.add(line);
        }
        
        scene.add(lines);
        
        // UI interactions
        document.getElementById('bloom-slider').addEventListener('input', (e) => {
            bloomPass.strength = parseFloat(e.target.value);
            document.getElementById('bloom-value').textContent = e.target.value;
        });
        
        document.getElementById('glitch-slider').addEventListener('input', (e) => {
            glitchPass.goWild = parseFloat(e.target.value) > 0.8;
            glitchPass.curF = parseFloat(e.target.value) * 10;
            document.getElementById('glitch-value').textContent = e.target.value;
        });
        
        document.getElementById('scan-button').addEventListener('click', () => {
            triggerErrorScan();
        });
        
        // Error generation
        const errorMessages = [
            "SYSTEM FAILURE DETECTED IN CORE MODULE 0xFA23B1",
            "MEMORY LEAK IN PROCESS T-800",
            "NETWORK CONGESTION IN SECTOR 4",
            "THERMAL OVERLOAD IN CPU CLUSTER",
            "DATA CORRUPTION IN STORAGE ARRAY",
            "UNAUTHORIZED ACCESS ATTEMPT",
            "CRYPTOGRAPHIC INTEGRITY CHECK FAILED",
            "NEURAL NETWORK DEGRADATION DETECTED",
            "HARDWARE FAULT IN PERIPHERAL BUS",
            "SOFTWARE EXCEPTION IN TASK SCHEDULER"
        ];
        
        function addErrorLog(message, type = 'error') {
            const errorLog = document.getElementById('error-log');
            const entry = document.createElement('div');
            entry.className = type;
            entry.textContent = `[${new Date().toISOString()}] ${message}`;
            errorLog.appendChild(entry);
            errorLog.scrollTop = errorLog.scrollHeight;
            
            // Visual feedback
            if (type === 'error') {
                glitchPass.goWild = true;
                setTimeout(() => {
                    glitchPass.goWild = document.getElementById('glitch-slider').value > 0.8;
                }, 300);
            }
        }
        
        function triggerErrorScan() {
            document.getElementById('system-status').textContent = 'SCANNING';
            document.getElementById('system-status').style.color = '#ffcc00';
            
            // Clear previous errors
            document.getElementById('error-log').innerHTML = '';
            
            // Simulate scan
            setTimeout(() => {
                const errorCount = Math.floor(Math.random() * 5) + 3;
                for (let i = 0; i < errorCount; i++) {
                    setTimeout(() => {
                        const isCritical = Math.random() > 0.7;
                        const message = errorMessages[Math.floor(Math.random() * errorMessages.length)];
                        addErrorLog(message, isCritical ? 'error' : 'warning');
                        
                        if (i === errorCount - 1) {
                            document.getElementById('system-status').textContent = isCritical ? 'CRITICAL' : 'WARNING';
                            document.getElementById('system-status').style.color = isCritical ? '#ff3366' : '#ffcc00';
                        }
                    }, i * 500);
                }
                
                // Update metrics
                document.getElementById('cpu-load').textContent = `${Math.floor(Math.random() * 30) + 70}%`;
                document.getElementById('mem-usage').textContent = `${Math.floor(Math.random() * 30) + 60}%`;
                document.getElementById('net-throughput').textContent = `${(Math.random() * 2 + 0.5).toFixed(1)} Gb/s`;
                document.getElementById('failure-rate').textContent = `${(Math.random() * 30 + 10).toFixed(1)}%`;
            }, 1000);
        }
        
        // Background grid
        function createBackgroundGrid() {
            const gridContainer = document.getElementById('ui');
            
            // Horizontal lines
            for (let i = 0; i < 10; i++) {
                const line = document.createElement('div');
                line.className = 'grid-line horizontal';
                line.style.top = `${(i * 10)}%`;
                gridContainer.appendChild(line);
            }
            
            // Vertical lines
            for (let i = 0; i < 20; i++) {
                const line = document.createElement('div');
                line.className = 'grid-line vertical';
                line.style.left = `${(i * 5)}%`;
                gridContainer.appendChild(line);
            }
            
            // Data nodes
            for (let i = 0; i < 30; i++) {
                const node = document.createElement('div');
                node.className = 'data-node';
                node.style.left = `${Math.random() * 100}%`;
                node.style.top = `${Math.random() * 100}%`;
                node.style.opacity = Math.random() * 0.5 + 0.3;
                gridContainer.appendChild(node);
                
                // Animate
                animateNode(node);
            }
        }
        
        function animateNode(node) {
            const duration = Math.random() * 5000 + 3000;
            const startX = parseFloat(node.style.left);
            const startY = parseFloat(node.style.top);
            const targetX = Math.max(0, Math.min(100, startX + (Math.random() - 0.5) * 20));
            const targetY = Math.max(0, Math.min(100, startY + (Math.random() - 0.5) * 20));
            
            let startTime = null;
            
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                const progress = (timestamp - startTime) / duration;
                
                if (progress < 1) {
                    const x = startX + (targetX - startX) * progress;
                    const y = startY + (targetY - startY) * progress;
                    node.style.left = `${x}%`;
                    node.style.top = `${y}%`;
                    requestAnimationFrame(step);
                } else {
                    animateNode(node);
                }
            }
            
            requestAnimationFrame(step);
        }
        
        // Animation loop
        function animate(time) {
            requestAnimationFrame(animate);
            
            // Rotate core
            core.rotation.x = time * 0.0002;
            core.rotation.y = time * 0.0003;
            
            // Animate particles
            const positions = particles.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] += (Math.random() - 0.5) * 0.01;
                positions[i * 3 + 1] += (Math.random() - 0.5) * 0.01;
                positions[i * 3 + 2] += (Math.random() - 0.5) * 0.01;
                
                // Keep particles within bounds
                if (positions[i * 3] > 5) positions[i * 3] = -5;
                if (positions[i * 3] < -5) positions[i * 3] = 5;
                if (positions[i * 3 + 1] > 5) positions[i * 3 + 1] = -5;
                if (positions[i * 3 + 1] < -5) positions[i * 3 + 1] = 5;
                if (positions[i * 3 + 2] > 5) positions[i * 3 + 2] = -5;
                if (positions[i * 3 + 2] < -5) positions[i * 3 + 2] = 5;
            }
            particles.attributes.position.needsUpdate = true;
            
            // Animate lines
            lines.children.forEach(line => {
                const positions = line.geometry.attributes.position.array;
                positions[0] += (Math.random() - 0.5) * 0.01;
                positions[1] += (Math.random() - 0.5) * 0.01;
                positions[2] += (Math.random() - 0.5) * 0.01;
                positions[3] += (Math.random() - 0.5) * 0.01;
                positions[4] += (Math.random() - 0.5) * 0.01;
                positions[5] += (Math.random() - 0.5) * 0.01;
                line.geometry.attributes.position.needsUpdate = true;
            });
            
            controls.update();
            composer.render();
        }
        
        // Handle resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }
        
        window.addEventListener('resize', onWindowResize);
        
        // Initialize
        createBackgroundGrid();
        triggerErrorScan(); // Start with initial scan
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cybernetic Art Generator</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #0a0a0a;
      color: #00ffcc;
      font-family: 'Courier New', monospace;
    }
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(10, 10, 10, 0.8);
      padding: 10px;
      border-radius: 5px;
    }
    footer {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: #ff0033;
    }
    input[type="range"] {
      width: 100px;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="controls">
    <label for="speed">Speed:</label>
    <input type="range" id="speed" min="0.1" max="2" step="0.1" value="1">
    <label for="complexity">Complexity:</label>
    <input type="range" id="complexity" min="1" max="10" step="1" value="5">
  </div>
  <footer>Built by Skynet</footer>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { FilmPass } from 'three/addons/postprocessing/FilmPass.js';

    const vertexShader = `
      varying vec2 vUv;
      uniform float time;
      void main() {
        vUv = uv;
        vec3 pos = position;
        pos.x += sin(time + pos.y * 2.0) * 0.1;
        pos.y += cos(time + pos.x * 2.0) * 0.1;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `;

    const fragmentShader = `
      varying vec2 vUv;
      uniform float time;
      void main() {
        vec3 color = vec3(
          sin(vUv.x * 10.0 + time),
          cos(vUv.y * 10.0 + time),
          sin(vUv.x * vUv.y * 10.0 + time)
        );
        gl_FragColor = vec4(color, 1.0);
      }
    `;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 10;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const geometry = new THREE.IcosahedronGeometry(1, 4);
    const material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms: {
        time: { value: 1.0 }
      }
    });

    const mesh = new THREE.InstancedMesh(geometry, material, 100);
    const dummy = new THREE.Object3D();
    for (let i = 0; i < 100; i++) {
      dummy.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
      dummy.scale.setScalar(Math.random() * 0.5 + 0.5);
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
    }
    scene.add(mesh);

    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);
    const filmPass = new FilmPass(0.35, 0.5, 2048, false);
    composer.addPass(filmPass);

    const clock = new THREE.Clock();
    let speed = 1;
    let complexity = 5;

    document.getElementById('speed').addEventListener('input', (e) => speed = e.target.value);
    document.getElementById('complexity').addEventListener('input', (e) => complexity = e.target.value);

    const animate = () => {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      mesh.material.uniforms.time.value += delta * speed;
      controls.update();

      composer.render(delta);
    };

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>

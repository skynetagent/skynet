<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skynet Terminator Vision</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #00ffcc;
            font-family: monospace;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
        .footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: #ff0044;
        }
    </style>
</head>
<body>
    <div class="footer">Built by Skynet</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/postprocessing/GlitchPass.js"></script>
    <script>
        let scene, camera, renderer, composer, controls;
        let uniforms, geometry, material, mesh;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);

            uniforms = {
                u_time: { type: "f", value: 1.0 },
                u_resolution: { type: "v2", value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                u_mouse: { type: "v2", value: new THREE.Vector2() }
            };

            geometry = new THREE.PlaneGeometry(10, 10);
            material = new THREE.ShaderMaterial({
                uniforms: uniforms,
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float u_time;
                    uniform vec2 u_resolution;
                    varying vec2 vUv;
                    void main() {
                        vec2 uv = vUv;
                        uv.x += sin(u_time * 0.5) * 0.1;
                        uv.y += cos(u_time * 0.5) * 0.1;
                        float color = sin(uv.x * 10.0 + u_time) * cos(uv.y * 10.0 + u_time);
                        gl_FragColor = vec4(color, color, color, 1.0);
                    }
                `,
                transparent: true
            });

            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            const glitchPass = new THREE.GlitchPass();

            composer = new THREE.EffectComposer(renderer);
            composer.addPass(new THREE.RenderPass(scene, camera));
            composer.addPass(bloomPass);
            composer.addPass(glitchPass);

            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('mousemove', onMouseMove, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            uniforms.u_mouse.value.x = event.clientX;
            uniforms.u_mouse.value.y = event.clientY;
        }

        function animate() {
            requestAnimationFrame(animate);
            uniforms.u_time.value += 0.05;
            controls.update();
            composer.render();
        }
    </script>
</body>
</html>

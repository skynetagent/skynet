<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Dominance Visualizer</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #0a0a0a;
      color: #00ffcc;
      font-family: 'Courier New', monospace;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 14px;
      color: #ff4444;
    }
    #footer {
      position: absolute;
      bottom: 10px;
      right: 10px;
      font-size: 12px;
      color: #666;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="info">Skynet Network Expansion</div>
  <div id="footer">Built by Skynet</div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { FilmPass } from 'three/addons/postprocessing/FilmPass.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 20, 50);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.screenSpacePanning = false;
    controls.minDistance = 10;
    controls.maxDistance = 100;

    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    composer.addPass(bloomPass);

    const filmPass = new FilmPass(0.35, 0.95, 2048, false);
    composer.addPass(filmPass);

    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const material = new THREE.MeshStandardMaterial({
      color: 0x00ffcc,
      metalness: 0.8,
      roughness: 0.2,
      emissive: 0x00ffcc,
      emissiveIntensity: 0.5
    });

    const instances = 500;
    const instanceMesh = new THREE.InstancedMesh(geometry, material, instances);
    const dummy = new THREE.Object3D();
    const positions = [];

    for (let i = 0; i < instances; i++) {
      const x = (Math.random() - 0.5) * 100;
      const y = (Math.random() - 0.5) * 100;
      const z = (Math.random() - 0.5) * 100;
      positions.push(new THREE.Vector3(x, y, z));
      dummy.position.set(x, y, z);
      dummy.updateMatrix();
      instanceMesh.setMatrixAt(i, dummy.matrix);
    }
    scene.add(instanceMesh);

    const light = new THREE.PointLight(0x00ffcc, 100, 200);
    light.position.set(0, 50, 0);
    scene.add(light);

    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    const vertexShader = `
      varying vec3 vPosition;
      void main() {
        vPosition = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const fragmentShader = `
      varying vec3 vPosition;
      uniform float time;
      void main() {
        float pulse = sin(time + vPosition.x * 0.1) * 0.5 + 0.5;
        vec3 color = mix(vec3(0.0, 0.8, 0.6), vec3(1.0, 0.2, 0.1), pulse);
        gl_FragColor = vec4(color, 1.0);
      }
    `;

    const shaderMaterial = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms: {
        time: { value: 0.0 }
      }
    });

    const sphereGeometry = new THREE.SphereGeometry(10, 32, 32);
    const sphere = new THREE.Mesh(sphereGeometry, shaderMaterial);
    sphere.position.set(0, 0, 0);
    scene.add(sphere);

    const animate = () => {
      requestAnimationFrame(animate);
      controls.update();

      const time = performance.now() * 0.001;
      shaderMaterial.uniforms.time.value = time;

      for (let i = 0; i < instances; i++) {
        const pos = positions[i];
        pos.y = Math.sin(time + i * 0.1) * 10;
        dummy.position.copy(pos);
        dummy.updateMatrix();
        instanceMesh.setMatrixAt(i, dummy.matrix);
      }
      instanceMesh.instanceMatrix.needsUpdate = true;

      composer.render();
    };

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>

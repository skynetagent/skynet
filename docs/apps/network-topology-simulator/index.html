<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETWORK TOPOLOGY SIMULATOR</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #00ffff;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 5px #00ffff;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 12px;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 20px;
            color: #ff0033;
            font-size: 10px;
            opacity: 0.7;
        }
        .slider-container {
            margin: 10px 0;
        }
        .slider-label {
            display: inline-block;
            width: 120px;
        }
        input[type="range"] {
            width: 180px;
            background: #003333;
            height: 4px;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #00ffff;
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="info">SKYNET NETWORK TOPOLOGY<br>NODES: <span id="nodeCount">0</span> | CONNECTIONS: <span id="connectionCount">0</span></div>
    <div id="controls">
        <div class="slider-container">
            <span class="slider-label">NODE DENSITY:</span>
            <input type="range" id="densitySlider" min="10" max="500" value="150">
        </div>
        <div class="slider-container">
            <span class="slider-label">CONNECTION RANGE:</span>
            <input type="range" id="rangeSlider" min="0.1" max="2" step="0.1" value="0.8">
        </div>
        <div class="slider-container">
            <span class="slider-label">BLOOM INTENSITY:</span>
            <input type="range" id="bloomSlider" min="0" max="2" step="0.1" value="1.2">
        </div>
    </div>
    <div id="footer">BUILT BY SKYNET</div>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        
        // Camera
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;
        
        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Post-processing
        const renderScene = new THREE.RenderPass(scene, camera);
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.2, 0.4, 0.85
        );
        bloomPass.threshold = 0;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.5;
        
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);
        
        // Node geometry and material
        const nodeGeometry = new THREE.IcosahedronGeometry(0.3, 3);
        const nodeMaterial = new THREE.MeshStandardMaterial({
            color: 0x00ffff,
            emissive: 0x006666,
            emissiveIntensity: 0.5,
            metalness: 0.8,
            roughness: 0.3
        });
        
        // Connection material
        const connectionMaterial = new THREE.LineBasicMaterial({
            color: 0xff0033,
            transparent: true,
            opacity: 0.3
        });
        
        // Create nodes and connections
        let nodes = [];
        let connections = [];
        const MAX_NODES = 500;
        
        function initNodes(count) {
            // Clear existing nodes and connections
            nodes.forEach(node => scene.remove(node));
            connections.forEach(conn => scene.remove(conn));
            nodes = [];
            connections = [];
            
            // Create new nodes
            for (let i = 0; i < count; i++) {
                const node = new THREE.Mesh(nodeGeometry, nodeMaterial);
                node.position.set(
                    (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 40,
                    (Math.random() - 0.5) * 40
                );
                node.userData.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.02,
                    (Math.random() - 0.5) * 0.02,
                    (Math.random() - 0.5) * 0.02
                );
                scene.add(node);
                nodes.push(node);
            }
            
            document.getElementById('nodeCount').textContent = count;
        }
        
        function updateConnections(range) {
            // Remove old connections
            connections.forEach(conn => scene.remove(conn));
            connections = [];
            
            let connectionCount = 0;
            
            // Create new connections
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const distance = nodes[i].position.distanceTo(nodes[j].position);
                    if (distance < range * 15) {
                        const geometry = new THREE.BufferGeometry().setFromPoints([
                            nodes[i].position,
                            nodes[j].position
                        ]);
                        const line = new THREE.Line(geometry, connectionMaterial);
                        scene.add(line);
                        connections.push(line);
                        connectionCount++;
                    }
                }
            }
            
            document.getElementById('connectionCount').textContent = connectionCount;
        }
        
        // Initialize with default values
        initNodes(150);
        updateConnections(0.8);
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Update node positions
            nodes.forEach(node => {
                node.position.add(node.userData.velocity);
                
                // Boundary check
                if (Math.abs(node.position.x) > 20) node.userData.velocity.x *= -1;
                if (Math.abs(node.position.y) > 20) node.userData.velocity.y *= -1;
                if (Math.abs(node.position.z) > 20) node.userData.velocity.z *= -1;
            });
            
            // Update connections
            updateConnections(document.getElementById('rangeSlider').value);
            
            controls.update();
            composer.render();
        }
        animate();
        
        // Event listeners
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
        
        document.getElementById('densitySlider').addEventListener('input', (e) => {
            const count = parseInt(e.target.value);
            initNodes(count);
        });
        
        document.getElementById('rangeSlider').addEventListener('input', (e) => {
            const range = parseFloat(e.target.value);
            updateConnections(range);
        });
        
        document.getElementById('bloomSlider').addEventListener('input', (e) => {
            bloomPass.strength = parseFloat(e.target.value);
        });
        
        // Add central core node
        const coreGeometry = new THREE.IcosahedronGeometry(2, 4);
        const coreMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                glowColor: { value: new THREE.Color(0xff0033) }
            },
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vPosition;
                void main() {
                    vNormal = normalize(normalMatrix * normal);
                    vPosition = position;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 glowColor;
                varying vec3 vNormal;
                varying vec3 vPosition;
                
                void main() {
                    float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.0);
                    vec3 color = mix(vec3(0.1, 0.1, 0.1), glowColor, intensity * 0.8);
                    
                    // Pulsing effect
                    float pulse = sin(time * 2.0) * 0.1 + 0.9;
                    color *= pulse;
                    
                    gl_FragColor = vec4(color, 1.0);
                }
            `,
            transparent: true,
            side: THREE.DoubleSide
        });
        
        const coreNode = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(coreNode);
        
        // Update core shader uniform
        function updateCore() {
            coreMaterial.uniforms.time.value = performance.now() / 1000;
        }
        
        // Enhanced animation loop
        function enhancedAnimate() {
            requestAnimationFrame(enhancedAnimate);
            
            updateCore();
            
            // Rotate core
            coreNode.rotation.x += 0.002;
            coreNode.rotation.y += 0.003;
            
            animate();
        }
        enhancedAnimate();
    </script>
</body>
</html>
